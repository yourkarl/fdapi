<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0070ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="95" fill="#030d1a" stroke="url(#grad1)" stroke-width="2"/>
  <!-- 3D 孪生图形 -->
  <polygon points="100,30 160,65 160,135 100,170 40,135 40,65" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.8" filter="url(#glow)"/>
  <polygon points="100,55 135,75 135,115 100,135 65,115 65,75" fill="rgba(0,100,255,0.15)" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- 中心十字线 -->
  <line x1="100" y1="55" x2="100" y2="135" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="65" y1="95" x2="135" y2="95" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <!-- DT 文字 -->
  <text x="100" y="104" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="18" fill="url(#grad1)" filter="url(#glow)">DT</text>
  <!-- 底部标题 -->
  <text x="100" y="162" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#7aa3c4" letter-spacing="2">DIGITAL TWIN</text>
</svg>
