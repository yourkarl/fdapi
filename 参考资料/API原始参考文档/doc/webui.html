<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>WebUI示例</title>
    <style type="text/css">
        .title {
            color: white;
            text-shadow: black 0.1em 0.1em 0.2em;
        }

        body {
            background-color: transparent;
            font-family: Verdana;
            font-size: 9pt;
            overflow: hidden;
        }

        #infoPanel {
            position: absolute;
            top: 10px;
            width: 500px;
            height: 600px;
            background-color: rgba(255, 255, 255, 0.6);
            overflow: hidden;
        }
    </style>
    <link rel="stylesheet" href="styles/jquery.nstSlider.css" />
    <script type="text/javascript" src="scripts/jquery/jquery-3.7.0.min.js"></script>
    <script type="text/javascript" src="scripts/jquery/jquery.nstSlider.js"></script>
    <script type="text/javascript" src="../../ac.min.js"></script>
    <script type="text/javascript" src="scripts/webui.js"></script>
</head>

<body>
    <h1 class="title">Explorer WebUI示例</h1>
    <p>
        <label class="title">WebSocket服务端口号：</label> <input id="textPort" type="text" value="4321" size="5" />
        <button id="btnConnect" onclick="connect()">连接</button>
    </p>

    <p>
        <button onclick="refresh()">刷新页面</button>
        <button onclick="showHideInfoPanel()">显示隐藏日志</button>
        <button onclick="showHideMainUI()" disabled="disabled" id="btnShowHideMainUI">调用API</button>
    </p>

    <div>
        <p class="title">主页面透明度：<span id="bodyTrans"></span></p>
        <div class="nstSlider" for="body" data-range_min="0" data-range_max="100" data-cur_min="0">
            <div class="leftGrip"></div>
        </div>
    </div>
    <p></p>
    <div>
        <p class="title">日志窗口透明度：<span id="infoPanelTrans"></span></p>
        <div class="nstSlider" for="infoPanel" data-range_min="0" data-range_max="100" data-cur_min="75">
            <div class="leftGrip"></div>
        </div>
    </div>

    <pre id="infoPanel"></pre>


</body>

</html>
