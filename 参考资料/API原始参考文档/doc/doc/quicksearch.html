象数据结构，对象支持以下属性： id (string) 字符串类型的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 filePath (string) ply文件路径，资源文件引入方式：*.ply，资源引入说明 objectId (string) 自定义对象模型的Id pointSize (number) 点云尺寸，单位：米，默认值：0.01 colors (object) 三维热力图对象的自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 热力值对应的调色板颜色 value (number) 热力值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的ExcavationAnalysis Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个ExcavationAnalysis对象 Parameters: Name Type Description ids string | array 要删除的ExcavationAnalysis对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array ExcavationAnalysis对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取ExcavationAnalysis的详细信息 Parameters: Name Type Description ids string | array 要获取的ExcavationAnalysis对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example ExcavationAnalysis的详细信息 [{ \"id\": \"ea1\", \"groupId\": \"\", \"userData\": \"\", \"filePath\": \"D:\\\\test.ply\", \"customObjectId\": \"test1, \"pointSize\": 0.01 }] hide(ids, fn) 隐藏ExcavationAnalysis对象 Parameters: Name Type Description ids string | array ExcavationAnalysis对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示ExcavationAnalysis对象 Parameters: Name Type Description ids string | array ExcavationAnalysis对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(excavationAnalysis, fn) 修改一个ExcavationAnalysis对象 Parameters: Name Type Description excavationAnalysis object | array 对象数据结构，结构参考add()方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"FdExternal.html":{"id":"FdExternal.html","title":"Class: FdExternal","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: FdExternal FdExternal FdExternal类封装了进程内JS与C++的互操作功能，用于以下几种场景： Explorer的WebUI页面里 Marker的弹出窗口页面 JSTick调试窗口页面 以上几种场景的共同点是都使用了cef显示html页面，在这些html页面里， 可以通过使用FdExternal类，直接调用底层C++功能，从而实现高性能、更直接的接口调用方式。 new FdExternal() Methods &lt;static&gt; close() 用于关闭当前的窗口 运行环境：1、Marker弹出窗口页面；2、JSTick调试窗口页面 &lt;static&gt; execute(json) 用于通过JSON的方式调用JS接口 运行环境：1、Explorer的WebUI页面里；2、Marker弹出窗口页面；3、JSTick调试窗口页面 注意事项： 此方法一般不需要用户直接调用，当在上面3种场景下初始化DigitalTwinAPI类时，不传host参数， 调用接口时，内部会自动以FdExternal.execute的方式进行高性能高效率的调用。 Parameters: Name Type Description json string 要执行的JSON字符串 &lt;static&gt; getData(key) 用于实现类似localStorage的功能 运行环境：Explorer的WebUI页面 注意：此方法是异步方法，返回值为promise，需要使用async/await同步 Parameters: Name Type Description key string 键 Returns: 返回指定键对应的值 &lt;static&gt; getViewportSize() 之所以增加此功能是因为 当WebUI 在某种情况下已加在页面但是内部的WebWidget组件尚未显示（被隐藏）的情况下， 通过JS获取网页宽高会返回失败（window.screen.width, window.innerWidth等），为了解决这个问题，可调用此方法实现。 运行环境：Explorer的WebUI页面 注意：此方法是异步方法，返回值为promise，需要使用async/await同步 Returns: 调用后会返回包含当前三维窗口宽高的数组。 &lt;static&gt; postEvent(msg) 用于向主页面发送事件通知 运行环境：1、Marker弹出窗口页面；2、JSTick调试窗口页面 Parameters: Name Type Description msg string 要发送的字符串 &lt;static&gt; setData(key, value) 用于实现类似localStorage的功能 运行环境：Explorer的WebUI页面 Parameters: Name Type Description key string 键 value string 值 &lt;static&gt; valid() 检查是否在指定的环境里调用，FdExternal可以在以下环境调用： Explorer的WebUI页面里 Marker弹出窗口页面 JSTick调试窗口页面 Returns: 如果有效返回true，否则返回false × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"FiniteElement.html":{"id":"FiniteElement.html","title":"Class: FiniteElement","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCamer 坐标系(BD09)，默认值：0 rotation (array) 有限元分析旋转角度：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值]，默认值：[0,0,0] type (number) 有限元分析类型，共12种，类型：整数，取值范围：[0~11]，以下为类型数值对应关系： 0： u1 沿X轴向空间位移 1： u2 沿Y轴向空间位移 2： u3 沿Z轴向空间位移 3： s11 X轴向的应力，正值为拉应力，负值为压应力 4： s22 Y轴向的应力，正值为拉应力，负值为压应力 5： s33 Z轴向的应力，正值为拉应力，负值为压应力 6： s12 在YZ平面上，沿Y向的剪力 7： s13 在YZ平面上，沿Z向的剪力 8： s23 在XZ平面上，沿Z向的剪力 9： d1 X方向损伤 10：d2 Y方向损伤 11：d3 Z方向损伤 valueRange (array) 有限元分析结果对应值的范围：[min,max]，数组元素类型：[任意浮点数] characteristicLine (object) 有限元对象的特征线对象，包含以下参数： filePath (string) 包含特征线信息的文件路径 color (Color) 特征线的颜色 showLine (boolean) 是否显示等值线，默认值：false showColorLine (boolean) 是否显示等值线颜色，默认值：false contourParams (array) 控制有限元分析对象热力效果，从valueRange的min/max分割而来，二维数组，取值示例：[[min,max],[min,max],[min,max]...] sections (array) 有限元分析对象的各部分设置可见性 index (number) 待隐藏显示的模型索引 visible (boolean) 是否可见，默认值：true colors (object) 有限元分析对象的自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 size (number) 调色板图片尺寸 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 值对应的调色板颜色 value (number) 值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 对象结构示例： let fe1 = { \"id\": \"fe_1\", \"dataPath\": \"d:/out/\",//目录 \"coordinate\": [ 12984831, 4800354.5, 0 ], \"rotation\": [ 0, 0, 0 ], \"type\": 0, \"valueRange\": [ -3, 3 ], \"characteristicLine\":{ \"filePath\": \"d:/aaa.json\", \"color\": [1,1,0,1] }, \"sections\": [ { \"index\": 1, \"visible\": false }, { \"index\": 2, \"visible\": false } ], \"contourParams\": [[-3,0],[0,1],[1,3]],//分割valueRange \"showLine\": true, \"showColorLine\": true, \"colors\": { \"size\": 2048, \"gradient\": true, \"invalidColor\": [0, 0, 0, 1], \"colorStops\": [ { \"value\": 0, \"color\": [0, 0, 1, 1] }, { \"value\": 0.25, \"color\": [0, 1, 1, 1] }, { \"value\": 0.5, \"color\": [0, 1, 0, 1] }, { \"value\": 0.75, \"color\": [1, 1, 0, 1] }, { \"value\": 1, \"color\": [1, 0, 0, 1] } ] } }; clear(fn) 清空场景中所有的有限元分析对象 Parameters: Name Type Description fn func ，支持以下属性： id (string) 有限元仿真对象的唯一标识符ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 filePath (string) 必选，包含有限元仿真对象数据的VTK文件路径，取值示例：D:/xxx.vtk location (array) 有限元仿真对象位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] coordinateType (number) 坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 rotation (array) 有限元仿真对象旋转角度：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值]，默认值：[0,0,0] collision (boolean) 有限元仿真对象创建后是否开启碰撞，默认：true showMesh (boolean) 是否显示有限元仿真模型，默认值：true edge (object) 网格线边框样式对象，包含以下参数： type (number) 线框样式，取值范围：[0,1,2]，0：隐藏 1：网格线 2：特征线 featureAngel (number) 特征性二面角 color (string) 可选，线框颜色，默认值：[0.1, 0,1, 0.1, 1]，取值示例 pointField (object) 设置有限元仿真对象的点属性字段，包含以下参数： field (string) 可选，属性字段名称 component (string) 可选，属性字段对应的分量名称 arrow (object) 设置有限元仿真对象的箭头效果，包含以下参数： vectorField (string) 使用此属性字段名称对应的值符号化显示箭头 lengthScale (number) 可选，箭头长度缩放值 sizeScale (number) 可选，箭头尺寸 colorField (string) 颜色属性字段名称 colorComponent (string) 颜色属性字段对应的分量名称 colors (object) 有限元仿真对象的自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 值对应的调色板颜色 value (number) 值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 对象结构示例： let fe2 = { \"id\":\"fe_2\", \"filePath\":\"C:/HHKBZ.vtk\", \"location\":[2209.658125,22.4936328125,8.699999389648437], \"rotation\":[0,0,0], \"collision\":true, \"showMesh\": true, \"edge\": { \"type\": 1, \"featureAngel\": 30, \"color\": [0.1, 0,1, 0.1, 1] }, \"pointField\":{ \"field\":\"U\", \"component\": \"XY\" }, \"arrow\":{ \"vectorField\":\"stress\", \"lengthScale\": 1000, \"sizeScale\": 1000, \"colorComponent\": \"XY\" }, \"colors\": { \"colorStops\":[ { \"value\":0, \"color\":[0.231373,0.298039,0.752941,1] }, { \"value\":0.5, \"color\":[0.865,0.865,0.865,1] }, { \"value\":1, \"color\":[0.705882,0.015686,0.14902,1] } ] } }; applyBoxClipFilter(data, fn) 盒子过滤器 Parameters: Name Type Description data object | array PI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: Fluid Fluid Fluid流体仿真对象，实现对流体仿真对象的操作 一般通过api.fluid调用其方法 new Fluid() See: DigitalTwinAPI#fluid Extends BaseObject Methods add(data, fn) 添加一个或多个流体仿真对象 Parameters: Name Type Description data object | array 流体仿真对象的数据结构，可以是Object类型或者Array类型，对于每一个Fluid对象，支持以下属性： id (string) 流体仿真对象的唯一标识符ID groupId (string) 可选，Group分组id userData (string) 可选，用户自定义数据 bbox (bbox) 流体仿真的包围盒范围，格式：[minX,minY,minZ,maxX,maxY,maxZ]，数组元素类型：[任意浮点数] style (number) 流体样式，共28种水样式，取值范围：[0~27]，样式参考流体的样式预览图 color (Color) 可选，流体颜色，默认使用style样式自带颜色，支持四种格式，取值示例 sources (array) 出水点信息 id (string) 出水点ID rotation (array) 出水点旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] bbox (array) 出水点范围，格式：[minX,minY,minZ,maxX,maxY,maxZ]，注意：此出水点bbox范围要在流体仿真的bbox范围内，同时高度位置不要被模型遮挡，一般用射线求交接口拿到地形高度再加上1米即可。 velocity (array) 出水点uv向量（流速、流向），格式：[x,y]，取值范围：[-2,2] shape (number) 出水点形状，取值范围：[0,1]，0矩形出水点，1圆形出水点 duration (number) 出水点仿真执行时间，单位：秒，默认值：-1，即一直执行，大于0则按时间执行 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 示例数据结构： [{ \"id\": \"ff\", \"bbox\": [ -100, -100, -1, 100, 100, 2.5 ], \"style\": 1, \"sources\": [ { \"id\": \"ff_1\", \"rotation\": [0,0,0], \"bbox\": [ -10, -10, -1, 10, 10, 2.5 ], \"velocity\": [ 1, 1 ], \"shape\": 0, \"duration\": -1 } ] }] addSource(data, fn) 添加一个或多个流体仿真对象的源数据 Parameters: Name Type Description data object | array 源数据的数据结构，可以是Object类型或者Array类型，对于每一个源数据对象，支持以下属性： id (string) 源数据对象的唯一标识符ID sources (array) 源数据对象源数据 id (string) id bbox (array) X、Y方向的包围盒范围，格式：[minX,minY,maxX,maxY]，注意：参数范围不包含高度Z height (number) 高度 velocity (array) 速率，格式：[x,y] shape (number) 形状 duration (number) 周期 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 示例数据结构： [{ \"id\": \"ff\", \"sources\": [ { \"id\": \"f1\", \"bbox\": [ -10, -10, 10, 10 ], \"velocity\": [ 1, 1 ], \"shape\": 0, \"duration\": -1 } ] }] clear(fn) 清空场景中所有的流体仿真对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 continue(ids, fn) 继续流体仿真 Parameters: Name Type Description ids string | array 一个或多个流体仿真对象的id fn function 可选的回调函数，请参考二次开发：异步接口调用方式 continueSource(data, fn) 继续仿真 Parameters: Name Type Description data object | array 源数据的id信息，结构如下： id (string) 流体仿真对象的唯一标识符ID sources (array) 流体仿真对象源数据 id (string) id fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个流体仿真对象 Parameters: Name Type Description ids string | array 要删除的流体仿真对象ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array 流体仿真对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据流体仿真ID获取流体仿真的详细信息 Parameters: Name Type Description ids string | array 要获取的流体仿真对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回Fluid的详细信息 属性详情参见add方法参数 [{ \"id\": \"ff\", \"bbox\": [ -100, -100, -100, 100, 100, 100 ], \"style\": 0, \"sources\": [ { \"id\": \"f1\", \"bbox\": [ -10, -10, 10, 10 ], \"height\": 2, \"velocity\": [ 1, 1 ], \"shape\": 0, \"duration\": -1 } ] }] hide(ids, fn) 隐藏流体仿真 Parameters: Name Type Description ids string | array 流体仿真对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 pause(ids, fn) 暂停流体仿真 Parameters: Name Type Description ids string | array 一个或多个流体仿真对象的id fn function 可选的回调函数，请参考二次开发：异步接口调用方式 removeSource(data, fn) 移除一个或多个流体仿真对象的源数据 Parameters: Name Type Description data object | array 待移除的源数据的id信息，结构如下： id (string) 流体仿真对象的唯一标识符ID sourceIds (array) 源数据对象id数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 示例数据： [{ id: \"ff\", sourceIds: [\"f1\",\"f2\",\"f3\"] }] reset(ids, fn) 重置流体仿真 Parameters: Name Type Description ids string | array 一个或多个流体仿真对象的id fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示流体仿真 Parameters: Name Type Description ids string | array 流体仿真对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 stopSource(data, fn) 停止仿真 Parameters: Name Type Description data object | array 源数据的id信息，结构如下： id (string) 流体仿真对象的唯一标识符ID sources (array) 流体仿真对象源数据 id (string) id fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个流体仿真对象 Parameters: Name Type Description data object | array 流体仿真对象或对象数组，结构如下： id (string) 流体仿真对象的唯一标识符ID active (boolean) 是否激活仿真 sources (array) 流体仿真对象源数据 id (string) id active (boolean) 是否激活 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"GaussianSplatting.html":{"id":"GaussianSplatting.html","title":"Class: GaussianSplatting","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExte 可选，色阶，取值范围 [0~3]，默认值：0 splatScale (number) 可选，高斯点影响范围，默认：1.0 spriteSize (number) 可选，绘制大小，默认值：3.0 opacityCull (number) 可选，透明度剔除，取值范围：[0~1]，默认值：0.3 collision (boolean) 可选，模型加载后是否开启碰撞，默认值：false fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的GaussianSplatting Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个GaussianSplatting对象 Parameters: Name Type Description ids string | array 要删除的GaussianSplatting对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array GaussianSplatting对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取GaussianSplatting的详细信息 Parameters: Name Type Description ids string | array 要获取的GaussianSplatting对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example GaussianSplatting的详细信息 [{ \"id\": \"d1\", \"groupId\": \"\", \"userData\": \"\", \"location\": [494219.312500, 2490657.000000, -0.001055], \"rotation\": [-90.000000, -0.000005, -179.999969], \"scale\": [1.000000, 1.000000, 1.000000], \"texturePath\": \"C:\\\\Users\\\\Administrator\\\\AppData\\\\Roaming\\\\Cloud\\\\SDK/media/image/1.png\", \"order\": 1 }] hide(ids, fn) 隐藏GaussianSplatting对象 Parameters: Name Type Description ids string | array GaussianSplatting对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示GaussianSplatting对象 Parameters: Name Type Description ids string | array GaussianSplatting对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(gaussianSplatting, fn) 修改一个GaussianSplatting对象 Parameters: Name Type Description gaussianSplatting object 待更新的高斯泼溅对象，结构参考add()方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次 otStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: GeoJSONLayer GeoJSONLayer GeoJSONLayer图层类，提供操作GeoJSONLayert图层符号化加载和操作相关的方法 一般通过api.geoJSONLayer调用其方法 new GeoJSONLayer() protected See: DigitalTwinAPI#geoJSONLayer Extends BaseObject Methods add(option, fn) 从GeoJSON文件或者url下载链接加载GeoJSON并进行符号化展示 Parameters: Name Type Description option object 加载GeoJSON的配置项对象，包含以下属性 id (string) 必选，字符串类型唯一id url (string) 二选一，GeoJSON文件本地磁盘路径或者对应的url地址 sourceJson (Object) 二选一，GeoJSON标准对象（JsonObject） visible (boolean) 可选，设置图层加载后是否显示，默认：true rotation (array) 旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] offset (array) 可选，基于原始位置的偏移量，默认值：[0,0,0] range (array) 点的可视范围: [近裁距离, 远裁距离]，默认值: [0, 10000]，注意：此参数仅对point类型的GeoJSON生效 viewHeightRange (array) 可见高度范围：[最小可见高度, 远最大可见高度]，默认值: [-1000000000, 1000000000] needProject (boolean) 可选，是否进行投影转换，默认：true textField (string) 可选，使用Geojson的属性字段显示文字标注 textRange (array) 可选，文字标注的可视范围: [近裁距离, 远裁距离]，单位：米 textSize (number) 可选，文字标注的字体大小，默认大小：24 textColor (Color) 可选，文字标注的字体颜色，默认颜色：[1,1,1,1] onTerrain (boolean) 可选，设置图层加载后是否贴地，默认：false collision (boolean) 是否开启碰撞，默认值：true depthTest (boolean) 是否做深度检测，默认开启：true，true会被地形遮挡，false不会被地形遮挡，注意：深度检测参数仅在反走样参数关闭时(enableAntialias=false)生效 enableAntialias (boolean) 是否开启反走样(仅对polyline类型生效)，默认开启：true renderer (object) 必选，渲染器配置对象参数如下： rendererType (RendererType) 渲染器类型，包含三种：简单渲染器、唯一值渲染器、分类渲染器 generateTop (boolean) 可选参数，是否生成顶面，默认：true generateBottom (boolean) 可选参数，是否生成底面，默认：true style Polygon3DStyle 仅对Polygon3D渲染生效，设置Polygon3D的样式 type (VisualType) 控制显示的可视化类型枚举 field (string) GeoJSON文件内的属性字段名称 fieldType (FieldType) GeoJSON文件内的属性字段类型，枚举支持数值类型和字符串类型 gradient (boolean) 颜色是否渐变 注意：使用此自定义材质需单独按规范打包，具体参考相关教程。 materials (array) 可选，自定义材质配置列表，每一个材质对象包含的参数如下： index (number) 自定义材质索引 material (string) 自定义材质路径，即资源库PAK文件里材质文件的路径，设置自定义材质参数后style相关参数会失效 scalarParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数值类型参数，包含name/value键值对的数组，其中value为数值，格式示例：[{\"name\":\"不透明度\",\"value\":0.5},{\"name\":\"UV重复\",\"value\":1.0}] vectorParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数组类型参数，包含name/value键值对的数组，其中value为数组，格式示例：[{\"name\":\"color1\",\"value\":[1,1,1,1]},{\"name\":\"color2\",\"value\":[1,0,0,1]}] defaultSymbol (object) 必选，默认符号化配置参数如下： symbolType (number) 符号化类型，0 simple-marker圆形点填充 1 simple-line线填充(注意：目前仅支持1px的线宽) 2 simple-fill面填充 3 polygon3d填充 size (number) 可选，点的默认尺寸，仅针对simple-marker圆形填充生效； height (number) 可选，polygon3d的默认高度，仅针对polygon3d填充生效； color (array) 默认填充颜色 outline (object) 默认轮廓线，包含线宽和颜色，注意：目前仅支持1px的线宽。对象结构示例：{width: 1,color: [1, 1, 1, 1]} uniqueValueInfos (array) 可选，唯一值渲染器配置数组，对象结构如下： value (any) field字段对应值 symbol (object) 各唯一值对应的符号化配置对象，结构如下： color (Color) 可选，三选一，唯一值对应的颜色 size (number) 可选，三选一，唯一值对应的尺寸 height (number) 可选，三选一，唯一值对应的高度 classBreakInfos (array) 可选，分类渲染器配置数组，对象结构如下： minValue (number) 区间最小值 maxValue (number) 区间最大值 symbol (object) 不同分类的符号化配置对象，结构如下： color (Color) 可选，二选一，区间值对应的颜色 size (number) 可选，二选一，区间值对应的尺寸 height (number) 可选，三选一，区间值对应的高度 visualVariables (array) 简单渲染器支持根据字段属性控制颜色、尺寸和透明度的显示，参数如下： type (VisualType) 控制显示的可视化类型枚举 field (string) GeoJSON文件内的属性字段名称 fieldType (FieldType) GeoJSON文件内的属性字段类型，枚举支持数值类型和字符串类型 visibleRenderer (object) 可选，要素可见性渲染器配置对象，包含的参数结构如下： rendererType (RendererType) 渲染器类型：可见性渲染器 field (string) GeoJSON文件内的属性字段名称 fieldType (FieldType) GeoJSON文件内的属性字段类型，枚举支持数值类型和字符串类型 defaultVisible (boolean) 全局要素默认是否可见，默认值：true 可见 visibleValueInfos (array) 可选，分类渲染器配置数组，对象结构如下： value (any) 可选，field字段对应类型的值 minValue (number) 可选，区间最小值，注意：数值类型字段可以使用此属性 maxValue (number) 可选，区间最大值，注意：数值类型字段可以使用此属性 visible (boolean) 必选，根据字段值或区间控制要素块是否显隐 materialRenderer (object) 可选，自定义材质渲染器配置对象，包含的参数结构如下： rendererType (RendererType) 渲染器类型：自定义材质渲染器 field (string) GeoJSON文件内的属性字段名称 fieldType (FieldType) GeoJSON文件内的属性字段类型，枚举支持数值类型和字符串类型 defaultMaterial (boolean) 全局默认使用的自定义材质索引，默认值：0 materialValueInfos (array) 可选，自定义材质渲染器配置数组，每一个对象结构如下： index (number) 必选，根据字段值或区间控制要素块是否显隐 value (any) 可选，field字段对应类型的值 minValue (number) 可选，区间最小值，注意：数值类型字段可以使用此属性 maxValue (number) 可选，区间最大值，注意：数值类型字段可以使用此属性 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求参数示例 //简单渲染器 let simpleRenderer = { //渲染器类型 rendererType: RendererType.SimpleRenderer, //默认符号化配置 defaultSymbol: { //符号化类型枚举：0 simple-marker圆形点填充 1 simple-line线填充 2 simple-fill面填充 3 polygon3d填充 symbolType: 3, //默认高度 height: 10, //默认填充颜色 color: [0, 0, 1, 1], //默认轮廓线 outline: { //线宽 width: 1, //颜色 color: [1, 1, 1, 1], } }, //简单渲染器支持根据字段属性控制颜色、尺寸和透明度的显示 visualVariables: [{ //控制可视化显示的类型： 颜色color、尺寸size、高度height和不透明度opacity type: VisualType.Height, //属性字段名称 field: \"hight\", //属性字段类型 fieldType: FieldType.Number, }] }; //唯一值渲染器 let uniqueValueRenderer = { //渲染器类型 rendererType: RendererType.UniqueValueRenderer, //渲染字段名称 field: \"name\", //属性字段类型 fieldType: FieldType.String, //控制可视化显示的类型： 颜色color、尺寸size、高度height和不透明度opacity type: VisualType.Color, //默认符号化配置 defaultSymbol: { //符号化类型枚举：0 simple-marker圆形点填充 1 simple-line线填充 2 simple-fill面填充 3 polygon3d填充 symbolType: 2, //填充色 color: [0, 1, 1, 1], //轮廓线 outline: { //线宽 width: 1, //颜色 color: [1, 1, 1, 1] }, }, //根据颜色字段的唯一值进行符号化填充 uniqueValueInfos: [{ // 深圳湾体育馆填充为蓝色 value: \"深圳湾体育馆\", symbol: { //填充色 color: [0, 0, 1, 1] } }, { // 北京师大南山附属学校小学部填充为红色 value: \"北京师大南山附属学校小学部\", symbol: { color: [1, 0, 0, 1] } }, { // 腾讯滨海大厦填充为绿色 value: \"腾讯滨海大厦\", symbol: { color: [0, 1, 0, 1] } }, { // 科技第三幼儿园填充为黄色 value: \"科技第三幼儿园\", symbol: { color: [1, 1, 0, 1] } }] }; //分类渲染对应颜色 let less25 = { color: [0,0,1,1] }; let less50 = { color: [0,1,0,1] }; let less75 = { color: [1,1,0,1] }; let less100 = { color: [1,0,0,1] }; //分类渲染器 let classBreaksRenderer = { rendererType: RendererType.ClassBreaksRenderer, field: \"hight\", //属性字段类型 fieldType: FieldType.Number, //控制可视化显示的类型： 颜色color、尺寸size、高度height和不透明度opacity type: VisualType.Color, //默认符号化配置 defaultSymbol: { //符号化类型枚举：0 simple-marker圆形点填充 1 simple-line线填充 2 simple-fill面填充 3 polygon3d填充 symbolType: 2, //填充色 color: [0, 1, 1, 1], //轮廓线 outline: { //线宽 width: 1, //颜色 color: [1, 1, 1, 1] }, }, //根据hight字段的不同区间值使用不同的符号化配置 classBreakInfos: [ { minValue: 0, maxValue: 25, symbol: less25 }, { minValue: 25, maxValue: 50, symbol: less50 }, { minValue: 50, maxValue: 75, symbol: less75 }, { minValue: 75, maxValue: 100, symbol: less100 } ] }; clear(fn) 清空场景中所有的GeoJSONLayer图层对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个GeoJSONLayer图层对象 Parameters: Name Type Description ids string | array 要删除的GeoJSONLayer对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到GeoJSONLayer图层对象 Parameters: Name Type Description ids string | array GeoJSONLayer图层对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focusFeature(id, featureId, distance, flyTime, rotation, fn) 定位到GeoJSONLayer图层的某一块要素区域 Parameters: Name Type Description id string GeoJSONLayer图层对象的ID featureId number 要素区域Feature的ID distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hide(ids, fn) 隐藏一个或多个GeoJSONLayer图层对象 Parameters: Name Type Description ids string | array GeoJSONLayer对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 highlightFeature(id, featureId, fn) 高亮GeoJSONLayer图层对象内部的某一块要素区域 Parameters: Name Type Description id string GeoJSONLayer图层对象的ID featureId number GeoJSONLayer图层对象内部的要素区域ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 highlightFeatureByProperty(object, fn) 根据要素包含的属性字段名称和对应的值来高亮GeoJSONLayer图层对象内部对应的要素区域 Parameters: Name Type Description object object 待高亮要素对象支持以下属性： id (string) GeoJSONLayer图层对象的ID fieldName (strin ildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: GlobeTerrain GlobeTerrain GlobeTerrain类，包含球面坐标系下Cesium球面地形影像服务的相关操作方法 一般通过api.globeTerrain调用其方法 new GlobeTerrain() protected See: DigitalTwinAPI#globeTerrain Extends BaseObject Methods addImageryLayer(option, fn) 在Cesium球面上添加图层服务，支持的服务类型包含WMTS、WMS、MVT和TMS Parameters: Name Type Description option object Overlay对象，包含配置参数 id (string) 必选，图层服务ID xmlPath (string) 必选，获取球面OGC服务的元数据能力文档（Capabilities XML文档）的URL地址，需包含图层、瓦片规则、请求参数等信息 resourceURL (string) 可选，申请球面OGC服务资源瓦片的URL地址，例如WMTS GetTile操作的基本URL（用于KVP编码的请求）或tile-URL模板（用于RESTful请求）。 tile-URL模板应包含以下变量:{style}，{TileMatrixSet}，{TileMatrix}，{TileRow}，{TileCol}。如果实际值是硬编码的，或者服务器不需要，则前两个是可选的。 {s}关键字可用于指定子域。 type (number) 必选，球面网络图层服务类型，0：WMTS 1：WMS 2：MVT 3：TMS alpha (number) 可选，球面网络图层的透明度，取值范围：[0,1] bConvertSRGB (boolean) 可选，球面网络图层服务加载时颜色效果是否开启RGB模式转换为SRGB，默认值：true fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addImageryLayerBySchemaParams(obj, fn) 根据自定义参数添加球面网络地图服务，如WMTS/WMS/MVT/TMS服务等网络图层服务 注意：如果服务类型是0(WMS)或者2(MVT) ,只需传入extent请求范围参数 Parameters: Name Type Description obj object 球面网络图层服务的对象，支持以下属性： id (string) 必选，球面网络图层服务字符串类型的ID type (number) 必选，球面网络图层服务类型，0：WMTS 1：WMS 2：MVT 3：TMS resourceURL (string) 必选，瓦片资源或者mvt的style文件申请url，如果服务type是MVT类型，resourceURL可以是style文件的内容，此时需要将bResourceURL设置为true epsg (string) 可选，球面服务的坐标系类型 alpha (number) 可选，球面网络图层的透明度，取值范围：[0,1] bResourceURL (boolean) 可选，是否是MVT类型资源url，默认值：false bConvertSRGB (boolean) 可选，球面网络图层服务加载时颜色效果是否开启RGB模式转换为SRGB，默认值：true topLeftCornerX (number) 可选，图片的切片的左上角x坐标 topLeftCornerY (number) 可选，图片的切片的左上角y坐标 tileWidth (number) 可选，瓦片的像素宽度，取值示例：256 tileHeight (number) 可选，瓦片的像素高度，取值示例：256 extent (array) 可选，图层服务请求的有效范围，取值示例：[xmin, ymin, xmax, ymax]，数组内参数依次最小经度值，左下角的经度；最小纬度值，左下角的纬度；最大经度值，左上角的经度；最大纬度值，左上角的纬度 minimumLevel (number) 可选，服务的切片的最小层级，默认值：0 maximumLevel (number) 可选，服务的切片的最大层级， 最大23 scaleDenominator (number) 可选，第0层图像的scaleDenominator值 dpi (number) 可选，一个像素代表的实际地面距离，请参考不同GIS平台厂商发布的服务使用的DPI配置值：ArcGIS：90.714 天地图和超图：96 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clearImageryLayer(fn) 清空Cesium球面上添加的所有图层服务 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 deleteImageryLayer(ids, fn) 删除Cesium球面上指定的图层服务 Parameters: Name Type Description ids string | array 待删除的图层服务ID或ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 destroy(fn) 销毁Cesium球面的地形和影像 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hide(fn) 隐藏Cesium球面的地形和影像 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 init(terrainUrl, imageryUrl, imageryResourceUrl, alpha, bConvertSRGB, fn) 初始化Cesium球面的地形和影像 Parameters: Name Type Description terrainUrl string 可选，地形配置文件url地址 imageryUrl string 可选，影像服务配置xml文件的url地址，注意：初始化的影像服务应是全球影像服务地址 imageryResourceUrl string 可选，影像图像文件url模板，若不传后续可以通过setImageryResourceUrl()方法更新 alpha number 可选，球面网络图层的透明度，取值范围：[0,1] bConvertSRGB boolean 可选，球面网络图层服务加载时颜色效果是否开启RGB模式转换为SRGB，默认值：true fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setImagery(imageryUrl, imageryResourceUrl, fn) 设置更新初始化加载的影像服务 Parameters: Name Type Description imageryUrl string 影像服务配置xml文件的url地址，注意：替换初始化的影像服务应是全球影像服务地址 imageryResourceUrl string 影像图像文件url模板 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setImageryBySchemaParams(option, fn) 根据自定义参数的图层服务来更新初始化球面加载的影像服务，注意：替换初始化的影像服务应是全球影像服务地址 Parameters: Name Type Description option object 球面网络图层服务的对象的自定义参数配置属性： type (number) 必选，球面网络图层服务类型，0：WMTS 1：WMS 2：MVT 3：TMS resourceURL (string) 必选，申请球面OGC服务资源瓦片的URL地址，如果服务type是MVT类型，resourceURL可以是style文件的内容，此时需要将bResourceURL设置为true epsg (string) 可选，球面服务的坐标系类型 alpha (number) 可选，球面网络图层的透明度，取值范围：[0,1] bResourceURL (boolean) 可选，是否是MVT类型资源url，默认值：false bConvertSRGB (boolean) 可选，球面网络图层服务加载时颜色效果是否开启RGB模式转换为SRGB，默认值：true topLeftCornerX (number) 可选，图片的切片的左上角x坐标 topLeftCornerY (number) 可选，图片的切片的左上角y坐标 tileWidth (number) 可选，瓦片的像素宽度，取值示例：256 tileHeight (number) 可选，瓦片的像素高度，取值示例：256 extent (array) 可选，图层服务请求的有效范围，取值示例：[xmin, ymin, xmax, ymax]，数组内参数依次最小经度值，左下角的经度；最小纬度值，左下角的纬度；最大经度值，左上角的经度；最大纬度值，左上角的纬度 minimumLevel (number) 可选，服务的切片的最小层级，默认值：0 maximumLevel (number) 可选，服务的切片的最大层级， 最大23 scaleDenominator (number) 可选，第0层图像的scaleDenominator值 dpi (number) 可选，一个像素代表的实际地面距离，请参考不同GIS平台厂商发布的服务使用的DPI配置值：ArcGIS：90.714 天地图和超图：96 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Returns: setImageryLayerDrawOrder(currentLayerId, targetLayerId, fn) 设置Cesium球面上添加的图层服务的绘制顺序，即移动当前图层到目标图层的上方位置显示 Parameters: Name Type Description currentLayerId string 当前图层对象的ID，即设置成功后此图层会在目标图层的上方位置显示 targetLayerId string 目标图层对象的ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(fn) 显示Cesium球面的地形和影像 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"GuideLine.html":{"id":"GuideLine.html","title":"Class: GuideLine","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplat uideSize (number) 引导线动画对象的尺寸，单位：米，取值范围：[0~1000000]，默认值：30 speed (number) 引导线动画播放的速率，单位：米/秒，取值范围：[0~100]，默认值：10 interval (number) 引导动画播放的时间间隔，单位：秒，取值范围：[-1~20],默认值：-1，不循环播放 style (object) 引导线包含的起点、终点和折线的样式，结构如下： startPoint (object) 起点样式对象，支持以下属性： material (string) 可选参数，自定义材质路径，即资源库PAK文件里材质文件的路径，设置自定义材质参数后材质默认参数会失效 scalarParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数值类型参数，包含name/value键值对的数组，其中value为数值，格式示例：[{\"name\":\"不透明度\",\"value\":0.5},{\"name\":\"UV重复\",\"value\":1.0}] name (string) 材质包含的数值参数名称 value (number) 材质包含的数值参数名称对应的数值 vectorParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数组类型参数，包含name/value键值对的数组，其中value为数组，格式示例：[{\"name\":\"color1\",\"value\":[1,1,1,1]},{\"name\":\"color2\",\"value\":[1,0,0,1]}] name (string) 材质包含的数组参数名称 value (array) 材质包含的数组参数名称对应的数组值，一般是颜色数组：[r, g, b, a] polyline (object) 起点样式对象，支持以下属性： material (string) 可选参数，自定义材质路径，即资源库PAK文件里材质文件的路径，设置自定义材质参数后默认材质参数会失效 scalarParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数值类型参数，包含name/value键值对的数组，其中value为数值，格式示例：[{\"name\":\"不透明度\",\"value\":0.5},{\"name\":\"UV重复\",\"value\":1.0}] name (string) 材质包含的数值参数名称 value (number) 材质包含的数值参数名称对应的数值 vectorParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数组类型参数，包含name/value键值对的数组，其中value为数组，格式示例：[{\"name\":\"color1\",\"value\":[1,1,1,1]},{\"name\":\"color2\",\"value\":[1,0,0,1]}] name (string) 材质包含的数组参数名称 value (array) 材质包含的数组参数名称对应的数组值，一般是颜色数组：[r, g, b, a] endPoint (object) 起点样式对象，支持以下属性： material (string) 可选参数，自定义材质路径，即资源库PAK文件里材质文件的路径，设置自定义材质参数后默认材质参数会失效 scalarParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数值类型参数，包含name/value键值对的数组，其中value为数值，格式示例：[{\"name\":\"不透明度\",\"value\":0.5},{\"name\":\"UV重复\",\"value\":1.0}] name (string) 材质包含的数值参数名称 value (number) 材质包含的数值参数名称对应的数值 vectorParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数组类型参数，包含name/value键值对的数组，其中value为数组，格式示例：[{\"name\":\"color1\",\"value\":[1,1,1,1]},{\"name\":\"color2\",\"value\":[1,0,0,1]}] name (string) 材质包含的数组参数名称 value (array) 材质包含的数组参数名称对应的数组值，一般是颜色数组：[r, g, b, a] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example Guide t HeatMap对象属性如下： id (string) 字符串类型的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 bbox (array) 热力点坐标的范围 range (array) 可选，热力值的范围 data (array) 可选，热力图包含的热力点数据，（注意：点的heatValue取值要在range所设定的范围内） id (string) 字符串类型的ID coordinate (array) 热力点坐标，取值示例 radius (number) 热力点影像半径范围，取值范围：[任意数值] heatValue (number) 热力值，取值范围：[range参数设定范围内的任意数值] style (array) 可选参数，热力图样式枚举，详情参考 HeatMapStyle textureSize (number) style=0或1时参数生效，纹理大小，默认值：1024，取值范围：[128~4096]，注意：值越大纹理越清晰但创建越耗时 opacityMode (number) style=0或1时参数生效，不透明度模式，默认值：1，取值范围：0：使用自定义色卡颜色的不透明度 1：使用热力点的不透明度 opacityRange (array) style=0或1时参数生效，不透明度范围，默认值：[0~1.0]，注意：仅opacityMode为1时有效 blur (number) style=0或1时参数生效，热力点模糊因子，默认值：0.85，注意：模糊系数越高，渐变越平滑，取值范围：[0~1.0] colors (object) 可选，默认使用标准热力配色，当style=0或1时参数生效，自定义颜色卡区间数组，包含渐变控制参数、无效点颜色和颜色数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 值对应的调色板颜色 value (number) 值 blendMode (number) 混合模式，取值范围：[0,1] light (boolean) 是否参与光照，布尔类型，默认值：false updateTime (number) 更新动画的插值时间，注意：参数仅更新方法执行时生效，离散点构造热力图还支持差值动画 viewHeightRange (array) 可选，可见高度范围：[最小可见高度, 远最大可见高度]，默认值: [-1000000000, 1000000000] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addByTif(heatmap, fn) 根据tif文件加载热力图 Parameters: Name Type Description heatmap object HeatMap对象属性如下： id (string) 字符串类型的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 style (array) 可选，热力图样式枚举，详情参考 HeatMapStyle range (array) 可选，热力值的范围，数据结构参考add方法，如果不想设置range，可将此参数设置为null opacityMode (number) style=0或1时参数生效，不透明度模式，默认值：1，取值范围：0：使用自定义色卡颜色的不透明度 1：使用热力点的不透明度 opacityRange (array) style=0或1时参数生效，不透明度范围，默认值：[0~1.0]，注意：仅opacityMode为1时有效 blur (number) style=0或1时参数生效，热力点模糊因子，默认值：0.85，注意：模糊系数越高，渐变越平滑，取值范围：[0~1.0] colors (object) style=0或1时参数生效，自定义颜色卡区间数组，包含渐变控制参数、无效点颜色和颜色数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 值对应的调色板颜色 value (number) 值 blendMode (number) 混合模式，取值范围：[0,1] light (boolean) 是否参与光照，布尔类型，默认值：false updateTime (number) 更新动画的插值时间，注意：参数仅更新方法执行时生效 tifFile (object) tif文件属性对象，包含属性如下： minHeight (number) 最小高度，默认值：-1000米，注意：设置贴地模式时 地形高度要在此范围内 maxHeight (number) 最大高度，默认值：10000米，注意：设置贴地模式时 地形高度要在此范围内 file (string) tif文件路径，路径示例：\"D:\\\\test.tif\" fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addPoints(id, data, fn) 为HeatMap添加热力点 Parameters: Name Type Description id string HeatMap的ID data array 热力点(可以是单个或数组,数据结构请参考add方法) fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的HeatMap Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个HeatMap对象 Parameters: Name Type Description ids string | array 要删除的HeatMap对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array HeatMap对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取HeatMap的详细信息 Parameters: Name Type Description ids string | array 要获取的HeatMap对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example HeatMap的详细信息 { \"id\": \"heatmap1\", \"groupId\": \"\", \"userData\": \"\", \"bbox\": [488670.750000, -2488165.000000, 5.700000, 488670.750000, -2488165.000000, 5.700000], \"range\": [0.000000, 100.000000], \"data\": [] } hide(ids, fn) 隐藏HeatMap Parameters: Name Type Description ids string | array HeatMap对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 highlightPixels(id, pixelCoords, fn) 高亮通过Tif文件加载的热力图中指定的像素点，注意：像素点数组的取值范围必须在Tif文件分辨率内 Parameters: Name Type Description id string HeatMap的ID pixelCoords array Tif文件像素点的坐标数组（取值范围在文件分辨率内），取值示例：[[pixel1_x,pixel1_y],[pixel2_x,pixel2_y]...] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 load(heatmap, f 范围，即长方体的长宽高：[xSize,ySize,zSize]，voxelShape=1盒子时生效 alpha (number) 热力点不透明度 voxelAlphaMode (number) 三维体素块透明模式，取值：[0,1]，0 : 使用色带colors的透明度值（默认值） 1 : 使用点的热力值在heatValueRange范围内按[0~1]线性插值生成alpha，注意：仅离散点构建时生效 voxelShape (number) 三维体素块形状，取值：[0,1,2]，0 : Sphere球（注意体素设置为球时构建非常耗时） 1 : Box盒子（默认值） 2 : 四面体，注意：仅离散点构建时生效 voxelSize (number) 三维体素块尺寸，支持仅传入Voxels和VoxelSize参数，则自动计算Bounds和TextureSize voxelGridSize (array) 三维体素块网格尺寸，默认使用纹理尺寸，取值示例： [1,1,256] textureSize (number) 纹理尺寸，取值范围：[128~512]，默认：128 denoise (number) 降噪级别，取值范围：[0,1,2,3,4,5]，默认值：0 不做降噪；1~5 五级，注意：值越大添加越耗时 bbox (array) 三维热力图的包围盒范围，格式：[minX,minY,minZ,maxX,maxY,maxZ]，数组元素类型：[任意浮点数] boundsColor (array) 三维热力图的包围盒1px边框的颜色，默认不显示，取值示例如白色线框：[1,1,1,1] volumeBoxLocation (array) 三维热力图坐标位置：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] volumeBoxRotation (array) 三维热力图坐标旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] volumeBoxSize (array) 三维热力图盒子范围：[长,宽,高]，数组元素类型：[任意浮点数]， 单位：米 heatValueMode (number) 热力值模式，取值：[0,1,2,3,4,5,6] ，0 : Interp插值（默认值） 1 : Nearest最近 2 : Addition叠加 3 : Minimum最小 4 : Maximum最大 5 : Overwrite覆盖 6 : DoOnce独占 heatValueRange (array) 热力值的范围：[min,max]，数组元素类型：[任意浮点数] blendMode (number) 三维热力图颜色混合模式，取值范围：[0,1]，0：X光效果 1：半透明效果 colors (object) 三维热力图对象的自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 热力值对应的调色板颜色 value (number) 热力值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addByImages(data, fn) 根据16张空间图片构建三维热力图 Parameters: Name Type Description data object | array HeatMap3D对象或数组，对于每个对象，支持以下属性： id (string) 字符串类型的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 updateTime (number) 更新动画的插值时间，单位：秒，注意：参数仅更新方法update()执行时生效 imagesArray (array) 二选一，16张1024*1024的空间热力图图片的路径，空间位置从低到高，参考示例代码，注意：仅空间图片构建时生效 imageFiles (array) 二选一，构成空间热力图图片对象数组，每一个图片对象包含以下属性： size (array) 图片尺寸 images (array) 图片对象数组，每一个对象包含一下属性： filePath (string) 图片文件路径 minValue (number) 最小值 maxValue (number) 最大值 volumeBoxLocation (array) 三维热力图坐标位置：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] volumeBoxRotation (array) 三维热力图坐标旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] bbox (array) 三维热力图的包围盒范围，格式：[minX,minY,minZ,maxX,maxY,maxZ]，数组元素类型：[任意浮点数] boundsColor (array) 三维热力图的包围盒1px边框的颜色，默认不显示，取值示例如白色线框：[1,1,1,1] volumeBoxSize (array) 三维热力图盒子范围：[长,宽,高]，数组元素类型：[任意浮点数]， 单位：米 brightness (number) 亮度，取值范围：[0~100] ，值等于0则完全透明，值越大越不透明 displayMode (number) 显示模式，取值范围：[0,1,2,3] ，支持四类效果：0是体积雾效果, 1是体素效果 , 2是盒子效果，3是贴花效果，注意：0|1是跟全局剖切方法联动的，只有2不跟全局剖切联动需要自己传参clipBox blendMode (number) 三维热力图颜色混合模式，取值范围：[0,1]，0：X光效果 1：半透明效果 colors (object) 三维热力图对象的自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 热力值对应的调色板颜色 value (number) 热力值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addBySparseVoxels(data, fn) 根据稀疏体素构建三维热力图 Parameters: Name Type Description data object | array HeatMap3D对象或数组，对于每个对象，支持以下属性： id (string) 字符串类型的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 updateTime (number) 更新动画的插值时间，单位：秒，注意：参数仅更新方法update()执行时生效 sparseVoxels (object)) 稀疏类型体素构建三维热力对象 voxels (array) 稀疏体素数组 voxel (array) 稀疏体素纹理坐标索引，取值类型：[i,j,k]，i、j、k均需要小于体素尺寸size value (number) 纹理坐标对应的值 data (string) 用户自定义数据 size (array) 稀疏体素的纹理坐标[i,j,k]的最大值，取值示例：[256,256,256]，即i、j、k的最大值为256 displayMode (number) 显示模式，取值：[0,1,2,3] ，0是体积雾效果, 1是体素效果 , 2是盒子效果，3是贴花效果，注意：0|1是跟全局剖切方法联动的，只有2不跟全局剖切联动需要自己传参clipBox brightness (number) 亮度，取值范围：[0~100] ，值等于0则完全透明，值越大越不透明 bbox (array) 三维热力图的包围盒范围，格式：[minX,minY,minZ,maxX,maxY,maxZ]，数组元素类型：[任意浮点数] boundsColor (array) 三维热力图的包围盒1px边框的颜色，默认不显示，取值示例如白色线框：[1,1,1,1] volumeBoxLocation (array) 三维热力图坐标位置：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] volumeBoxRotation (array) 三维热力图坐标旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] volumeBoxSize (array) 三维热力图盒子范围：[长,宽,高]，数组元素类型：[任意浮点数]， 单位：米 voxelAlphaMode (number) 三维体素块透明模式，取值：[0,1]，0 : 使用色带colors的透明度值（默认值） 1 : 使用点的热力值在heatValueRange范围内按[0~1]线性插值生成alpha，注意：仅离散点构建时生效 voxelShape (number) 三维体素块形状，取值：[0,1,2]，0 : Sphere球（注意体素设置为球时构建非常耗时） 1 : Box盒子（默认值） 2 : 四面体，注意：仅离散点构建时生效 blendMode (number) 三维热力图颜色混合模式，取值范围：[0,1]，0：X光效果 1：半透明效果 heatValueMode (number) 热力值模式，取值：[0,1,2,3,4,5,6] ，0 : Interp插值（默认值） 1 : Nearest最近 2 : Addition叠加 3 : Minimum最小 4 : Maximum最大 5 : Overwrite覆盖 6 : DoOnce独占 heatValueRange (array) 热力值的范围：[min,max]，数组元素类型：[任意浮点数] colors (object) 三维热力图对象的自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 热力值对应的调色板颜色 value (number) 热力值值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addByTif(data, fn) 根据tif文件构建三维热力图 Parameters: Name Type Description data object | array HeatMap3D对象或数组，对于每个对象，支持以下属性： id (string) 字符串类型的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 updateTime (number) 更新动画的插值时间，单位：秒，注意：参数仅更新方法update()执行时生效 tifFiles (object) 生成三维热力图的tif文件对象属性如下： files (array) 二进制文件路径数组，示例：[\"D:\\\\xxx1.tif\",\"D:\\\\xxx2.tif\",\"D:\\\\xxx3.tif\"...] size (array) 可选，纹理分辨率，注意：纹理尺寸不能超过2048，最大值示例：[2048,2048] needProject (boolean) 是否需要重投影 minHeight (number) 可选，最小高度 maxHeight (number) 可选，最大高度 brightness (number) 亮度，取值范围：[0~100] ，值等于0则完全透明，值越大越不透明 displayMode (number) 显示模式，取值：[0,1,2,3] ，0是体积雾效果, 1是体素效果 , 2是盒子效果，3是贴花效果，注意：0|1是跟全局剖切方法联动的，只有2不跟全局剖切联动需要自己传参clipBox clipBox (array) 三维热力图盒子剖切的bbox范围，取值格式示例：[minX,minY,minZ,maxX,maxY,maxZ]，元素取值范围：[0~volumeBoxSize] clipVoxel (boolean) 三维热力图执行盒子剖切时是否裁切体素(displayMode:1)，默认值：true volumeBoxLocation (array) 三维热力图坐标位置：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] volumeBoxRotation (array) 三维热力图坐标旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] volumeBoxSize (array) 三维热力图盒子范围：[长,宽,高]，数组元素类型：[任意浮点数]， 单位：米 voxelGridSize (array) 三维体素块网格尺寸，默认使用纹理尺寸，取值示例： [1,1,256] voxelAlphaMode (number) 三维体素块透明模式，取值：[0,1]，0 : 使用色带colors的透明度值（默认值） 1 : 使用点的热力值在heatValueRange范围内按[0~1]线性插值生成alpha，注意：仅离散点构建时生效 voxelShape (number) 三维体素块形状，取值：[ 间，注意：仅在update()方法执行时生效 shpFilePath (string) 裁切河道使用的shp文件路径，即使用此shp文件对河道采样点进行裁切，推荐使用@path 文件格式类型路径 points (array) 河道信息对象数据，包含采样点坐标、河道宽度和采样点位置流速和采样点位置热力值（水文业务属性），数组包含的对象结构如下： coordinate (array) 采样点对应坐标位置，取值：[x, y, z] width (number) 采样点对应的河道宽度 speed (number) 可选，采样点对应的流速，单位：米/秒 heatValue (number) 可选，采样点对应的热力值（即水深、污染浓度、流量、流速等水文属性），用来控制热力样式的颜色，对应colors调色板的value值 speedRange (array) 河道流速的范围，取值示例：[speedMin, speedMax] valueRange (array) 河道热力值的范围，取值示例：[heatValueMin, heatValueMax] colors (object) 河道热力样式下的调色板配色对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 值对应的调色板颜色 value (number) 值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的HydroDynamic1D Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个HydroDynamic1D对象 Parameters: Name Type Description ids string | array 要删除的HydroDynamic1D对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array HydroDynamic1D对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取HydroDynamic1D的详细信息 Parameters: Name Type Description ids string | array 要获取的HydroDynamic1D对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hide(ids, fn) 隐藏HydroDynamic1D Parameters: Name Type Description ids string | array HydroDynamic1D对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示HydroDynamic1D Parameters: Name Type Description ids string | array HydroDynamic1D对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个HydroDynamic1D对象 Parameters: Name Type Description data obje 维水动力模型对象HydroDynamic2D的数据对象，可以是Object类型或者Array类型，对于每一个HydroDynamic2D对象，支持以下属性： id (string) HydroDynamic2D对象ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 offset (array) 可选，二维水动力模型的整体偏移，默认值：[0, 0, 0] collision (boolean) 是否开启模型碰撞，默认值：false，注意：开启后会影响加载效率 displayMode (HydroDynamic2DStyle) 二维水动力模型的显示样式，取值范围：[0,1,2]，0真实水样式（默认值），1热力图样式,2流场样式 waterMode (WaterMode) 真实水样式的水面材质类型，取值范围：[0,1,2]，默认值：0，注意：水面材质支持和热力图样式叠加 waterColor (Color) 可选，水面颜色和透明度，注意：仅在displayMode=0时生效，支持四种格式，取值示例，注意：此参数仅在displayMode设置为真实水样式时生效，如果不传则使用waterMode自带水材质颜色 waveBrightness (number) 可选，水波纹的显示亮度，取值范围：[0~1000]，值越大亮度越高水波纹越明显，默认值：1 depthRange (array) 可选，二维水动力模型水深对应的数值区间，如果不传则系统会自动计算并使用dat数据的水深范围 alphaMode (number) 透明模式，取值：[0,1]，0 : 使用colors调色板的不透明度值 1 : 使用dat数据包含的水深字段自动控制不透明度，默认值：1 alphaGradientDepthRange (array) 边缘羽化的水深范围，默认值：[0,2]，单位：米，对应的alpha区间为[0,1]，注意：仅在alphaMode=1时生效 arrowColor (Color) 箭头颜色和透明度，支持四种格式，取值示例 arrowTiling (number) 箭头平铺系数 arrowDisplayMode (number) 箭头显示模式，取值范围：[0,1]，0默认样式（受arrowColor参数影响），1热力样式（受arrowColors调色板参数影响），默认值：0 arrowAlphaMode (number) 箭头透明度模式，仅在arrowDisplayMode=0时生效，取值：[0,1]，0使用arrowColor的透明度，1使用调色板的透明度，默认值：0 arrowColors (object) 箭头颜色调色板，仅在arrowDisplayMode=1时生效，河道箭头热力样式下的调色板配色对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 流速UV值对应的调色板颜色，注意arrowDisplayMode=1时，此颜色值的透明度生效 value (number) 流速UV值 alphaComposite (boolean) 是否使用混合透明度，默认：true rippleDensity (number) 可选，水波纹辐射强度，默认值：1 rippleTiling (number) 可选，水波纹辐射平铺系数，默认值：1 speedRange (array) 可选，流速范围，默认值：[0.1,3] speedFactor (number) 可选，速度因子，控制水波纹或者粒子的速度，默认值：1 flowThreshold (array) 可选，水浪效果漫延的深度区间范围，区间外不生成浪头效果，默认值：[0.1,0.4] crestWaterSpeedRange (array) 可选，水浪效果漫延的流速区间范围，默认值：[0,1]，注意：和深度区间表现为叠加的效果，区间内的水流速度值越大浪头越来越明显 shpFilePath (string) 添加二维水动力模型整体范围的shp文件路径，取值示例：\"C:/shpFile/xxx.shp\"。注意：此shp文件包含水动力模型所有网格的范围，类型为Polygon，坐标系必须是PCS类型，单位是米，同时shp文件属性表字段必须包含ID和Elev两个字段：ID是网格ID，int类型；Elev是网格的高程值，double类型，单位是米 shpDataFilePath (string) 可选参数，仅在update()方法执行生效。更新二维水动力模型时包含水面网格的dat类型文件路径，取值示例：\"C:/datFile/xxx.dat\"。注意：dat文件是一种二进制文件，它提取了某一时刻包含的所有水面网格的信息，并把这些信息依次写入了二进制文件dat，一个水面网格信息包含如下一组四个值：id,h,u,v。id对应shp属性表ID字段（int类型），h是网格对应的水深（double类型，单位是米），uv是流速和流向（double类型，单位米/秒，u朝东，v朝北）。 updateTime (number) 可选参数，更新动画的插值时间，注意：仅update()更新方法执行时生效，默认值：1s arrowVisibleDistance (number) 可选参数，动态箭头显示的最大距离，单位：米 dynamicArrow (object) 可选参数，动态箭头的配置参数对象 numArrows (number) 箭头数量 speedFactor (number) 速度因子 sizeScale (number) 尺寸缩放因子 colors (object) 二维水动力模型自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 水深值对应的调色板颜色，注意alphaMode=0时，此颜色值的透明度生效 value (number) 水深值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addByTif(data, fn) 添加一个或多个HydroDynamic2D二维水动力模型对象，数据源为.tif文件。 Parameters: Name Type Description data object | array 构造二维水动力模型对象HydroDynamic2D的数据对象，可以是Object类型或者Array类型，对于每一个HydroDynamic2D对象，支持以下属性： id (string) HydroDynamic2D对象ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 bbox (array) 可选，二维水动力模型的包围盒范围，格式：[minX,minY,minZ,maxX,maxY,maxZ]，数组元素类型：[任意浮点数] offset (array) 可选，二维水动力模型的整体偏移，默认值：[0, 0, 0] dataSize (array) 可选，二维水动力模型的数据分辨率，取值示例：[X,Y] updateTime (number) 更新动画的插值时间，注意：参数仅update()更新方法执行时生效 waterDepth (string) 必选，二维水动力模型tif数据文件路径（水深文件tif），取值示例：\"C:/tifFile/xxx1.tif\"，注意：waterDepth、flowField和dem的三个tif文件分辨率必须保持一致 flowField (string) 可选，二维水动力模型tif数据文件路径（流速流向文件tif），取值示例：\"C:/tifFile/xxx2.tif\"，注意：waterDepth、flowField和dem的三个tif文件分辨率必须保持一致 dem (string) 可选，二维水动力模型tif数据文件路径（河道DEM文件tif），取值示例：\"C:/tifFile/xxx3.tif\"，注意：waterDepth、flowField和dem的三个tif文件分辨率必须保持一致 collision (boolean) 是否开启模型碰撞，默认：false，注意：开启后会影响加载效率 displayMode (HydroDynamic2DStyle) 二维水动力模型的显示样式，取值范围：[0,1,2]，0真实水样式（默认值），1热力图样式，2流场样式 waterMode (WaterMode) 真实水样式的水面材质类型，取值范围：[0,1,2]，默认值：0，注意：水面材质支持和热力图样式叠加 waterColor (Color) 可选，水面颜色和透明度，注意：仅在displayMode=0时生效，支持四种格式，取值示例，注意：此参数仅在displayMode设置为真实水样式时生效，如果不传则使用waterMode自带水材质颜色 waveBrightness (number) 可选，水波纹的显示亮度，取值范围：[0~1000]，值越大亮度越高水波纹越明显，默认值：1 depthRange (array) 可选，二维水动力模型水深对应的数值区间，如果不传则系统会自动计算并使用tif数据的水深范围 alphaGradientDepthRange (array) 边缘羽化的水深范围，默认值：[0,2]，单位：米，对应的alpha区间为[0,1]，注意：仅在alphaMode=1时生效 alphaMode (number) 透明模式，取值：[0,1]，0 : 使用colors调色板的不透明度值 1 : 使用tif数据包含的水深字段自动控制不透明度，默认值：1 arrowColor (Color) 箭头颜色和透明度，支持四种格式，取值示例 arrowTiling (number) 箭头平铺系数 arrowDisplayMode (number) 箭头显示模式，取值范围：[0,1]，0默认样式（受arrowColor参数影响），1热力样式（受arrowColors调色板参数影响），默认值：0 arrowAlphaMode (number) 箭头透明度模式，仅在arrowDisplayMode=0时生效，取值：[0,1]，0使用arrowColor的透明度，1使用调色板的透明度，默认值：0 arrowColors (object) 箭头颜色调色板，仅在arrowDisplayMode=1时生效，河道箭头热力样式下的调色板配色对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 流速UV值对应的调色板颜色，注意arrowDisplayMode=1时，此颜色值的透明度生效 value (number) 流速UV值 rippleDensity (number) 可选，水波纹辐射强度，默认值：1 rippleTiling (number) 可选，水波纹辐射平铺系数，默认值：1 speedRange (array) 可选，流速范围，默认值：[0.1,3] speedFactor (number) 可选，速度因子，控制水波纹或者粒子的速度，默认值：1 flowThreshold (array) 可选，水浪漫延效果产生的深度区间，区间外不生成水浪效果，默认值：[0.1,0.4] crestWaterSpeedRange (array) 可选，水浪漫延效果产生的流速区间，默认值：[0.2, 0.6]，注意：和深度区间表现为叠加的效果，区间内的水流速度值越大浪头越来越明显，如果流速大于区间最大值则和最大值的浪头效果一致。 colors (object) 二维水动力模型自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 水深值对应的调色板颜色，注意alphaMode=0时，此颜色值的透明度生效 value (number) 水深值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求数据结构示例 [{ \"id\": \"hdm\", \"displayMode\": 0, \"waterMode\": 0, \"alphaMode\": 1, \"depthRange\": [0, 3], \"waterDepth\":\"d:\\\\waterDepth.tif\", \"flowField\":\"d:\\\\flowField.tif\", \"dem\":\"d:\\\\dem.tif\", \"colors\": { \"gradient\": true, \"invalidColor\": [0, 0, 0, 1], \"colorStops\": [ { \"value\": 0, \"color\": [0, 0, 1, 1] }, { \"value\": 0.25, \"color\": [0, 1, 1, 1] }, { \"value\": 0.5, \"color\": [0, 1, 0, 1] }, { \"value\": 0.75, \"color\": [1, 1, 0, 1] }, { \"value\": 1, \"color\": [1, 0, 0, 1] } ] }] clear(fn) 删除场景中所有的HydroDynamic2D Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个HydroDynamic2D对象 Parameters: Name Type Description ids string | array 要删除的HydroDynamic2D对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array HydroDynamic2D对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取HydroDynamic2D的详细信息 Parameters: Name Type Description ids string | array 要获取的HydroDynamic2D对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hide(ids, fn) 隐藏HydroDynamic2D Parameters: Name Type Description ids string | array HydroDynamic2D对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示HydroDynamic2D Parameters: Name Type Description ids string | array HydroDynamic2D对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个HydroDynamic2D对象 Parameters: Name Type Description data object | array HydroDynamic2D对象或者数组，以下属性支持更新 id (string) 根据HydroDynamic2D对象的ID更新以下属性 vertexWaterDepth (boolean) 是否根据顶点水深插值，默认值：true，设置为false使用网格面插值 updateTime (number) 更新动画的插值时间，注意：仅update()更新方法执行时生效，默认值：1s shpDataFilePath (string) 更新二维水动力模型时包含水面网格的dat类型文件路径，取值示例：\"C:/datFile/xxx.dat\"。注意：dat文件是一种二进制文件，它提取了某一时刻包含的所有水面网格的信息，并把这些信息依次写入了二进制文件dat，一个水面网格信息包含如下一组四个值：id,h,u,v。id对应shp属性表ID字段（int类型），h是网格对应的水深（double类型，单位是米），uv是流速和流向（double类型，单位米/秒，u朝东，v朝北）。id h u v四个字段分别对应4+8+8+8字节数据，id是int类型，其他double，按小端字节顺序（ByteOrder.LITTLE_ENDIAN）写入二进制dat文件 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 读取和写入dat文件的Java示例代码如下： //读取dat public void readDat(){ String datFilePath = \"C:\\\\dat\\\\test01.dat\"; byte[] bytes = new byte[4 + 8 + 8 + 8]; FileInputStream fis = new FileInputStream(new File(datFilePath)); while (fis.read(bytes, 0, bytes.length) != -1) { int id = ByteBuffer.wrap(Arrays.copyOfRange(bytes, 0, 4)).order(ByteOrder.LITTLE_ENDIAN).getInt(); Double h = ByteBuffer.wrap(Arrays.copyOfRange(bytes, 4, 12)).order(ByteOrder.LITTLE_ENDIAN).getDouble(); Double u = ByteBuffer.wrap(Arrays.copyOfRange(bytes, 12, 20)).order(ByteOrder.LITTLE_ENDIAN).getDouble(); Double v = ByteBuffer.wrap(Arrays.copyOfRange(bytes, 20, 28)).order(ByteOrder.LITTLE_ENDIAN).getDouble(); //输出网格的id 对应的水深h 流速流向u v System.out.println(\"id:\"+ id); System.out.println(\"h:\"+ h); System.out.println(\"u:\"+ u); System.out.println(\"v:\"+ v); } } //写入dat public void writeDat(){ String datFilePath = \"D:\\\\dat\\\\test01.dat\"; OutputStream fos = new BufferedOutputStream(Files.newOutputStream(Paths.get(datFilePath))); //网格的id int id = 0; //写入100个网格数据 for(int i=0;i&lt;100;i++){ id = i; //网格对应的水深 double h = Math.random(); //uv 流速 double u = Math.random(); double v = Math.random(); byte[] bytes = ByteBuffer.allocate(4 + 8 + 8 + 8).order(ByteOrder.LITTLE_ENDIAN).putInt(id).putDouble(h).putDouble(u).putDouble(v).array(); fos.write(bytes); } fos.close(); } × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"HydrodynamicModel.html":{"id":"HydrodynamicModel.html","title":"Class: HydrodynamicModel","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrody 2.tif\"，注意：waterDepth、flowField和dem的三个tif文件分辨率必须保持一致 dem (string) 可选，二维水动力模型bin数据文件路径（河道DEM的bin或tif），取值示例：\"C:/binFile/xxx3.bin\" 或\"C:/tifFile/xxx3.tif\"，注意：waterDepth、flowField和dem的三个tif文件分辨率必须保持一致 collision (boolean) 是否开启模型碰撞，默认：false，注意：开启后会影响加载效率 displayMode (number) 显示样式，取值范围：[0,1]，0水体样式（默认值），1热力样式 waterColor (Color) 水体颜色和透明度，注意：仅在displayMode=0时生效，支持四种格式，取值示例. waveBrightness (number) 水波纹的显示亮度，取值范围：[0,10000]，值越大亮度越高水波纹越明显 alphaMode (number) 透明模式，取值：[0,1]，0 : 使用colors调色板的不透明度值 1 : 使用系统默认值 alphaComposite (boolean) 是否使用混合透明度，默认：true arrowColor (Color) 箭头颜色和透明度，支持四种格式，取值示例 arrowTiling (number) 箭头平铺系数 rippleDensity (number) 辐射强度 rippleTiling (number) 辐射平铺系数 speedFactor (number) 速度因子 colors (object) 二维水动力模型自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 值对应的调色板颜色 value (number) 值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求数据结构示例 [{ \"id\": \"hdm\", \"bbox\": [488670.75, 2488165, 0, 491659.59375, 2490987.5, 344.58], \"valueRange\": [0, 3], \"dataSize\": [3854, 3516], \"waterDepth\":\"lgq_wDepth_2023-08-07_11-00.bin\", \"flowField\":\"velocties.bin\", \"dem\":\"dem.bin\", \"colors\": { \"gradient\": true, \"invalidColor\": [0, 0, 0, 1], \"colorStops\": [ { \"value\": 0, \"color\": [0, 0, 1, 1] }, { \"value\": 0.25, \"color\": [0, 1, 1, 1] }, { \"value\": 0.5, \"color\": [0, 1, 0, 1] }, { \"value\": 0.75, \"color\": [1, 1, 0, 1] }, { \"value\": 1, \"color\": [1, 0, 0, 1] } ] }] clear(fn) 删除场景中所有的HydrodynamicModel Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个HydrodynamicModel对象 Parameters: Name Type Description ids string | array 要删除的HydrodynamicModel对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array HydrodynamicModel对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取HydrodynamicModel的详细信息 Parameters: Name Type Description ids string | array 要获取的HydrodynamicModel对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hide(ids, fn) 隐藏HydrodynamicModel Parameters: Name Type Description ids string | array HydrodynamicModel对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示HydrodynamicModel Parameters: Name Type Description ids string | array HydrodynamicModel对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个HydrodynamicModel对象 Parameters: Name Type Description data object | array 构造二维水动力模型对象HydrodynamicModel的数据对象，参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"HydrodynamicModel2.html":{"id":"HydrodynamicModel2.html","title":"Class: HydrodynamicModel2","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_ er图层对象 Parameters: Name Type Description ids string | array 要删除的ImageryLayer对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 deleteVTPK(tileLayerId, fn) 删除叠加的VTPK标注 Parameters: Name Type Description tileLayerId string VTPK服务对应图层树上的ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array ImageryLayer图层对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hide(ids, fn) 隐藏一个或多个ImageryLayer图层对象 Parameters: Name Type Description ids string | array ImageryLayer对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 init(option, fn) 添加图层服务前需要先初始化相关参数 Parameters: Name Type Description option object 初始化对象，包含图层初始化环境配置和图层范围信息 xmlUrl (string) 必选，获取OGC标准服务的元数据能力文档（Capabilities XML文档）的URL地址，需包含图层、瓦片规则、请求参数等信息 layerName (string) 必选，图层名称 tileMatrixName (string) 必选，如果服务类型是WMTS：tileMatrixName是切片方案，如果服务类型是WMS：tileMatrixName是坐标类型 ogcEPSG (string) 必选，坐标系类型 cachePath (string) 必选，缓存路径 mapMode (boolean) 必选，大地图true，小地图false，默认：小地图false renderMode (number) 必选，渲染模式，取值范围：0：正常（默认值）；1：透明；2：标注；3：贴地 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setDrawBottom(id, fn) 设置ImageryLayer图层置底显示 Parameters: Name Type Description id string 置于底部显示的ImageryLayer图层对象的ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setDrawOrder(currentLayerId, targetLayerId, fn) 设置两个ImageryLayer图层的绘制顺序，即移动当前ImageryLayer图层到目标ImageryLayer图层的上方位置显示 Parameters: Name Type Description currentLayerId string 当前ImageryLayer图层对象的ID，即设置成功后此图层会在目标图层的上方位置显示 targetLayerId string 目标ImageryLayer图层对象的ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setDrawTop(id, fn) 设置ImageryLayer图层置顶显示 Parameters: Name Type Description id string 置于顶部显示的ImageryLayer图层对象的ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setVTPKVisable(tileLayerId, visible, fn) 设置叠加的VTPK标注可见性 Parameters: Name Type Description tileLayerId string VTPK服务对应图层树上的ID visible boolean 服务可见性，布尔类型 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示一个或多个ImageryLayer图层对象 Parameters: Name Type Description ids string | array ImageryLayer对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"ImageryLayer2.html":{"id":"ImageryLayer2.html","title":"Class: ImageryLayer2","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI nfoTree Layers, 图层树相关的操作 一般通过api.infoTree调用其方法 &lt;protected&gt; new InfoTree() See: DigitalTwinAPI#infoTree Methods callBPFunction(data, fn) 调用图层树上对象包含的多个蓝图函数，注意：可以根据图层树上的对象id查询包含的所有蓝图函数 fdapi.misc.getBPFunction(id); Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 图层树上对象的ID functionName (string) 蓝图函数名 parameters (array) 蓝图函数包含的多个参数，可选参数，数组类型，注意：传入多参数的顺序与类型务必与蓝图函数的参数顺序及其参数类型一致以保证执行结果符合预期。多个参数结构示例：[{\"paramType\":BPFuncParamType.String,\"paramValue\":\"示例值\"},{\"paramType\":BPFuncParamType.Bool,\"paramValue\":false},{\"paramType\":BPFuncParamType.Float,\"paramValue\":100.8}] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 蓝图函数调用示例代码 注意：被调用函数传入的参数类型、参数顺序都必须和蓝图函数的参数类型、顺序完全保持一致！ fdapi.infoTree.callBPFunction([ { id: '2BC267114D436EA43BF695AC98DA4E08', functionName: '颜色', parameters: [ { \"paramType\": 16, \"paramValue\": \"红色\" } ] }, { id: '2BC267114D436EA43BF695AC98DA4E08', functionName: '状态', parameters: [ { \"paramType\": 5, \"paramValue\": \"载货\" } ] } ]); deleteByGroupId(groupId, fn) 通过GroupId删除各类API创建的对象 Parameters: Name Type Description groupId string 创建对象时指定的groupId fn function 可选的回调函数，请参考二次开发：异步接口调用方式 disableXRay(ids, fn) 禁用X光 Parameters: Name Type Description ids string | array 待禁用X光的图层ID（支持单个ID或ID数组） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 enableXRay(ids, color, fn) 启用X光 Parameters: Name Type Description ids string | array 待启用X光的图层ID（支持单个ID或ID数组） color Color 颜色，支持四种格式，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array 图层树对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(fn) 获取图层树信息 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 图层树数据结构 [{ \"iD\": \"ProjectTree_Root\", \"index\": 0, \"parentIndex\": -1, \"name\": \"世界\", \"visiblity\": true, \"type\": \"EPT_Folder\" }] 图层返回type字段说明： 文件夹：EPT_Folder 场景：EPT_Scene 场景模型：EPT_ModelActor 测量：EPT_Measurement 剖切体：EPT_Cut 动态水：EPT_DynamicWater 车辆：EPT_Vehicle 标签：EPT_Tag 灯光：EPT_L DigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: Light Light Light光源对象，实现对光源对象的操作 一般通过api.light调用其方法 new Light() See: DigitalTwinAPI#light Extends BaseObject Methods add(data, fn) 添加一个或多个光源对象 注意：当批量添加多个光源时，渲染阴影效果会非常耗性能，建议默认关闭 Parameters: Name Type Description data object | array 动态标记的数据，可以是Object类型或者Array类型，对于每一个Light对象，支持以下属性： id (string) 光源的唯一标识符ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 type (number) 光源类型: 1点光源 2聚光源 3矩形光源 coordinateType (number) 坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 coordinates (array) 光源位置坐标，二维数组，光源类型是点光源和聚光源时参数为单个坐标点： [[X,Y,Z]]，光源类型是矩形光源时参数为包含起始点的坐标数组：[[X1,Y1,Z1], [X2,Y2,Z2]]，取值示例 color (array) 光源颜色，支持四种格式，取值示例 rotation (array) 光源旋转角度：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值]，默认值：[0,0,0] intensity (number) 光源亮度，单位：烛光，取值范围：[0~任意数值]，默认值：8 distance (number) 光源的可视距离，单位：米，取值范围：[1~任意正数]，默认值：5000米 attenuationRadius (number) 光源衰减半径，单位：米，取值范围：[0~任意数值] castShadows (boolean) 光源是否开启阴影效果，注意：当添加多个光源时非常耗性能，默认关闭false outerConAngle (number) 可选参数，聚光源投射的扇形夹角，单位：度，取值范围：[0~180]，默认值：45度，仅光源类型为聚光源时(type=2)生效 thickness (number) 可选参数，矩形光源的宽度，单位：米，取值范围：[0.1~20000]，默认值：3米，仅光源类型为矩形光源时(type=3)生效 automate (boolean) 可选参数，是否根据系统时间自动开关，即开启后晚上自动亮白天自动灭，默认值：true fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 清空场景中所有的光源对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个光源对象 Parameters: Name Type Description ids string | array 要删除的光源对象ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array 光源对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据光源ID获取光源的详细信息 Parameters: Name Type Description ids string | array 要获取的光源对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回Light的详细信息 属性详情参见add方法参数 { \"id\": \"light_1\", \"groupId\": \"\", \"userData\": \"\", \"rotation\": [0.000000, 0.000000, 0.000000], \"type\": 1, \"intensity\": 20000.000000, \"distance\": 1000, \"outerConAngle\": 45.000000, \"attenuationRadius\": 100000.000000, \"castShadows\": 0, \"thickness\": 3.000000, \"color\": [0.000000, 1.000000, 0.000000, 1.000000] } hide(ids, fn) 隐藏光源 Parameters: Name Type Description ids string | array 光源对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideAll(fn) 隐藏所有光源 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示光源 Parameters: Name Type Description ids string | array 光源对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showAll(fn) 显示所有光源 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个光源对象，支持更新以下属性： Parameters: Name Type Description data data | array 光源对象或对象数组，支持更新以下属性： id (string) 根据Light对象ID更新以下属性 groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 coordinates (array) 光源位置坐标，二维数组，光源类型是点光源和聚光源时参数为单个坐标点： [[X,Y,Z]]，光源类型是矩形光源时参数为包含起始点的坐标数组：[[X1,Y1,Z1], [X2,Y2,Z2]]，取值示例 color (array) 光源颜色，支持四种格式，取值示例 rotation (array) 光源旋转角度：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值]，默认值：[0,0,0] intensity (number) 光源亮度，单位：烛光，取值范围：[0~任意数值]，默认值：8 distance (number) 光源的可视距离，单位：米，取值范围：[1~任意正数]，默认值：5000米 attenuationRadius (number) 光源衰减半径，单位：米，取值范围：[0~任意数值] castShadows (boolean) 光源是否开启阴影效果，注意：当添加多个光源时非常耗性能，默认关闭false outerConAngle (number) 可选参数，聚光源投射的扇形夹角，单位：度，取值范围：[0~180]，默认值：45度，仅光源类型为聚光源时(type=2)生效 thickness (number) 可选参数，矩形光源的宽度，单位：米，取值范围：[0.1~20000]，默认值：3米，仅光源类型为矩形光源时(type=3)生效 automate (boolean) 可选参数，是否根据系统时间自动开关，即开启后晚上自动亮白天自动灭，默认值：true fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Marker.html":{"id":"Marker.html","title":"Class: Marker","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: Marker Marker 标注点，实现对标注对象的操作 一般通过api.marker调用其方法 Marker标注点的效果图： new Marker() See: DigitalTwinAPI#marker Extends BaseObject Methods add(data, fn) 添加一个或多个标注点 调用时注意：单次创建的Marker对象数量不要超过5000个，在一个工程内创建的Marker对象总数量不要超过20万个。 Parameters: Name Type Description data object | array 标注点的数据，可以是Object类型或者Array类型，对于每一个标注点，支持以下属性： id (string) 标注点的唯一标识符 groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 coordinateType (number) 坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 coordinate (array) 标注点的位置坐标: [x, y, z]，取值示例 anchors (array) 锚点: [x, y]，设置Marker的聚焦图片位置的偏移，默认值：[0,0]，取值规则如下图： range (array) 可视范围: [近裁距离, 远裁距离]，默认值: [10, 10000] textRange (array) 文本可视范围: [近裁距离, 远裁距离]，默认值: [100, 6000] viewHeightRange (array) 可见高度范围：[最小可见高度, 远最大可见高度]，默认值: [-1000000000, 1000000000] rangeRatio (number) 可视范围的衰减因子，取值范围：[0~1]，仅在设置了viewHeightRange后才生效，会根据相机高度对可见距离进行衰减，相机高度=maxViewHeight时，marker的可见范围是range，相机高度下降到minViewHeight时marker的可见范围会线性衰减到rangeRatio*range imageSize (array) 图片的尺寸: [width, height]， 默认值[32,32] fixedSize (boolean) 图片是否固定尺寸，取值范围：false 自适应，近大远小，true 固定尺寸，默认值：false imagePath (string) 图片路径，支持gif动图，支持本地路径和网络路径，资源引入说明 hoverImagePath (string) 鼠标悬停时显示的图片路径，支持gif动图，支持本地路径和网络路径，资源引入说明 hoverImageSize (array) 鼠标悬停时显示的图片尺寸: [width, height]， 默认值：[0,0] 使用图片自身的尺寸，注意：如果设置的值比imageSize尺寸小，则默认使用imageSize的尺寸。 text (string) 显示的文字 useTextAnimation (boolean) 是否打开文字展开动画效果，默认值：true textOffset (array) 文本偏移: [x, y]，默认值：[0,0] fontSize (number) 字体大小，默认值：12 fontOutlineSize (number) 字体轮廓线大小，默认值：1 textBackgroundColor (Color) 文本背景颜色，默认值白色[1, 1, 1, 0.85]，支持四种格式，取值示例 fontColor (Color) 字体颜色，默认值：黑色Color.Black，支持四种格式，取值示例 fontOutlineColor (Color) 字体轮廓线颜色，默认值：黑色Color.Black，支持四种格式，取值示例 popupBackgroundColor (Color) 弹窗背景颜色， [1.0,1.0,1.0,0.1] ，支持四种格式，取值示例 popupURL (string) 弹窗HTML链接或者视频文件路径，也支持实时流媒体视频地址，资源引入说明 popupSize (array) 弹窗大小: [width, height]，默认值：[600,400] popupOffset (array) 弹窗偏移: [x, y]，默认值：[0,0] showLine (boolean) 标注点下方是否显示垂直牵引线，默认不显示：false lineSize (array) 牵引线粗细[width, height]，默认值：[0,0]，如果要显示牵引线，需要将该属性设置成非0值 lineColor (Color) 牵引线颜色，默认值：白色，支持四种格式，取值示例 lineOffset (array) 牵引线偏移: [x, y]，默认值：[0,0] autoHidePopupWindow (boolean) 是否自动关闭弹出窗口，默认值：true autoHideText (boolean) 打开弹窗时是否自动隐藏文字，默认值：true autoHeight (boolean) 自动判断下方是否有物体，设置正确高度，默认值：false。注意：如果Marker坐标的z值是0或者不设置，则自动判断位置下方是否有物体并进行贴合，如果z有值则相当于z方向的offset偏移 displayMode (number) 显示模式，默认值：4，取值说明如下： 0：相机移动不显示，参与避让聚合 1：相机移动时显示，参与避让聚合 2：相机移动时显示，不参与避让聚合 3：相机移动时不显示，不参与避让聚合 4：智能模式，根据当前相机高度自动适配以上模式，类似金字塔lod加载效果，内置默认规则:range范围的1%内取值2，大于1%小于10%取值1，大于10%取值0 5：聚合模式，聚合后点击聚合图标会返回被聚合的marker对象ids数组 autoDisplayModeSwitchFirstRatio (number) 智能模式时的显示模式切换时range参数的首段比例，仅在displayMode=4时生效，取值范围：[0.01~1.0)，默认值0.01，示例：如果range=[1,1000]，则在[1,10]范围内dislayMode=2 autoDisplayModeSwitchSecondRatio (number) 智能模式时的显示模式切换时range参数的第二段比例，仅在displayMode=4时生效，取值范围：[0.01~1.0)，默认值0.1，示例：如果range=[1,1000]，则在[10,100]范围内dislayMode=1，大于100则dislayMode=0 clusterByImage (boolean) 聚合时是否根据图片路径(imagePath)分类聚合显示，即当多个marker的imagePath路径参数相同时按路径对marker分类聚合 priority (number) 避让优先级，默认值：0，注意：值越大显示越靠上 occlusionCull (boolean) 是否参与遮挡剔除，注意：仅displayMode设置为0或1时，遮挡剔除才会生效 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 attachObject(data, fn) 设置Marker贴合模型对象进行移动，设置贴合后Marker会跟随模型一起平滑运动，支持的对象类型：CustomObject、Vehicle、Vehicle2、Train、Drone Parameters: Name Type Description data object | array 模型对象id和MarkerId的数据映射对象数组，可以是Object类型或者Array类型，对于每一个映射对象，支持以下属性： markerId (string) 标注Marker对象id objectId (string) 被贴合的对象id，支持的对象类型：CustomObject、Vehicle、Vehicle2、Train、Drone offset (array) 贴合的偏移量，[X,Y,Z]，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的标注 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个标注对象 Parameters: Name Type Description ids string | array 要删除的标注对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 deleteByGroupId(groupIds, fn) 根据分组ID删除Marker Parameters: Name Type Description groupIds string | array Marker创建时指定的分组ID或ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array 标注对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focusAll(distance, flyTime, rotation, fn) 自动定位到能观察所有Marker对象的合适距离 Parameters: Name Type Description distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取标注的详细信息 Parameters: Name Type Description ids string | array 要获取的标注对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回Marker的详细信息 { \"id\": \"m1\", \"groupId\": \"\", \"userData\": \"\", \"coordinateType\": 0, \"coordinate\": [495269.375000, 2491073.250000, 25.400000], \"anchors\": [-16.000000, 32.000000], \"range\": [10.000000, 10000.000000], \"textRange\": [100.000000, 6000.000000], \"imageSize\": [28.000000, 28.000000], \"imagePath\": \"C:\\\\Users\\\\Administrator\\\\AppData\\\\Roaming\\\\Cloud\\\\SDK/images/tag.png\", \"hoverImagePath\": \"C:\\\\Users\\\\Administrator\\\\AppData\\\\Roaming\\\\Cloud\\\\SDK/images/hilightarea.png\", \"hoverImageSize\": [28.000000, 28.000000], \"text\": \"北京银行\", \"textOffset\": [0.000000, 0.000000], \"fontSize\": 12, \"fontOutlineSize\": 1, \"textBackgroundColor\": [1.000000, 1.000000, 1.000000, 1.000000], \"fontColor\": [1.000000, 0.000000, 0.000000, 1.000000], \"fontOutlineColor\": [1.000000, 0.000000, 0.000000, 1.000000], \"popupUrl\": \"C:\\\\Users\\\\Administrator\\\\AppData\\\\Roaming\\\\Cloud\\\\SDK/simple.html\", \"popupSize\": [600.000000, 400.000000], \"popupOffset\": [0.000000, 0.000000], \"popupBackgroundColor\": [1.000000, 1.000000, 1.000000, 0.100000], \"lineSize\": [2.000000, 100.000000], \"lineColor\": [0.200000, 0.700000, 0.400000, 1.000000], \"lineOffset\": [0.000000, 0.000000], \"autoHidePopupWindow\": 1, \"autoHeight\": 0, \"displayMode\": 0, \"priority\": 0, \"occlusioncull\": 0 } hide(ids, fn) 隐藏标注 Parameters: Name Type Description ids string | array 标注对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideAll(fn) 隐藏所有标注 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideAllPopupWindow(fn) 隐藏所有标注的弹出窗口 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideByGroupId(groupIds, fn) 根据分组ID隐藏Marker Parameters: Name Type Description groupIds string | array Marker创建时指定的分组ID或ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hidePopupWindow(ids, fn) 隐藏指定标注的弹出窗口 Parameters: Name Type Description ids string | arr
