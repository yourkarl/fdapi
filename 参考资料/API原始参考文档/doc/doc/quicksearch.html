错误码 之前no_free_instance的代码定义为1013，当发送这个错误码时，在iOS平台上，收到的确实1005， 所以将此错误码重新定义为4010. Methods buildURL(url, params) → {string} 工具函数：拼接URL和查询参数 Parameters: Name Type Description url string 基础URL params Record.&lt;string, any&gt; 查询参数对象 Returns: 拼接后的完整URL Type string get(url [, options]) → {Promise.&lt;any&gt;} GET请求封装（简化调用） Parameters: Name Type Argument Default Description url string 请求地址 options Object &lt;optional&gt; {} 配置项（继承request的params/timeout/responseType等） Returns: 响应数据 Type Promise.&lt;any&gt; post(url [, data] [, options]) → {Promise.&lt;any&gt;} POST请求封装（简化调用） Parameters: Name Type Argument Default Description url string 请求地址 data any &lt;optional&gt; null 请求体数据 options Object &lt;optional&gt; {} 配置项（继承request的params/timeout/responseType等） Returns: 响应数据 Type Promise.&lt;any&gt; request(config) → {Promise.&lt;any&gt;} 通用请求核心方法（参考标准库设计） Parameters: Name Type Description config Object 请求配置 Properties Name Type Argument Default Description url string 请求地址 method string &lt;optional&gt; 'GET' 请求方法 params Record.&lt;string, any&gt; &lt;optional&gt; {} URL查询参数 data any &lt;optional&gt; null 请求体数据 headers Record.&lt;string, string&gt; &lt;optional&gt; {} 请求头 timeout number &lt;optional&gt; 10000 超时时间（ms） responseType string &lt;optional&gt; 'json' 响应解析类型（json/text/blob/arrayBuffer/formData） Returns: 解析后的响应数据 Type Promise.&lt;any&gt; SM3() 国密SM3加密{JS实现} 参考 https://blog.csdn.net/Shen_yuanjia/article/details/111879819 Returns: sm3Digest(msg) SM3加密主函数 Parameters: Name Type Description msg Returns: × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"classes.list.html":{"id":"classes.list.html","title":"Classes","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFi dAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode SDK 一套基于JavaScript语言开发的二次开发接口，针对Web前端开发人员使用，用于在现代浏览器加载和展示由引擎渲染的三维视频流，可以通过调用相关API接口与云渲染的三维场景进行便捷交互，目前API兼容当前主流前端框架，如Vue.js、React.js和Angular.js等。 二次开发：快速入门 初始化第一个场景 Hello World 二次开发：进阶学习 理解基础概念 二次开发：在一个页面中嵌入多个视频流窗口 二次开发：异步接口三种调用方式 二次开发：关于事件交互系统的说明 二次开发：关于设置相机位置的三种形式 二次开发：关于坐标数组格式的说明 二次开发：关于颜色格式的说明 二次开发：外部资源引入说明 API之ontick功能使用说明 付费接口：需单独授权的接口说明 API Revisions：接口修改记录 SDK API结构概览 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Antenna.html":{"id":"Antenna.html","title":"Class: Antenna","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: Antenna Antenna 天线方向图对象，提供Antenna对象的操作方法 一般通过api.antenna调用 new Antenna() See: DigitalTwinAPI#antenna Extends BaseObject Methods add(data, fn) 添加一个或多个天线方向图对象 Parameters: Name Type Description data object | array 天线方向图包含的数据对象，可以是Object类型或者Array类型，对于每一个Antenna对象，支持以下属性： id (string) 天线方向图的唯一标识符ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 coordinateType (number) 坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 coordinate (array) 位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] rotation (array) 坐标系旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] radius (number) 天线方向图半径 radiationRange (array) 可选，辐射取值范围 radiationOffset (array) 溢出位置偏移，[X,Y] grid (object) 网格对象，包含以下属性 values (array) 网格热力值数组，二维数组，注意两个数组元素的长度相乘应该等于信号增益（gain）的长度，取值示例：[[val1,val2],[val3,val4,val5]] 即gain.length = 2*3 colors (object) 配色卡信息，包含以下属性 gradient (boolean) 颜色是否渐变 invalidColor (array) 无效像素点的默认颜色，默认白色 colorStops (array) 色卡数组，包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求代码示例 { \"id\": \"radiationPattern\", \"coordinate\": [ 494479.71875, 2491462.25, 2.11 ], \"rotation\": [ 0, 0, 0 ], \"radius\": 5, \"radiationRange\": [ 0, 100 ], \"radiationOffset\": [ -5, 5 ], \"grid\": { \"values\": [ 1, 2, 3, 4, 5, 6 ] }, \"colors\": { \"gradient\": true, \"invalidColor\": [ 0, 0, 0, 1 ], \"colorStops\": [ { \"value\": 0, \"color\": [ 0, 0, 1, 1 ] }, { \"value\": 0.25, \"color\": [ 0, 1, 1, 1 ] }, { \"value\": 0.5, \"color\": [ 0, 1, 0, 1 ] }, { \"value\": 0.75, \"color\": [ 1, 1, 0, 1 ] }, { \"value\": 1, \"color\": [ 1, 0, 0, 1 ] } ] } } clear(fn) 清空场景中所有的天线方向图对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个天线方向图对象 Parameters: Name Type Description ids string | array 要删除的天线方向图对象ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array 天线方向图对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据天线方向图ID获取天线方向图的详细信息 Parameters: Name Type Description ids string | array 要获取的天线方向图对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回天线方向图的详细信息 属性详情参见add方法参数 { \"id\": \"Antenna_1\", \"groupId\": \"\", \"userData\": \"\", \"coordinateType\": 0, \"coordinate\": [1000,1000,1000], \"radius\": 100, \"radiationRange\": [1, 300], \"radiationOffset\": [-5,5] ... } hide(ids, fn) 隐藏天线方向图 Parameters: Name Type Description ids string | array 天线方向图对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示天线方向图 Parameters: Name Type Description ids string | array 天线方向图对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个天线方向图对象 Parameters: Name Type Description data object | array 天线方向图对象或对象数组，参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"BaseObject.html":{"id":"BaseObject.html","title":"Class: BaseObject","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: BaseObject BaseObject 三维对象的父类 &lt;protected&gt; new BaseObject() Methods updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"BattlefieldSimulation.html":{"id":"BattlefieldSimulation.html","title":"Class: BattlefieldSimulation","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: BattlefieldSimulation BattlefieldSimulation BattlefieldSimulation类，提供军事领域战场仿真对象相关的操作，包含装甲车、坦克、无人机、士兵等作战单元 一般通过api.battlefieldSimulation调用其方法 &lt;protected&gt; new BattlefieldSimulation() See: DigitalTwinAPI#battlefieldSimulation Extends BaseObject Methods add(battlefieldSimulation, fn) 初始化一个BattlefieldSimulation对象 展示效果如下动图： Parameters: Name Type Description battlefieldSimulation object 战场仿真对象，支持以下属性： id (string) BattlefieldSimulation对象的ID groupId (string) 可选，Group分组Id userData (string) 可选，用户自定义数据 coordinateType (number) 可选，坐标系类型，取值：0为Projection类型，1为WGS84类型，默认值：0 noiseThreshold (number) 可选，车辆摆头的降噪距离，单位：米，默认值：0.05 delay (number) 可选，控制车辆移动的延迟时间，单位：秒，默认值：0.5，设置0则不延时立刻移动 timer (boolean) 设置为false使用dat数据内的时间字段time，设置为true则使用定时器的时间间隔，默认：false， models (array) 战场仿真包含的作战单元对象模型类型数组，注意：只需要在add()方法执行时配置，每一个数组元素对象包含属性如下： type (number) 车辆类型，注意这个数值会写入更新方法使用的.dat文件内。 package (string) 资源库车辆载具路径，取值类似CustomObject对象的assetPath，示例值：'/AirCityPlugin/ArtResources/Traffic/SUVTemplete' fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求参数示例 { \"id\": \"traffic\", \"coordinateType\": 1, \"groupId\": \"groupAll\", \"userData\": \"战场仿真\", \"delay\": 1, \"noiseThreshold\": 0.05, //车辆降噪距离 \"timer\": false,// 禁用定时器时间间隔，使用dat数据内的time字段 \"models\": [ { \"type\": 1, \"package\": \"/AirCityPlugin/ArtResources/Traffic/SUVTemplete\" }, { \"type\": 2, \"package\": \"/JC_CustomAssets/VehicleLibrary/Exhibition/公交车_04\" }, { \"type\": 3, \"package\": \"/JC_CustomAssets/VehicleLibrary/Exhibition/迷你巴士_01\" } ] } delete(ids, fn) 删除一个或多个BattlefieldSimulation对象 Parameters: Name Type Description ids string | array 要删除的BattlefieldSimulation对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, distanceRotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array BattlefieldSimulation对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] distanceRotation array 可选参数，跟车相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(battlefieldSimulation, fn) 更新一个时刻的BattlefieldSimulation对象 Parameters: Name Type Description battlefieldSimulation object 战场仿真对象，支持以下属性： id (string) BattlefieldSimulation对象的ID groupId (string) 可选，Group分组Id userData (string) 可选，用户自定义数据 file (string) 某个时刻的多辆车的轨迹点数据文件路径，包含：车辆id、车辆经度、车辆纬度、车辆类型、时间、车辆朝向。二进制文件格式(.dat)，包含内容如下：id(int 4字节),lon(double 8字节),lat(double 8字节),type(int 4字节),time(int 4字节),heading(float 4字节) coordinateType (number) 可选，坐标系类型，取值：0为Projection类型，1为WGS84类型，默认值：0 noiseThreshold (number) 车辆摆头的降噪距离，单位：米，默认值：0.05 timer (boolean) 设置为false使用dat数据内的时间字段time，设置为true则使用定时器的时间间隔，默认：false， fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求参数示例 { \"id\": \"traffic\", \"coordinateType\": 1, \"groupId\": \"\", \"userData\": \"\", \"file\": \"F:\\\\vehicle\\\\vehicle_\" + index + \".dat\", } updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Beam.html":{"id":"Beam.html","title":"Class: Beam","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: Beam Beam Beam相关的操作 一般通过api.beam调用其方法 &lt;protected&gt; new Beam() See: DigitalTwinAPI#beam Extends BaseObject Methods add(data, fn) 添加一个或多个Beam对象 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 字符串类型的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 duration (number) 光流粒子的生命周期，取值范围：[0.1~3.0]，单位：秒 thickness (number) 光流线的宽度，取值范围： [0.01~10.0]，单位：因Beam是粒子加上自发光不能精确单位,故目前按比例显示,需要精确单位的推荐使用Polyline interval (number) 光流粒子发射间隔，取值范围：[1.0~10.0]，单位：秒 velocity (number) 光流粒子的速度，取值范围：[0.1~5.0] color (Color) 光流的颜色，支持四种格式，取值示例 coordinates (array) 光流的polyline的坐标数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的Beam Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个Beam对象 Parameters: Name Type Description ids string | array 要删除的Beam对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array Beam对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取Beam的详细信息 Parameters: Name Type Description ids string | array 要获取的Beam对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example Beam的详细信息 { \"id\": \"1\", \"groupId\": \"\", \"userData\": \"\", \"duration\": 3.000000, \"thickness\": 0.800000, \"interval\": 0.500000, \"velocity\": 5.000000, \"color\": [1.000000, 0.000000, 0.000000], \"coordinates\": [[491599.500000, 2490045.000000, 11.304688], [492483.500000, 2490050.500000, 8.177969], [492621.187500, 2489262.500000, 11.311719]] } hide(ids, fn) 隐藏Beam Parameters: Name Type Description ids string | array Beam对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideAll(fn) 隐藏所有Beam Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setColor(id, newVal, fn) 设置Color Parameters: Name Type Description id string Beam对象的ID newVal Color 新颜色值，支持四种格式，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setCoordinates(id, newVal, fn) 设置Coordinates Parameters: Name Type Description id string Beam对象的ID newVal array 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setDuration(id, newVal, fn) 设置Duration Parameters: Name Type Description id any Beam对象的ID newVal any 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setInterval(id, newVal, fn) 设置Interval Parameters: Name Type Description id string Beam对象的ID newVal number 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setThickness(id, newVal, fn) 设置Thickness Parameters: Name Type Description id string Beam对象的ID newVal number 新厚度值，取值范围：[0.01-100] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setVelocity(id, newVal, fn) 设置Velocity Parameters: Name Type Description id string Beam对象的ID newVal number 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示Beam Parameters: Name Type Description ids string | array Beam对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showAll(fn) 显示所有Beam Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个Beam对象 Parameters: Name Type Description data object | array 数据结构，请参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"BoxTrigger.html":{"id":"BoxTrigger.html","title":"Class: BoxTrigger","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: BoxTrigger BoxTrigger BoxTrigger类的对象，提供当CustomObject对象或相机Camera对象进入和退出盒子热区范围触发事件相关的操作 一般通过api.BoxTrigger调用其方法 &lt;protected&gt; new BoxTrigger() See: DigitalTwinAPI#BoxTrigger Extends BaseObject Methods add(data, fn) 添加一个或多个BoxTrigger对象，当CustomObject对象或相机Camera对象进入和退出盒子热区范围触发事件相关的操作 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) BoxTrigger对象的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 coordinateType (number) 可选，坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 bbox (array) 绘制触发热区的包围盒范围，格式：[minX,minY,minZ,maxX,maxY,maxZ]，数组元素类型：[任意浮点数] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 以下为当CustomObject对象或者Camera相机对象进入或退出创建的盒子热区范围内触发返回的事件对象结构 CustomObject对象进入热区范围触发OnCustomObjectEnterTrigger事件 { \"triggerId\": \"TriggerID\", //盒子热区范围对象id \"eventtype\": \"OnCustomObjectEnterTrigger\", //事件类型 \"objectId\": \"CustomObjectID\" //自定义对象id } CustomObject对象退出热区范围触发OnCustomObjectExitTrigger事件 { \"triggerId\": \"TriggerID\", \"eventtype\": \"OnCustomObjectExitTrigger\", \"objectId\": \"CustomObjectID\" } Camera进入热区范围触发OnCameraEnterTrigger事件 { \"triggerId\": \"TriggerID\", \"eventtype\": \"OnCameraEnterTrigger\", } Camera退出热区范围触发OnCameraExitTrigger事件 { \"triggerId\": \"TriggerID\", \"eventtype\": \"OnCameraExitTrigger\", } clear(fn) 清空场景中所有的BoxTrigger对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个BoxTrigger对象，注意：删除对象后热区和对应触发事件均会删除 Parameters: Name Type Description ids string | array 要删除的BoxTrigger对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Camera.html":{"id":"Camera.html","title":"Class: Camera","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: Camera Camera Camera, 相机相关的操作 一般通过api.camera调用其方法 &lt;protected&gt; new Camera() See: DigitalTwinAPI#camera Methods cancelFollow(fn) 取消相机自动跟随，支持取消CustomObject、Vehicle、Vehicle2、Train等对象的自动跟随 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 enterWorld(fn) 进入世界（三维场景），即从地球飞入到三维场景 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 exitWorld(fn) 退出世界（三维场景），即从三维场景飞入到地球 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 exportOrthoImage(path, imageSize, orthoWidth, location, rotation, backGroundColor, fn) 根据传入的参数导出相机位置对应的正交投影图片 Parameters: Name Type Description path string 导出正交投影图片的磁盘保存路径，注意：目前出图支持png和jpg格式，此路径需要在渲染服务器端存在，因为导出图片文件保存在渲染服务器的磁盘上 imageSize array 导出正交投影图片的宽高分辨率：[width,height]，取值示例：[1920,1080] orthoWidth number 导出正交投影图片的景深长度，单位：米 location array 相机位置：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] rotation array 相机朝向欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0]，默认值：[0,90,0] backGroundColor Color 导出正交投影图片的背景颜色，默认值：黑色[0, 0, 0, 1]，支持四种格式，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 flyAround(location, rotation, distance, time, fn) 相机环绕指定位置旋转一周 Parameters: Name Type Description location array 必选，相机环绕位置：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] rotation array 可选，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0]，默认值：[0,90,0] distance number 可选，相机观察距离，单位：米，默认值：[1000] time number 可选，相机环绕一周的时间，取值范围：[0~任意正数]，单位：秒，默认值10秒 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(fn) 获取当前的相机位置 回调返回的数据格式如下： { \"x\": 491433.656250, \"y\": 2486907.500000, \"z\": 685.200928, \"pitch\": -38.999985, \"yaw\": -64.000023, \"roll\": 0.000000, \"camera\": [491433.656250, 2486907.500000, 685.200928, -38.999985, -64.000023, 0.000000] } camera属性值有6个元素，依次为 [X, Y, Z, Pitch, Yaw, Roll] x, y, z, pitch, yaw, roll几个值即可以在camera数组里取，也可以直接获取。 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example fdapi.camera.get( (r) =&gt; { var str = `Camera: ${r.x}, ${r.y}, ${r.z}, ${r.pitch}, ${r.yaw}`; //或者这样调用 var str = `Camera: ${r.camera.join(',')}`; log(str); }) getAnimationImage(name, fn) 根据导览名称获取对应导览缩略图的base64字符串，默认图片格式png，尺寸：128*128 Parameters: Name Type Description name string 导览名称，可以根据getAnimationList()方法获取 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回结果示例： { \"image\": \"base64示例内容太长......\" //image是导览缩略图的base64字符串 默认图片格式png，尺寸：128*128 } base64类型图片使用说明： //js可以直接把base64字符串设置为img标签的src属性值，代码示例如下： fdapi.camera.getAnimationImage(\"animationName1\").then(result=&gt;{ //设置base64类型图片 document.getElementById(\"img1\").setAttribute(\"src\",\"data:image/png;base64,\"+result.image); }); getAnimationList(fn) 获取当前acp里所有导览的信息 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 获取当前场景所有导览的列表 [{ \"id\": 0, \"name\": \"导览1\", \"type\": 0, //0导览 1动画 \"uuid\": \"E858A16A4E1940E76C916C80869B373F\", //唯一id \"filename\": \"AnimRecorder0.sav\", //导览文件名称 \"foldername\": \"导览目录\" //所在文件夹名称 acp工程内全局唯一 }, { \"id\": 1, \"name\": \"导览2\", \"type\": 0, //0导览 1动画 \"uuid\": \"5403B9254286B7EFE9A28DB6A7BC7A08\", //唯一id \"filename\": \"AnimRecorder1.sav\", //导览文件名称 \"foldername\": \"导览目录\" //所在文件夹名称 acp工程内全局唯一 }] getEulerAngle(startPoint, endPoint) 根据空间两点计算欧拉角 Parameters: Name Type Description startPoint 起始点坐标位置，取值示例 endPoint 结束点坐标位置，取值示例 Example 返回欧拉角数组： [Pitch,Yaw,Roll] 俯仰-Pitch：上下旋转角度，欧拉角向量的X轴，取值范围：[-90~+90] 航向-Yaw：左右旋转角度，欧拉角向量的Y轴，取值范围：[-180~+180] 翻滚-Roll：翻滚角度，欧拉角向量的Z轴 lockByBBox(bbox, fn) 锁定相机的交互范围，仅允许在BBox内交互 Parameters: Name Type Description bbox 即3D Bounding Box，3D物体的包围盒，用于表示三维物体坐标的取值边界，格式示例：[minX,minY,minZ,maxX,maxY,maxZ] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 lookAt(x, y, z, distance, pitch, yaw, flyTime, fn) 通过观察点设置相机位置 Parameters: Name Type Description x number 观察点坐标X y number 观察点坐标Y z number 观察点坐标Z distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 pitch number 上下旋转角度（俯仰），单位是度。可选参数，如果没有设置或者设置为0，系统会自动设置默认值。 yaw number 左右旋转角度（航向），单位是度。可选参数，如果没有设置或者设置为0，系统会自动设置默认值。 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example fdapi.camera.lookAt(-913.18, -10852.01, 82.49, 200.0, 90.0, -50.0); lookAtBBox(bbox, pitch, yaw, flyTime, fn) 通过BBox设置相机 Parameters: Name Type Description bbox array bounding box pitch number 上下旋转角度（俯仰），单位是度。 此参数可选，如果没有设置或者设置为0，系统会自动设置默认值。 yaw number 左右旋转角度（航向），单位是度。 此参数可选，如果没有设置或者设置为0，系统会自动设置默认值。 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example let bbox = [1083.27, -12907.29, 81.79, 1308.18, -12759.77, 201.51]; let yaw = 90.0; let pitch = -50.0; fdapi.camera.lookAtBBox(bbox, yaw, pitch); moveBackward(fn) 后退 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 moveDown(fn) 下降 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 moveForward(fn) 前进 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 moveLeft(fn) 左移 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 moveRight(fn) 右移 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 moveUp(fn) 上升 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 pauseAnimation(fn) 暂停播放动画导航 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 playAnimation(ids, mask, fn) 按传入索引序号的顺序播放一个或多个动画导览 Parameters: Name Type Description ids number | array 待播放的动画导览的索引编号或索引编号数组 mask number 可选，播放导览时传入对应掩码则使用录制导览时的工程对应设置，包含四类掩码：相机位置(Camera:0x1) 环境天气(Environment:0x2) 工程树属性(ProjectTree:0x4) 导览设置(Settings:0x8)，请参考 AnimationMask fn function 可选的回调函数，请参考二次开发：异步接口调用方式 resumeAnimation(fn) 恢复播放动画导航 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 set(x, y, z, pitch, yaw, flyTime, fn) 设置相机位置，这是最常见的参数形式，另外两种参数形式，请参考二次开发：关于设置相机位置的三种形式 Parameters: Name Type Description x number 坐标X y number 坐标Y z number 坐标Z pitch number 上下旋转角度（俯仰），单位是度。 此参数可选，如果没有设置或者设置为0，系统会自动设置默认值。 yaw number 左右旋转角度（航向），单位是度。 此参数可选，如果没有设置或者设置为0，系统会自动设置默认值。 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example fdapi.camera.set(-178.14, -8038.16, 250.47, -50.0, 90.0); stop(fn) 停止 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 stopAnimation(fn) 停止播放动画导航 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 turnDown(fn) 低头 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 turnLeft(fn) 左转 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 turnRight(fn) 右转 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 turnUp(fn) 抬头 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 unlock(fn) 解锁相机的交互范围，恢复自由交互 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 useOldDataFormat(bUse) 设置是否使用旧版本的数据格式（2021.03.17之前的版本），这是一个全局的设置。 受影响的方法有：camera对象的set、lookAt、lookAtBBox，以camera.set举例： 之前版本的方法定义如下：(x, y, z, heading, tilt, flyTime, fn) 现在的定义如下：set(x, y, z, pitch, yaw, flyTime, fn) 两个的区别就是heading(yaw), tilt(pitch)的顺序互换了一下 如果调用了useOldDataFormat()，可以让用户代码保持兼容（不用修改就可以在新版本上运行） Parameters: Name Type Description bUse boolean 可选参数，默认为true。 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"CameraTour.html":{"id":"CameraTour.html","title":"Class: CameraTour","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigita ng) 可选参数，替换材质的文件路径，UE工程里材质文件对应资源的相对路径，用于控制材质的不透明度和颜色等效果 scalarParameters (array) 可选参数，替换材质包含的数值参数，一般用来控制材质不透明度，包含name/value键值对的数组，其中name是字符串，value为数值 vectorParameters (array) 可选参数，替换材质包含的数组参数，一般用来控制材质颜色，包含name/value键值对的数组，其中name是字符串，value为数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的CustomMesh Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个CustomMesh对象 Parameters: Name Type Description ids string | array 要删除的CustomMesh对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array CustomMesh对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取CustomMesh的详细信息 Parameters: Name Type Description ids string | array 要获取的CustomMesh对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example CustomMesh的详细信息 { \"id\": \"sm1\", \"groupId\": \"\", \"userData\": \"\" } hide(ids, fn) 隐藏CustomMesh Parameters: Name Type Description ids string | array CustomMesh对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setColor(id, newVal, fn) 设置颜色 Parameters: Name Type Description id string 唯一标识符 newVal Color 新颜色值，支持四种格式，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setCoordinates(id, newVal, fn) 设置顶点坐标 Parameters: Name Type Description id string 唯一标识符 newVal array 新的顶点坐标，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setIndices(id, newVal, fn) 设置顶点索引 Parameters: Name Type Description id string 唯一标识符 newVal array 新顶点坐标的索引，数组元素类型：(number)，数组元素取值范围：[0~coordinates.length-1]，取值示例：[2, 0, 3, 0, 2, 1] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示CustomMesh Parameters: Name Type Description ids string | array CustomMesh对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个CustomMesh对象 Parameters: Name Type Description data object | array CustomMesh数据，参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"CustomObject.html":{"id":"CustomObject.html","title":"Class: CustomObject","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: CustomObject CustomObject CustomObject类，提供用户自定义对象相关的操作 一般通过api.customObject调用其方法 &lt;protected&gt; new CustomObject() See: DigitalTwinAPI#customObject Extends BaseObject Methods add(data, fn) 添加一个或多个CustomObject对象 路径参数assetPath获取方法如下动图： Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) CustomObject对象的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 pakFilePath (string) pak文件路径，资源引入说明 assetPath (string) 蓝图Actor在UE工程的资源引用目录（相对路径），注意：模型必须是蓝图Actor类，即在使用UE打包pak文件时此自定义对象在UE工程内的相对路径 range (array) 可视范围: [近裁距离, 远裁距离]，默认值: [0, 10000] location (array) 模型位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] coordinateType (number) 坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 rotation (array) 世界坐标系旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] localRotation (array) 模型自身旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] isEffectRotation (boolean) 模型是否开启旋转效果，注意：支持startMove()和moveTo()方法调用时生效 scale (array) 模型缩放：[X,Y,Z]，数组元素类型：(number)，取值范围：[任意正整数] smoothMotion (number) 模型移动动画效果，1: 平滑移动，0: 跳跃移动 enableDecal (boolean) 可选，是否支持贴画贴合，默认值：true visible (boolean) 可选，设置自定义对象加载后是否显示，默认：true autoHeight (boolean) 可选，是否开启自动高度，默认值：false，注意：开启后自动贴地不再使用模型坐标Z collision (boolean) 可选，设置自定义对象加载后是否开启碰撞，默认：true curveType (number) 可选，路径模型绘制时曲线的插值类型，取值范围：[0,1]，默认值：0 segment (number) 可选，路径模型的绘制时曲线的插值的分段数量，默认值：10 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addByTileLayer(data, fn) 把TileLayer图层中包含的一个或多个(Actor)模型复制为一个CustomObject对象 注意：仅支持engine发布的3dt，且仅支持从默认样式的TileLayer图层，如果设置了3dt图层样式，请使用tileLayer.setStyle()接口恢复默认样式再调用复制接口 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) CustomObject对象的ID tileLayerId (string) TileLayer图层的ID objectId (string | array) TileLayer图层中包含的待复制的模型(Actor)的ObjectId，同时也支持数组类型参数即把多个actor复制为一个customObject location (array) 可选，复制模型的位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值]，注意：不传此参数会使用原始Actor的位置坐标值 coordinateType (number) 可选，坐标系类型，取值：0为Projection类型，1为WGS84类型，默认值：0 rotation (array) 可选，复制模型的旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值]，注意：不传此参数会使用原始Actor的旋转值 scale (array) 可选，复制模型的缩放：[X,Y,Z]，数组元素类型：(number)，取值范围：[任意正整数]，注意：不传此参数会使用原始Actor的缩放值 smoothMotion (number) 可选，运动时是否平滑差值，取值范围：1: 平滑插值，0: 跳跃，默认值：0 visible (boolean) 可选，复制模型完成后是否显示，默认：true fn function 可选的回调函数，请参考二次开发：异步接口调用方式 callBPFunction(data, fn) 批量方法，调用多个CustomObject对象的多个蓝图函数 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) CustomObject对象的ID functionName (string) 蓝图函数名 parameters (array) 蓝图函数包含的多个参数，可选参数，数组类型，注意：传入多参数的顺序与类型务必与蓝图函数的参数顺序及其参数类型一致以保证执行结果符合预期。多个参数结构示例：[{\"paramType\":BPFuncParamType.String,\"paramValue\":\"示例值\"},{\"paramType\":BPFuncParamType.Bool,\"paramValue\":false},{\"paramType\":BPFuncParamType.Float,\"paramValue\":100.8}] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 蓝图函数调用示例代码 注意：被调用函数传入的参数类型、参数顺序都必须和蓝图函数的参数类型、顺序完全保持一致！ fdapi.customObject.callBPFunction([ { id: 'truck', functionName: '状态', parameters: [ { \"paramType\": 0, \"paramValue\": 1 }, { \"paramType\": 0, \"paramValue\": 1 } ] } ]); clear(fn) 删除场景中所有的CustomObject Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 cutFloor(obj, fn) 把一个CustomObject类型的楼宇模型按层高拆分为若干个指定的楼层 注意：仅支持CustomObject类型的楼宇模型 Parameters: Name Type Description obj object 对象数据结构，支持以下属性： id (string) CustomObject对象的ID hideOriginal (boolean) 可选，是否隐藏被拆分的原始楼宇模型，默认值：true floors (array) 楼宇模型按楼层高度进行拆分的配置规则数组，每一个数组对象包含的属性如下： id (string) 拆分后的楼层CustomObject对象的ID minHeight (number) 当前拆分楼层的底面高度 maxHeight (number) 当前拆分楼层的顶面高度 floorMaterial (object) 楼宇模型拆分后的楼层模型的底面材质配置参数： material (string) 可选，替换底面材质的文件路径，材质文件对应资源的相对路径 scalarParameters (array) 可选，替换底面材质数值类型参数数组，包含name/value键值对的数组，其中value为数值 vectorParameters (array) 可选，替换底面材质矢量类型参数数组，包含name/value键值对的数组，其中value为数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 代码结构示例如下： { id: \"building_001\", hideOriginal: false, floors: [ { id: \"floor1\", minHeight: 0, maxHeight: 3 }, { id: \"floor2\", minHeight: 3, maxHeight: 6 }, { id: \"floor3\", minHeight: 6, maxHeight: 9 } ], floorMaterial: { material: \"/building/Temp/MaterialA\", scalarParameters: [{ \"name\": \"亮度\", \"value\": 1.0 }, { \"name\": \"不透明度\", \"value\": 1.0 }], vectorParameters: [{ \"name\": \"颜色1\", \"value\": [1, 1, 1, 1] }, { \"name\": \"颜色2\", \"value\": [1, 1, 0, 1] }] } } delete(ids, fn) 删除一个或多个CustomObject对象 Parameters: Name Type Description ids string | array 要删除的CustomObject对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, actionMode, offset, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array CustomObject对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离， 该值有以下3种情况： 1. 如果distance小于0，则是相机跟随移动模式 2. 如果distance等于0，则自动计算飞到合适的距离 3. 如果distance大于0，则是飞到指定距离的位置 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] actionMode ActionMode 可选参数，相机视角跟随模式枚举，注意：如果指定了rotation参数同时又指定了跟随枚举，则枚举值包含的相机欧拉角会覆盖rotation参数，若使用FollowWorldRotation则不覆盖rotation参数 offset array 可选参数，相机视角的偏移量，取值示例：[X, Y, Z]，分别是三个方向的偏移量，单位：米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取CustomObject的详细信息 Parameters: Name Type Description ids string | array 要获取的CustomObject对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example CustomObject的详细信息 [{ \"id\": \"o1\", \"groupId\": \"\", \"userdata\": \"\", \"coordinatetype\": 144, \"tileLayerId\": \"C:\\\\Users\\\\Administrator\\\\AppData\\\\Roaming\\\\Cloud\\\\SDK/media/pak/custom.pak\", \"objectId\": \"/Game/Common/Asset_Bank/Mesh/Car/BP_Car_JiuHuChe\", \"location\": [495490.906250, 2490908.000000, 0.250098], \"rotation\": [0.000000, 0.000000, 0.000000], \"scale\": [1.000000, 1.000000, 1.000000] }] getBPFunction(ids, fn) 根据自定义模型id查询自定义模型包含的蓝图函数信息 Parameters: Name Type Description ids string | array customObject对象的id或id数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回结果示例： [{ \"idOrPath\": \"co1\", \"objectType\": \"Actor\", \"params\": [{ \"functionName\": \"特效\", \"functionParams\": [{ \"name\": \"点特效样式\", \"type\": 16, \"defaultValue\": \"\" }, { \"name\": \"线特效样式\", \"type\": 16, \"defaultValue\": \"\" }] }, { \"functionName\": \"图标\", \"functionParams\": [{ \"name\": \"图标样式\", \"type\": 16, \"defaultValue\": \"\" }, { \"name\": \"图标背景\", \"type\": 16, \"defaultValue\": \"\" }] }, { \"functionName\": \"动画\", \"functionParams\": [{ \"name\": \"启用动画\", \"type\": 0, \"defaultValue\": 0 }, { \"name\": \"反向动画\", \"type\": 0, \"defaultValue\": 0 }] }, { \"functionName\": \"文字\", \"functionParams\": [{ \"name\": \"文字内容\", \"type\": 5, \"defaultValue\": \"\" }, { \"name\": \"文字大小\", \"type\": 2, \"defaultValue\": 0 }, { \"name\": \"背景颜色\", \"type\": 6, \"defaultValue\": [1.000000, 1.000000, 1.000000, 1.000000] }, { \"name\": \"背景倒角\", \"type\": 3, \"defaultValue\": 0.000000 }] }] }] glow(data, fn) 闪烁 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) CustomObject对象的ID color (Color) 闪烁的颜色，支持四种格式，取值示例 duration (number) 闪烁持续时间，单位：秒，取值范围：[0.01~任意正数] interval (number) 闪烁间隔时间，单位：秒，取值范围：[0.01~任意正数]，注意：间隔时间要小于持续闪烁时间 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hide(ids, fn) 隐藏CustomObject Parameters: Name Type Description ids string | array CustomObject对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideByGroupId(groupId, fn) 根据分组ID隐藏自定义对象自定义对象 Parameters: Name Type Description groupId string 自定义对象创建时指定的分组ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 highlight(ids, fn) 高亮 Parameters: Name Type Description ids string | array CustomObject对象的ID或者数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 moveTo(data, fn) 设置CustomObject对象运动（根据实时获取的GPS数据运动） Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) CustomObject对象的ID location (array) 位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] rotation (array) 模型旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] smoothTime {number} 可选，平滑移动的插值时间，仅在smoothMotion=1即平滑移动下生效，注意：传值若为0则根据调用setLocation()接口的时间自动计算平滑移动的插值时间，默认值：1，单位：秒 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求参数结构示例 [{ \"id\":\"co1\", \"location\":[2768.1734375,-2264.37375,6.5], \"rotation\":[0,90,0], \"smoothTime\":5 }] overrideMaterial(data, fn) 替换CustomObject对象材质 Parameters: Name Type Description data object | array 替换CustomObject对象材质的详细信息，支持对象或数组，对于每一个对象支持以下属性： id (string) 必选参数，CustomObject对象的ID material (string) 可选参数，替换材质的文件路径，材质文件对应资源的相对路径 scalarParameters (array) 可选参数，替换材质数值类型参数数组，包含name/value键值对的数组，其中value为数值 vectorParameters (array) 可选参数，替换材质矢量类型参数数组，包含name/value键值对的数组，其中value为数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求参数调用说明 构造请求参数须知： 1、如果不传入material参数，注意：不传入material参数的前提是已经用对应材质执行过当前overrideMaterial()方法， 则需要传入材质对应的scalarParameters或vectorParameters参数，才会执行对应的材质参数进行替换； 2、如果只传入material参数，不传入对应的scalarParameters或vectorParameters参数，则会使用替换材质包含的默认材质参数； 3、如果同时传入material、scalarParameters、vectorParameters参数，则使用指定的材质和指定的材质参数进行材质替换 请求参数示例： [{ \"id\":\"o1\", \"material\":\"/Game/Temp/MaterialA\", \"scalarParameters\":[{\"name\":\"scalar1\",\"value\":1.0},{\"name\":\"scalar2\",\"value\":2.0}], \"vectorParameters\":[{\"name\":\"vector1\",\"value\":[1,1,1,1]},{\"name\":\"vector2\",\"value\":[2,2,2,2]}] }, { \"id\":\"o2\", \"material\":\"/Game/Temp/MaterialB\", \"scalarParameters\":[{\"name\":\"Param1\",\"value\":3.0},{\"name\":\"Param2\",\"value\":4.0}], \"vectorParameters\":[{\"name\":\"Param3\",\"value\":[3,3,1,3]},{\"name\":\"Param4\",\"value\":[4,2,2,2]}] }] pause(ids, fn) 暂停指定自定义对象按轨迹点移动 Parameters: Name Type Description ids string | array 自定义对象ID或ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 restoreMaterial(ids, fn) 恢复指定自定义对象的材质 Parameters: Name Type Description ids string | array CustomObject对象的ID或者数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 resume(ids, fn) 恢复指定自定义对象按轨迹点移动 Parameters: Name Type Description ids string | array 自定义对象ID或ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setLocalRotation(id, newVal, fn) 设置模型自身的旋转 Parameters: Name Type Description id string CustomObject对象的ID newVal array 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setLocation(id, newVal, smoothTime, fn) 设置位置 Parameters: Name Type Description id string CustomObject对象的ID newVal array 新的位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] smoothTime number 可选，平滑移动的插值时间，仅在smoothMotion=1即平滑移动下生效，注意：传值若为0则根据调用setLocation()接口的时间自动计算平滑移动的插值时间，默认值：1，单位：秒 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setMoveRate(data, fn) 设置指定自定义对象对应的移动倍速 Parameters: Name Type Description data object | array 设置自定义对象对应的移动倍速的对象或数组，每个对象包含以下属性： id (string) 自定义对象ID rate (number) 自定义对象的移动倍速，默认值：1（一倍速按设置时间正常移动），取值范围：[0~任意正数]，2.2即2.2倍速移动，3即3倍速移动，支持小数。 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setRotation(id, newVal, fn) 设置世界坐标系旋转 Parameters: Name Type Description id string CustomObject对象的ID newVal array 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setScale(id, newVal, fn) 设置缩放 Parameters: Name Type Description id string CustomObject对象的ID newVal array 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setSmoothMotion(id, newVal, fn) 设置是平滑插值还是跳跃， 0：跳跃， 1：平滑差值 Parameters: Name Type Description id string CustomObject对象的ID newVal number 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setSmoothTime(id, smoothTime, fn) 设置平滑移动的插值时间 Parameters: Name Type Description id string CustomObject对象的ID smoothTime number 可选，平滑移动的插值时间，仅在smoothMotion=1即平滑移动下生效，注意：传值若为0则根据调用setLocation()接口的时间自动计算平滑移动的插值时间，默认值：1，单位：秒 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setTintColor(ids, newColor, fn) 设置模型叠加颜色 Parameters: Name Type Description ids string | array CustomObject对象的ID或者数组 newColor Color 新颜色值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setViewportVisible(id, vp, fn) 多视口状态下，设置CustomObject对象在各视口的可见性 Parameters: Name Type Description id string CustomObject对象的ID vp Viewport 视口掩码（Viewport位运算） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示CustomObject Parameters: Name Type Description ids string | array CustomObject对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showByGroupId(groupId, fn) 根据分组ID显示自定义对象 Parameters: Name Type Description groupId string 自定义对象创建时指定的分组ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showGrowth(data, fn) 模拟从3dt中复制的CustomObject对象的生长动画效果 注意：仅支持从engine发布的3dt文件中使用addByTileLayer()接口复制出来的CustomObject Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) CustomObject对象的ID axis (ForwardAxis) 自定义模型生长动画轴朝向，取值范围：[0,1,2] 分别对应X、Y、Z三个轴，取值枚举详情参考 ForwardAxis ratio (number) 自定义模型的生长因子，取值范围：[0~1] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 startMove(id, coordinateType, pathPointArr, fn) 自定义对象按轨迹点移动 Parameters: Name Type Description id string CustomObject对象的ID coordinateType number 移动轨迹点的坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 pathPointArr array 移动轨迹点的坐标数组，其中每个数组元素支持以下属性： time (number) 运动到达时间，单位：秒，注意：运动时间起点默认值必须为0 coordinate (array) 运动轨迹点坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] rotation (array) 可选参数，每个时刻模型的运动姿态（欧拉角），不传则系统自动计算。格式：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求参数pathDataArr示例说明 其中：time表示到达时间，即从当前轨迹点移动到下一个轨迹点花费时间为（time2-time1）。 [ {\"time\":0,\"coordinate\":[ -15726.0537109375, 7340.0205078125, 0 ],\"rotation\": [0,90,0]},//注意：时间起点默认值必须为0 {\"time\":0.5,\"coordinate\":[ -15700.7431640625, 7308.4287109375, 0 ],\"rotation\": [0,90,0]}, {\"time\":1,\"coordinate\":[ -15682.779296875, 7345.14697265625, 0 ],\"rotation\": [0,90,0]}, {\"time\":1.5,\"coordinate\":[ -15662.0478515625, 7312.79931640625, 0 ],\"rotation\": [0,90,0]} ] stop(ids, fn) 结束指定自定义对象按轨迹点移动 Parameters: Name Type Description ids string | array 自定义对象ID或ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 stopGlow(ids, fn) 停止闪烁 Parameters: Name Type Description ids string | array CustomObject对象的ID或者数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 unHighlight(ids, fn) 取消高亮 Parameters: Name Type Description ids string | array CustomObject对象的ID或者数组 该参数是可选的： - 如果没有指定该参数，则会把场景中所有高亮的CustomObject对消高亮显示 - 如果指定了该参数，则只取消高亮指定的CustomObject对象。 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个CustomObject对象 Parameters: Name Type Description data object | array CustomObject对象或者数组，以下属性支持更新 id (string) 根据CustomObject对象的ID更新以下属性 groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 range (array) 可视范围: [近裁距离, 远裁距离]，默认值: [0, 10000] location (array) 模型位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] rotation (array) 世界坐标系旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] localRotation (array) 模型自身旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] isEffectRotation (boolean) 模型是否开启旋转效果，注意：支持startMove()和moveTo()方法调用时生效 scale (array) 模型缩放：[X,Y,Z]，数组元素类型：(number)，取值范围：[任意正整数] smoothMotion (number) 模型移动动画效果，1: 平滑移动，0: 跳跃移动 autoHeight (boolean) 可选，是否开启自动高度，默认值：false，注意：开启后自动贴地不再使用模型坐标Z collision (boolean) 可选，设置自定义对象加载后是否开启碰撞，默认：true fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"CustomTag.html":{"id":"CustomTag.html","title":"Class: CustomTag","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSim rator\\\\AppData\\\\Roaming\\\\Cloud\\\\SDK/media/image/decal1.png\", \"order\": 1 }] update(data, fn) 修改一个或多个Decal对象 Parameters: Name Type Description data object | array 数据结构，请参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"DigitalTwinAPI.html":{"id":"DigitalTwinAPI.html","title":"Class: DigitalTwinAPI","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_Rev 和可见性。 属性如下：x, y, width, height, visible fn function 可选的回调函数，请参考二次开发：异步接口调用方式 removeTick(fn) 移除每帧渲染时执行的JS脚本 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 reset(type, fn) 对三维场景执行重置操作 Parameters: Name Type Description type ResetType 设置重置的类别，请参考 ResetType，如果不传此参数，默认行为是清除添加的所有对象 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 saveProject(fn) 保存场景（只保存场景设置，不保存接口创建的对象） 注意：此接口有并发问题，请务必保证各客户端的调用顺序是同步的。 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setEnableAliases() 开启接口别名（不建议使用） setEventCallback(fn) 设置三维事件（例如相机飞行开始、结束、Actor的点击等）的回调函数 Parameters: Name Type Description fn function 事件回调函数 setHost(ip, port) 设置主机地址 Parameters: Name Type Description ip string IP地址或者主机名 port number WebSocket服务的端口号 showTickWindow(visible, fn) 显示/隐藏tick调试窗口。 该方法既可以在客户端调用，也可以在tick调试窗口调用 Parameters: Name Type Description visible boolean 是否可见 fn function 可选的回调函数，仅在客户端调用时有效。 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"DigitalTwinPlayer.html":{"id":"DigitalTwinPlayer.html","title":"Class: DigitalTwinPlayer","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: DigitalTwinPlayer DigitalTwinPlayer 云渲染视频流对象 用于在页面上创建和显示三维视频流，并进行键盘、鼠标、触摸屏等交互操作。 new DigitalTwinPlayer(host, option) DigitalTwinPlayer类的构造函数 Parameters: Name Type Description host string 服务地址，格式如下 IP:Port，例如： '192.168.1.29:8082'; 此处的Port对应CloudMaster-&gt;服务设置-&gt;服务地址里的端口号，这里分两种情况，使用独立端口和使用1个端口，见下图所示： option object 初始化选项，支持以下属性（都是可选） domId 参数类型：string 参数说明：HTML元素ID（它将作为要创建的Video标签的父元素），如果未设置此参数，则不传输视频流，只进行API调用 iid 参数类型：string 参数说明：云渲染实例的ID，该属性有以下两种情况： （1）对于带视频流的连接（指定了domId属性），该属性是可选的，如果没有指定iid，则自动分配空闲的实例 （2）对于不带视频流的API调用，该属性是必需的，必需指定云渲染实例才能进行API调用 pid 参数类型：number 参数说明：指定实例要加载的工程ID， 注意事项：如果实例设置中锁定了工程文件，此处如果指定的pid是另外的工程，会导致切换工程失败。 reset 参数类型：boolean 参数说明：指定是否重置实例。如果设置reset为true，每次连接（包括刷新）都会得到一个全新的实例 注意事项：如果设置为true，每次刷新页面也会导致实例重启。 customString 参数类型：string 参数说明：用来存储用户自定义信息 注意事项： ui 参数类型：object 参数说明：用于设置界面组件的可见性。 支持以下属性： startupInfo 参数类型：boolean，默认值：true 参数说明：初始化过程中是否显示详细信息。 statusIndicator 参数类型：boolean，默认值：true 参数说明：左上角闪烁的状态指示灯，可以从不同的颜色看出当前的状态，具体含义请参考 CloudStatus statusButton 参数类型：boolean，默认值：false 参数说明：左下角是否显示信息按钮，点击时，会在小窗口显示当前连接的实时运行状态；鼠标停留时，会显示当前所连接实例的详细信息。 鼠标点击效果： 鼠标悬停效果： 注意事项：可以在视频流窗口上快速双击鼠标中键来显示运行状态窗口 fullscreenButton 参数类型：boolean，默认值：false 参数说明：是否在左下角显示“全屏”按钮 homeButton 参数类型：boolean，默认值：false 参数说明：是否在左下角显示“回到初始位置”按钮 taskListBar 参数类型：number，默认值：1 参数说明：是否在下方显示“任务队列（API调用队列）”信息，取值如下： 0: 永不显示 1: 执行比较耗时的操作时显示 2: 一直显示 debugEventsPanel 参数类型：boolean，默认值false 参数说明：是否显示触摸事件详细信息（仅用于调试） mainUI 参数类型：boolean，无默认值 参数说明：是否显示Cloud工具栏。 也可以通过settings.setMainUIVisibility设置 注意事项：如果设置为true就显示，如果设置为false就隐藏，如果没有设置，就保持原状。 campass 参数类型：boolean，无默认值 参数说明：是否显示指北针。 也可以可以通过settings.setCampassVisible设置 注意事项：如果设置为true就显示，如果设置为false就隐藏，如果没有设置，就保持原状。 apiOptions 参数类型：object 参数说明：用于指定DigitalTwinAPI的初始化选项，具体属性值请参考 DigitalTwinAPI 注意事项：初始化DigitalTwinPlayer的时候会自动创建DigitalTwinAPI对象，所以不需要再单独创建，后面可以通过getAPI()获取 events 参数类型：object 参数说明：用于设置一些事件回调函数，目前可以设置以下属性： onConnClose 参数类型：function，服务连接断开的回调函数，函数参数为event（断开事件） onVideoLoaded 参数类型：function，当视频流加载成功(loadedmetadata)后触发 onRtcStatsReport 参数类型：function，用于接收视频流的状态信息，例如：帧率、码率、QP等。 mouseKeyListener 参数类型：object，用于设置键盘、鼠标交互事件，后面可以随时通过 DigitalTwinPlayer#setActionEventEnabled 进行开关。 可以设置以下值（类型都是function)： onMouseEnter onMouseLeave onMouseMove onMouseDown onMouseUp onKeyDown onKeyUp onKeyPress -touchListener 参数类型：function，用于接收触摸事件，可以随时通过 DigitalTwinPlayer#setActionEventEnabled 进行开关。 -onLoginRequired 参数类型：function，如果开启了用户系统，当需要登录的时候会调用此方法。 keyEventTarget 参数类型：string，取值：'document', 'video', 'none'，默认值'video' 参数说明：该属性用于设置键盘的作用对象：视频标签(video)、网页文档(document)、禁用(none)。 用户可以根据自己的应用场景设置合适的键盘交互对象： 如果网页仅用于全屏三维展示，没有其他页面元素，可以将键盘事件设置给document，这样在任何情况下都可以随时用键盘进行漫游。 如果页面中除了三维视频流，还有其他元素（比如文本输入框），如果这个时候，用document对象接收键盘事件，那么就会出现在文本输入框输入文字的时候，三维依然在交互的问题，这时可以将keyEventReceiver设置为'video'，即可避免这种问题。 如果keyEventReceiver设为'video', 不是任何时候都可以用键盘进行三维交互的，必须视频标签元素处于焦点状态方可（可以用TAB切换焦点 或者鼠标点击设为焦点） 如果不需要用键盘进行三维交互，可以将此属性设为 'none'。 password 参数类型：string 参数说明：设置实例的访问密码，如果服务设置了密码，那么客户端需要提供正确的密码才能连接实例 urlExtraInfo 参数类型：object 参数说明：用于给WebSocket连接的URL添加附加信息（例如认证授权信息等） useBuiltinCursors 参数类型：boolean，默认值true 参数说明：设置是否使用内置光标，如果设置为false, 则不使用内置光标，视频窗口将一直显示箭头样式的光标 useHttps 参数类型：boolean，默认值false 参数说明：明确指定使用HTTPS进行WebSocket连接。如果使用Nginx通过Https反向代理Cloud的Http服务，为了能够正确的建立连接，需要在初始化DigitalTwinPlayer的时候设置useHttps属性为true。 registerEvents 参数类型：boolean，默认值true 参数说明：初始化时是否注册交互事件（包括键盘、鼠标、触摸）。 如果在charts设计模式下，需要将此属性设置为false，以防止视频流组件无法拖动。 receiveRenderEvents 参数类型：boolean，默认值true 参数说明：设置是否接收三维渲染进程的事件。 当在一个页面上初始化多个DigitalTwinPlayer对象，并且访问的是同一个实例时，需要设置此属性为false，否则同一个事件会收到多次。 enableApiCallLog 参数类型：boolean，默认值false 参数说明：Cloud调用接口时，是否开启客户端日志（客户端日志通过apiOptions.onlog设置） 添加日期：2023.11.17 enableEventSync 参数类型：boolean，默认值false 参数说明：当在同一个页面上创建多个DigitalTwinPlayer对象时，enableEventSync属性设置为true的player对象将参与到交互同步，也就是，在一个视频流上进行键盘、鼠标、触摸操作时，这些交互事件将同步发送到其他enableEventSync属性设置为true的视频流上， 这样就可以实现多个视频流显示同样的视角，进行方案对比等功能。 注意事项：后面可以通过setEnableEventSync()方法随时开关此功能 添加日期：2024.08.22 Members fullscreen :boolean 设置是否进入全屏状态，如果为true则全屏显示视频流，如果为false则退出全屏 Type: boolean fullscreen :boolean 获取当前是否处于全屏状态 Type: boolean Methods destroy(reason) 销毁 Parameters: Name Type Description reason string 可选参数，指定原因，如果初始化DigitalTwinPlayer时指定了显示调试信息，可以在界面上显示销毁的原因。 getAPI() 获取DigitalTwinAPI接口 getHost() 获取服务器的地址（ip:port） getInstanceInfo() 获取当前所连接的实例信息 getVideoElement() 获取用于播放Cloud视频流的video元素 Returns: Video元素 getVideoElementSize() 获取Video元素的尺寸 Returns: 包含width,height属性的object对象 getVideoSize() Deprecated: 已废弃，请使用getVideoStreamSize代替 getVideoStreamSize() 获取视频流的尺寸 Returns: 包含width,height属性的object对象 resize() 重新调整布局 screen2World(x, y, fn) 屏幕坐标转为投影坐标 请参考二次开发：四种坐标的区别。 注意：这里的屏幕坐标是相对Video元素的坐标，坐标原点位于Video元素的左上角。 Parameters: Name Type Description x number 屏幕坐标值x y number 屏幕坐标值y fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setActionEventEnabled(bEnable) 设置是否开启键盘、鼠标交互事件的回调功能 Parameters: Name Type Description bEnable boolean setEnableEventSync(bEnabled) 用于开关交互事件同步功能 Parameters: Name Type Description bEnabled boolean 是否开启 &lt;async&gt; setInstanceOptions(o) 设置实例选项，调用此接口可以实现在不刷新页面的情况下切换使用的实例或工程文件 Parameters: Name Type Description o object 实例选项，支持以下属性： iid 实例ID（如果不需要切换实例，可以不用设置此属性） pid 工程ID（如果不需要切换工程，可以不用设置此属性） Returns: 如果设置的参数与当前的实例的参数相同，则返回false, 否则返回true setKeyEventTarget(newVal) 设置键盘交互事件的目标对象 Parameters: Name Type Description newVal string 可选的值：document / video / none，具体含义请参考DigitalTwinPlayer对象的初始化方法 setResolution(w, h) 设置视频流的尺寸，如果云渲染后台启用了自适应，那么视频流的分辨率也会自动调整。 如果没有启用自适应，则调用不起作用。 注意： 视频流支持的最大分辨率为4096*4096，如果设置的宽高超过这个大小，将自动按比例缩放到合适的大小 因为移动端都是高分屏，通常是CSS分辨率的几倍，所以实际设置的宽高会乘以这个系数（devicePixelRatio） Parameters: Name Type Description w number 宽度 h number 高度 Returns: 如果云渲染后台没有开启自适应，或者设置的分辨率与当前的分辨率相同，则返回undefined。 否则返回实际设置的分辨率数组，例如： [3846,2160] &lt;async&gt; world2Screen(x, y, z, fn) 投影坐标转为屏幕坐标 请参考二次开发：四种坐标的区别 注意：这里的屏幕坐标是相对Video元素的坐标，坐标原点位于Video元素的左上角。 Parameters: Name Type Description x number 世界坐标点x y number 世界坐标点y z number 世界坐标点z fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Drone.html":{"id":"Drone.html","title":"Class: Drone","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: Drone Drone Drone类，提供无人机对象相关的操作 一般通过api.Drone调用其方法 &lt;protected&gt; new Drone() See: DigitalTwinAPI#Drone Extends BaseObject Methods add(data, fn) 添加一个或多个无人机对象 路径参数assetPath获取方法如下动图： Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 无人机对象的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 assetPath (string) 资源库无人机的路径，类似CustomObject对象的assetPath，示例值：'/AirCityPlugin/ArtResources/Drone/Drone' coordinate (array) 无人机初始位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] coordinateType (number) 可选，坐标系类型，取值：0为Projection类型，1为WGS84类型，默认值：0 delay (number) 可选，控制无人机moveTo()接口移动的延迟时间，单位：秒，默认值：0.5，设置0则不延时立刻移动 rotation (array) 可选，无人机旋转，世界坐标系旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值]，默认值：[0,0,0] localOffset (array) 可选，无人机基于原始位置坐标的偏移量，默认值：[0,0,0] scale (array) 可选，无人机缩放：[X,Y,Z]，数组元素类型：(number)，取值范围：[任意正整数] visible (boolean) 可选，设置无人机对象加载后是否显示，默认：true trailType (DroneTrailStyle) 可选，轨迹线样式枚举，详情参考 DroneTrailStyle，默认值：0 trailThickness (number) 可选，像素线宽度，注意：仅设置像素线样式枚举时生效 trailColor (Color) 可选，轨迹线颜色，支持四种格式，取值示例 trailDuration (number) 可选，轨迹持续时间，单位：秒，默认值：3秒 lightColor (Color) 可选，无人机自发光灯颜色亮度，取值示例：[1, 0, 0, 10]，注意：alpha是无人机亮度，支持四种格式，取值示例 label (object) 可选，无人机的标牌对象，默认不显示，包含可配置的参数如下： visible (boolean) 无人机标牌是否可见，默认值：false offset (array) 无人机标牌偏移，默认值：[0, 0, 0] cullDistance (number) 无人机标牌剔除距离，相机距离无人机的观察距离大于此阈值则屏幕显示剔除。单位：米 text (string) 无人机标牌显示的字符串 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 清空场景中所有的无人机对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个无人机对象 Parameters: Name Type Description ids string | array 要删除的无人机对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, followEnable, distance, flyTime, viewPitch, viewYaw, sensitivity, offset, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array 无人机对象的ID或者ID数组 followEnable boolean 可选参数，是否开启相机自动跟随(开启后相机交互会被自动托管)，默认值：false distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，如果设置为负值则会在模型内部，可以用来模拟无人机观察视角 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 viewPitch number 可选参数，观察欧拉角的Pitch，取值范围：[-90~90] viewYaw number 可选参数，观察欧拉角的Yaw，取值范围： [-180~180] sensitivity number 可选参数，无人机灵敏度，取值范围： [0~1] offset array 可选参数，无人机视角的偏移量，单位：米，默认值：[0,0,0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取无人机对象的详细信息 Parameters: Name Type Description ids string | array 要获取的无人机对象的无人机对象的ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example CustomObject的详细信息 [{ \"id\":\"vc1\", \"groupId\": \"car_main_road\", \"userData\": \"car_info\", \"coordinateType\":0, \"coordinate\":[-1499.8984375, -2804.5328125000001,1], \"assetPath\":\"/JC_CustomAssets/DroneLibrary/Exhibition/Drone\", \"rotation\":[0, -10, 0], }] hide(ids, fn) 隐藏一个或多个无人机对象 Parameters: Name Type Description ids string | array 无人机对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 moveTo(data, fn) 设置无人机对象飞行移动 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 无人机对象的ID coordinate (array) 无人机对象移动目标点坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] rotation (array) 可选，无人机的旋转角度：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值]，默认值：[0,0,0] astern (boolean) 可选，是否开启倒档，默认值：false time (number) 可选，无人机对象移动目标点对应的时间戳 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示一个或多个无人机对象 Parameters: Name Type Description ids string | array 无人机对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个无人机对象 Parameters: Name Type Description data object | array 无人机对象或者数组，以下属性支持更新 id (string) 根据无人机对象的ID更新无人机相关属性 trailType (number) (DroneTrailStyle) 可选，轨迹线样式枚举，详情参考 DroneTrailStyle，默认值：0 trailColor (Color) 可选，轨迹线颜色，支持四种格式，取值示例 trailDuration (number) 可选，轨迹持续时间，单位：秒，默认值：3 trailThickness (number) 可选，像素线宽度，注意：仅设置像素线样式枚举时生效 lightColor (Color) 可选，无人机自发光灯颜色亮度，取值示例：[1, 0, 0, 10]，注意：alpha是无人机亮度，支持四种格式，取值示例，默认：关闭 label (object) 可选，无人机的标牌对象，默认不显示，包含可配置的参数如下： visible (boolean) 无人机标牌是否可见，默认值：false offset (array) 无人机标牌偏移，默认值：[0, 0, 0] cullDistance (number) 无人机标牌剔除距离，相机距离无人机的观察距离大于此阈值则屏幕显示剔除。单位：米 text (string) 无人机标牌显示的字符串 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"DynamicWater.html":{"id":"DynamicWater.html","title":"Class: DynamicWater","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTr ：异步接口调用方式 Example DynamicWater的详细信息 [{ \"id\": \"dy1\", \"groupId\": \"\", \"userData\": \"\", \"style\": 0 }] setCoordinates(id, newVal, fn) 设置DynamicWater的坐标信息 Parameters: Name Type Description id string DynamicWater对象ID newVal array 坐标数组，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setStyle(id, newVal, fn) 设置动态水的样式 Parameters: Name Type Description id string DynamicWater对象ID newVal number 动态水的样式，取值：0（深蓝）、1（蓝）、2（湖水） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个DynamicWater对象 Parameters: Name Type Description data object | array 数据结构，请参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"EditHelper.html":{"id":"EditHelper.html","title":"Class: EditHelper","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: EditHelper EditHelper EditHelper类，提供用户手动绘制接口 &lt;protected&gt; new EditHelper() See: DigitalTwinAPI#editHelper Methods cancel(fn) 取消绘制模式 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 finish(withOffset, fn) 绘制结束。调用此方法会结束当前的绘制，并在回调函数中返回绘制类型和坐标点，然后根据这些坐标点再创建相关的几何图形。 Parameters: Name Type Description withOffset boolean 是否计算工程中心偏移，默认值是true fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example let res = await fdapi.editHelper.finish(true); switch (res.buildType) { case 0: { fdapi.polyline.add({ id: Math.random(), coordinates: res.coordinates, color: Color.Red, style: 2, thickness: 10, intensity: 1, flowRate: 0.5, }); } break; case 1: { fdapi.polygon.add({ id: Math.random(), color: Color.Blue, coordinates: res.coordinates, frameColor: Color.Red, frameThickness: 1 }); } break; } setParam(lineType, buildType, color, fn) 设置绘制参数 Parameters: Name Type Description lineType number 线类型，0：直线，1：曲线，默认值是0 buildType number 绘制类型，0：画多点线段， 1：画多边形， 默认值是0 color Color 颜色，支持四种格式，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 start(fn) 进入绘制模式 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Cl
