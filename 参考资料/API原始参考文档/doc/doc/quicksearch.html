s: Name Type Description ids string | array SignalWave对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取SignalWave的详细信息 Parameters: Name Type Description ids string | array 要获取的SignalWave对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 结构示例 [ { \"id\": \"signalWave\", \"groupId\": \"group1\", \"userData\": \"波束\", \"valA\": [ -20, 0, 0 ], \"valB\": [ 0, -10, 0 ], \"valC\": [ 0, 0, 0 ], \"valD\": [ 0, 10, 0 ], \"valE\": [ -10, 0, 0 ], \"valF\": [ 100, 0, 0 ], \"valG\": [ -20, 0, 30 ] } ] hide(ids, fn) 隐藏SignalWave Parameters: Name Type Description ids string | array SignalWave对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示SignalWave Parameters: Name Type Description ids string | array SignalWave对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个SignalWave对象 Parameters: Name Type Description data object | array 数据结构，请参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"SmoothedParticleHydrodynamics.html":{"id":"SmoothedParticleHydrodynamics.html","title":"Class: SmoothedParticleHydrodynamics","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: SmoothedParticleHydrodynamics SmoothedParticleHydrodynamics 光滑粒子流体动力学仿真对象，实现对光滑粒子流体动力学仿真对象的操作 一般通过api.smoothedParticleHydrodynamics调用其方法 new SmoothedParticleHydrodynamics() See: DigitalTwinAPI#smoothedParticleHydrodynamics Extends BaseObject Methods addByBin(data, fn) 根据bin时序文件添加一个或多个光滑粒子流体动力学仿真对象 Parameters: Name Type Description data object | array 光滑粒子流体动力学仿真对象，可以是Object类型或者Array类型，对于每一个SmoothedParticleHydrodynamics对象，支持以下属性： id (string) 光滑粒子流体动力学仿真对象的唯一标识符ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 origin (array) 仿真模型对象的原点，默认值：[0, 0, 0]，如果bin文件内坐标是相对坐标则此参数相当于offset style (number) 光滑粒子流体动力学仿真对象样式，取值范围：[0,1,2,3,4]，取值描述：0热力样式 1~4四种水材质样式，默认值：0 duration (number) 仿真的持续时间，单位：秒，默认值：30s loop (boolean) 是否循环播放，默认值：false play (boolean) 添加后是否开始播放，默认值：false files (array) 按时序排列的二进制bin文件路径的二维数组，结构示例：[\"D:\\Time1.bin\",\"D:\\Time2.bin\"...]，bin文件格式描述：x,y,z,value，四个字段分别对应四个8字节的double字段，按小端字节顺序（ByteOrder.LITTLE_ENDIAN）写入二进制bin文件 particleNumSides (number) 可选，粒子多边形的边的数量，控制粒子几何形状的复杂度，默认值：2 particle (object) 光滑粒子样式属性如下： thickness (number) 每个粒子的基础水深，默认值：0.02米 radius (number) 每个粒子的默认半径，默认值：15米 colors (object) 热力样式下的自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效值对应的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 热力值对应的调色板颜色 value (number) 热力值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 生成bin文件和读取bin文件的Java代码示例： public static void writeBinFile(){ //二进制文件生成路径 String binPath = \"C:\\\\bin\\\\\"; //8个坐标点+业务对应value double[][] sphParticleData = { { 6557.337744, 5574.320115, 3238.832747, 48.890203 }, { 6473.064509, 5089.487075, 3168.192248, 43.51641 }, { 6707.48572, 4800.570737, 3048.399799, 46.022058 }, { 6894.066684, 4529.364945, 3002.244533, 38.003331 }, { 6886.204313, 4158.774802, 2936.036547, 26.771536 }, { 6890.049974, 3893.091258, 2888.343784, 32.719713 }, { 6890.719789, 3574.600717, 2857.614734, 32.38045 }, { 6991.981246, 3355.456008, 2832.723574, 18.700644 } }; //把数据写入二进制bin文件 for (int i = 0; i &lt; sphParticleData.length; i++) { String path = binPath + \"point\" + i + \".bin\"; OutputStream fos = new BufferedOutputStream(Files.newOutputStream(Paths.get(path))); byte[] bytes = ByteBuffer.allocate(8 + 8 + 8 + 8).order(ByteOrder.LITTLE_ENDIAN).putDouble(sphParticleData[i][0]).putDouble(sphParticleData[i][1]).putDouble(sphParticleData[i][2]).putDouble(sphParticleData[i][3]).array(); fos.write(bytes); fos.close(); } } public static void readBinFile(){ String binFilePath = \"F:\\\\test.bin\"; byte[] bytes = new byte[8 + 8 + 8 + 8]; FileInputStream fis = new FileInputStream(binFilePath); while (fis.read(bytes, 0, bytes.length) != -1) { Double x = ByteBuffer.wrap(Arrays.copyOfRange(bytes, 0, 8)).order(ByteOrder.LITTLE_ENDIAN).getDouble(); Double y = ByteBuffer.wrap(Arrays.copyOfRange(bytes, 8, 16)).order(ByteOrder.LITTLE_ENDIAN).getDouble(); Double z = ByteBuffer.wrap(Arrays.copyOfRange(bytes, 16, 24)).order(ByteOrder.LITTLE_ENDIAN).getDouble(); Double value = ByteBuffer.wrap(Arrays.copyOfRange(bytes, 24, 32)).order(ByteOrder.LITTLE_ENDIAN).getDouble(); //输出字段值 System.out.println(\"x y z value : [\"+ x + \",\"+ y + \",\" + z + \",\" + value +\"]\"); } } addByVtk(data, fn) 根据vtk时序文件添加一个或多个光滑粒子流体动力学仿真对象 Parameters: Name Type Description data object | array 光滑粒子流体动力学仿真对象，可以是Object类型或者Array类型，对于每一个SmoothedParticleHydrodynamics对象，支持以下属性： id (string) 光滑粒子流体动力学仿真对象的唯一标识符ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 origin (array) 仿真模型对象的原点，默认值：[0, 0, 0]，如果bin文件内坐标是相对坐标则此参数相当于offset style (number) 光滑粒子流体动力学仿真对象样式，取值范围：[0,1,2,3,4]，取值描述：0热力样式 1~4四种水材质样式，默认值：0 duration (number) 仿真的持续时间，单位：秒，默认值：30s loop (boolean) 是否循环播放，默认值：false play (boolean) 添加后是否开始播放，默认值：false files (array) 按时序排列的vtk文件数组，结构示例：[\"D:\\Time0.vtk\",\"D:\\Time1.vtk\",\"D:\\Time2.vtk\"...] heatValueFieldName (string) 粒子热力值使用的vtk字段名称 idFieldName (string) 粒子ID使用的vtk字段名称 particleNumSides (number) 可选，粒子多边形的边的数量，控制粒子几何形状的复杂度，默认值：2 particle (object) 光滑粒子样式属性如下： thickness (number) 每个粒子的基础水深，默认值：0.02米 radius (number) 每个粒子的默认半径，默认值：15米 colors (object) 热力样式下的自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效值对应的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 热力值对应的调色板颜色 value (number) 热力值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 清空场景中所有的光滑粒子流体动力学仿真对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个光滑粒子流体动力学仿真对象 Parameters: Name Type Description ids string | array 要删除的光滑粒子流体动力学仿真对象ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array 光滑粒子流体动力学仿真对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据光滑粒子流体动力学仿真对象ID获取光滑粒子流体动力学仿真对象的详细信息 Parameters: Name Type Description ids string | array 要获取的光滑粒子流体动力学仿真对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Returns: hide(ids, fn) 隐藏光滑粒子流体动力学仿真对象 Parameters: Name Type Description ids string | array 光滑粒子流体动力学仿真对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示光滑粒子流体动力学仿真对象 Parameters: Name Type Description ids string | array 光滑粒子流体动力学仿真对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个光滑粒子流体动力学仿真对象，支持更新以下属性： Parameters: Name Type Description data data | array 光滑粒子流体动力学仿真对象或对象数组，支持更新以下属性： id (string) 根据SmoothedParticleHydrodynamics对象ID更新以下属性 play (boolean) 可选，是否开始播放，默认值：false particle (object) 可选，光滑粒子样式属性如下： thickness (number) 每个粒子的基础水深，默认值：0.02米 radius (number) 每个粒子的默认半径，默认值：15米 colors (object) 可选，热力样式下的自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效值对应的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 热力值对应的调色板颜色 value (number) 热力值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('upda ed&gt; new SplineMesh() See: DigitalTwinAPI#SplineMesh Extends BaseObject Methods add(data, fn) 添加一个或多个SplineMesh对象，绘制路径模型 展示效果如下动图： Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) SplineMesh对象的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 coordinateType (number) 可选，坐标系类型，取值：0为Projection类型，1为WGS84类型，默认值：0 coordinates (array) 必选，路径模型的轨迹坐标数组，取值示例：取值示例 style (SplineMeshStyle) 可选(二选一)，路径模型内置样式枚举，取值详情参考 SplineMeshStyle meshPath (string) 可选(二选一)，路径模型自定义样式的打包路径，注意：若传入此路径会自动覆盖style样式 range (array) 可选，可视范围: [近裁距离, 远裁距离]，取值范围: [任意负值, 任意正值] scale (number) 可选，路径模型的整体缩放，默认值：1 curveType (number) 可选，路径模型绘制时曲线的插值类型，取值范围：[0,1]，默认值：0 segment (number) 可选，路径模型的绘制时曲线的插值的分段数量，默认值：10 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 callBPFunction(data, fn) 调用splineMesh对象包含的多个蓝图函数 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) CustomObject对象的ID functionName (string) 蓝图函数名 parameters (array) 蓝图函数包含的多个参数，可选参数，数组类型，注意：传入多参数的顺序与类型务必与蓝图函数的参数顺序及其参数类型一致以保证执行结果符合预期。多个参数结构示例：[{\"paramType\":BPFuncParamType.String,\"paramValue\":\"示例值\"},{\"paramType\":BPFuncParamType.Bool,\"paramValue\":false},{\"paramType\":BPFuncParamType.Float,\"paramValue\":100.8}] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 清空场景中所有的SplineMesh对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个SplineMesh对象 Parameters: Name Type Description ids string | array 要删除的SplineMesh对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 deleteByGroupId(groupId, fn) 根据分组ID删除SplineMesh Parameters: Name Type Description groupId string 创建SplineMesh对象时指定的分组ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array SplineMesh对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]， , 1000000000] releaseWhenHidden (boolean) 可选，隐藏图层时是否释放资源，默认值：false 不释放 location (array) 位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值]，注意：如果工程是球面坐标系则此参数相当于offset，仅表示图层位置的偏移量，非坐标值，单位：米 rotation (array) 旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] scale (array) 缩放：[X,Y,Z]，数组元素类型：(number)，取值范围：[任意正整数] fn function 可选的回调函数，请参考口调用方式 addHole(data, fn) 根据挖洞多边形的坐标添加一个或多个挖洞操作，注意：同时只能对一个图层id进行挖洞操作 Parameters: Name Type Description data object | array 对象或数组类型，如果是数组类型，对于每个数组元素，有以下属性： id (string) 挖洞操作唯一标识符 tileLayerId (string) TileLayer对象的ID coordinates (array) 挖洞多边形的坐标数组，二维数组，数组元素类型：挖洞多边形的坐标，取值示例 innerRings (array) 挖洞多边形的内环，三维数组，数组元素类型：挖洞多边形的坐标数组 isReverseCut (boolean) 挖洞多边形是否反转，默认值：false fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addHoleByShapeFile(data, fn) 根据shapeFile添加一个或多个挖洞操作 Parameters: Name Type Description data object | array 对象或数组类型，如果是数组类型，对于每个数组元素，有以下属性： tileLayerId (string) TileLayer对象的ID shapeFilePath (string) shapeFilePath文件路径，支持本地路径和网络路径，资源引入说明 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addModifier(id, tileLayerId, coordinates, ententBufferSize, fn) 添加一个压平操作 Parameters: Name Type Description id string 唯一标识符 tileLayerId string TileLayer对象的ID coordinates array 压平多边形的坐标，取值示例 ententBufferSize number 羽化范围，取值范围：[任意正浮点数]，单位：米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addModifierByShapeFile(data, fn) 根据shapeFile添加一个或多个压平操作 Parameters: Name Type Description data object | array 对象或数组类型，如果是数组类型，对于每个数组元素，有以下属性： id (string) 压平操作唯一标识符 tileLayerId (string) TileLayer对象的ID shapeFilePath (string) shapeFilePath文件路径，支持本地路径和网络路径，资源引入说明 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addModifiers(data, fn) 根据多边形的坐标添加一个或多个压平操作，注意：同时只能对一个图层id进行压平操作 Parameters: Name Type Description data object | array 对象或数组类型，如果是数组类型，对于每个数组元素，有以下属性： id (string) 压平操作唯一标识符 tileLayerId (string) TileLayer对象的ID coordinates (array) 压平多边形的坐标数组，二维数组，数组元素类型：压平多边形的坐标，取值示例 innerRings (array) 压平多边形的内环，三维数组，数组元素类型：压平多边形的坐标数组 ententBufferSize (number) 羽化范围，取值范围：[任意正浮点数]，单位：米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 清空接口添加的所有图层对象 Paramet umber) 点云字段匹配到的值的box的可见性，0不可见 1可见 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setPointCloudSize(id, pointCloudSize, fn) 设置TileLayer图层的点云大小，注意：仅对点云数据转换的3dt图层模型生效 Parameters: Name Type Description id string TileLayer的ID pointCloudSize number 点云缩放的倍数，取值范围：[0.01~4] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setPointCloudStyle(data) 根据点云的属性字段来设置点云模型的渲染颜色 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 点云图层的Id collision (boolean) 是否开启碰撞 renderer (object) 必选，渲染器配置对象参数如下： rendererType (RendererType) 渲染器类型，包含三种：简单渲染器、唯一值渲染器、分类渲染器 materialType (number) 渲染材质类型，取值：[0,1,2]，分别对应三种：X光、Mask不透明、半透明 type (VisualType) 控制显示的可视化类型枚举 renderBox (number) 是否开启盒子模式渲染，取值：[0,1]，默认值：0 boxSize (array) 盒子模式下体块的尺寸，即长宽高[X,Y,Z]，单位：米 renderBoxWireframe (number) 盒子模式下是否显示线框，取值：[0,1,2]，0不显示 1显示 2仅显示线框（隐藏面） wireframeColor (color) 盒子模式下线框的颜色 wireThickness (number) 盒子模式下线框的尺寸 lightFactor (number) 亮度因子 intensity (number) 亮度值 frequency (number) 频次 splitFactor (number) 点云裂分因子，值越大绘制精度越低，值越小绘制精度则越高（会更消耗显卡资源），取值范围：[0,任意正数] autoScaleDepth (number) 盒子模式下，盒子尺寸自动缩放的相机临界深度，取值范围：[0,任意正数] field (string) 点云图层包含的属性字段名称 fieldType (FieldType) 点云图层包含的属性字段类型，枚举支持数值类型和字符串类型 gradient (boolean) 颜色是否差值渐变 defaultSymbol (object) 必选，默认符号化配置参数如下： symbolType (number) 符号化类型，0 simple-marker圆形点填充 1 simple-line线填充(注意：目前仅支持1px的线宽) 2 simple-fill面填充 3 polygon3d填充 size (number) 可选，点的默认尺寸，仅针对simple-marker圆形填充生效； height (number) 可选，polygon3d的默认高度，仅针对polygon3d填充生效； color (array) 默认填充颜色 outline uniqueValueInfos (array) 可选，唯一值渲染器配置数组，对象结构如下： value (any) field字段对应值 symbol (object) 各唯一值对应的符号化配置对象，结构如下： color (Color) 可选，三选一，唯一值对应的颜色 size (number) 可选，三选一，唯一值对应的尺寸 height (number) 可选，三选一，唯一值对应的高度 setRotation(id, newVal, fn) 设置旋转 Parameters: Name Type Description id string TileLayer的ID newVal array 新的旋转坐标：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setScale(id, newVal, fn) 设置缩放 Parameters: Name Type Description id string TileLayer的ID newVal any 新的缩放：[X,Y,Z]，数组元素类型：(number)，取值范围：[任意正整数] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setStyle(tileLayerIds, style, color, saturation, brightness, contrast, contrastBase, fn) 设置TileLayer的样式 Parameters: Name Type Description tileLayerIds string | array TileLayer的ID或ID数组 style number 样式， 0：默认；1：X光；2：纯色；3：水晶体；4：暗黑；5：科幻；6：扩散 color Color 颜色，默认值:Color.White，支持四种格式，取值示例 saturation number 饱和度，仅在默认样式0下生效，取值范围：[0~2]，默认值：1.0 brightness number 亮度 ，仅在默认样式0下生效，取值范围：[0.1~10]，默认值：1.0 contrast number 对比度，仅在默认样式0下生效，取值范围：[0.2~5]，默认值：1.0 contrastBase number 对比度基准，仅在默认样式0下生效，取值范围：[0.036~0.9]，默认值：0.18 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Since: 2020.01.11 Version:325 setViewHeightRange(id, minViewHeight, maxViewHeight, fn) 设置TileLayer图层的可视高度范围 Parameters: Name Type Description id string TileLayer的ID minViewHeight number 可视高度范围最小值，取值范围：[任意负数~任意正数]，单位：米 maxViewHeight number 可视高度范围最大值，取值范围：[任意负数~任意正数]，单位：米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setViewportVisible(id, vp, fn) 多视口状态下，设置图层在各视口的可见性 Parameters: Name Type Description id string TileLayer唯一标识符 vp Viewport 视口掩码（Viewport位运算） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示TileLayer图层 Parameters: Name Type Description ids string | array TileLayer对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showActor(id, objectId, fn) 显示Actor Parameters: Name Type Description id string TileLayer的ID objectId string Actor的ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showActors(data, fn) 显示一个或多个Actor Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) TileLayer的ID objectIds (array) TileLayer里的Actor的ObjectID（单个或者数组） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showAllActors(tileLayerIds) 显示指定tilelayer的所有Actor Parameters: Name Type Description tileLayerIds string | array TileLayer的ID或ID数组 unHighlightActor(id, objectId, fn) 取消高亮一个Actor Parameters: Name Type Description id string TileLayer的ID objectId string Actor的ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 unHighlightActors(data, fn) 停止高亮多个Actor，同时支持停止高亮多个图层的Actor Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) TileLayer的ID objectIds (array) TileLayer里的Actor的ObjectID（单个或者数组） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 unHighlightAllActors(fn) 停止高亮所有Actor Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 unHighlightAllPoints(fn) 取消高亮点云包含所有点的高亮效果 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 unHighlightPoints(data, fn) 根据点云的属性字段值取消高亮 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 点云图层的Id name (string) 点云图层包含的字段名称 values (array) 点云图层包含的字段名称对应的取值数组，支持取消高亮多个匹配到的值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个TileLayer对象，支持更新以下属性： Parameters: Name Type Description data object | array 数据结构，支持更新以下属性： id (string) 根据TileLayer对象的ID更新以下属性 groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 fileName (string) 3dt文件路径，推荐使用@path 方式管理添加3dt图层资源 location (array) 位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] rotation (array) 旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] scale (array) 缩放：[X,Y,Z]，数组元素类型：(number)，取值范围：[任意正整数] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd updateHole(id, tileLayerId, holeCoordinate, isReverseCut, fn) 修改一个挖洞操作 Parameters: Name Type Description id string 唯一标识符 tileLayerId string TileLayer对象的ID holeCoordinate array 待修改挖洞的坐标，取值示例 isReverseCut boolean 挖洞多边形是否反转，默认值：false fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateModifier(id, tileLayerId, coordinates, ententBufferSize, fn) 修改一个压平操作 Parameters: Name Type Description id string 唯一标识符 tileLayerId string TileLayer对象的ID coordinates array 压平多边形的坐标 ententBufferSize number 羽化范围，取值范围：[任意正浮点数]，单位：米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 &lt;async&gt; updateRecord(id, newValMap, where, fn) 更新TileLayer关联的数据库记录 Parameters: Name Type Description id string tileLayer的ID newValMap object 要设置的新值格式：{Key:Value} where string 查询条件 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Tools.html":{"id":"Tools.html","title":"Class: Tools","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: Tools Tools 工具类 一般通过api.tools调用其方法 &lt;protected&gt; new Tools() See: DigitalTwinAPI#tools Methods exportSkyline(path, size, options, fn) 导出天际线分析图片，注意：需先执行开始天际线分析并在页面交互出现天际线图片后才可以执行导出方法exportSkyline Parameters: Name Type Description path string 导出图片的保存路径，或base64字符串，示例参数一：\"D:\\skyline.png\"，输出文件至对应路径；示例参数二：\"base64\",接口返回图片对应的base64字符串 size array 导出图片的尺寸，格式如下：[width, height]，取值范围：[0~任意正数] options object 参数信息，支持以下属性（如果未设置某个属性，则使用默认值）： skylineColor 天际线的颜色，默认值：绿色 Color.Green backgroundColor 图片背景颜色，默认值：[0, 0, 0, 0.75] tileLayers 数组类型，若此数组为空默认绘制所有物体形成的天际线;不为空则多个TileLayer形成的一条天际线，多条天际线绘制到该图上； 数组元素定义如下： { \"color\": Color.Red, //颜色值 \"ids\": [\"TileLayerId1\", \"TileLayerId2\"] //TileLayer的ID数组 } fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 示例代码如下： let options = { skylineColor: Color.Green, backgroundColor: Color.Gray }; //示例一：导出图片至cloud服务器上对应路径 fdapi.tools.exportSkyline(\"d:\\\\skyline.png\", [400, 200], options); //示例二：返回base64字符串 fdapi.tools.exportSkyline(\"base64\", [400, 200], options).then(result=&gt;{ //设置base64类型图片 document.getElementById(\"img1\").setAttribute(\"src\",result.image); }); &lt;br&gt; getUIPanel(type, fn) 查询系统UI功能操作面板的显示状态 Parameters: Name Type Description type number 操作面板对应枚举，取值范围：[0~正整数]，详情参考 UIPanelType fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideUIPanel(type, fn) 隐藏系统UI功能操作面板 Parameters: Name Type Description type number 操作面板对应枚举，取值范围：[0~正整数]，详情参考 UIPanelType fn function 可选的回调函数，请参考二次开发：异步接口调用方式 lineIntersect(start, end, fn) 单条线段求交，如果线段上有多个对象则返回距离折线起点位置最近的对象信息，如果折线上没有对象则返回ResourceNotFound 注意：1、求交要在相机视野范围内 2、获取地形高度时从上往下求交，起始点高度Z要大于结束点Z。 Parameters: Name Type Description start array 线段起点坐标，取值示例 end array 线段终点坐标，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回距离折线起点位置最近的对象信息 { \"Id\": \"8198F86D439A3782739C1EBD9440AFC7\", // 图层树上对象唯一标识id \"ObjectID\": \"Shape027\", // Actor对象ID \"Type\": \"TileLayer\", // 对象类型 \"PropertyName\": \"L3\", //图层树上对象名称 \"BoundsMin\": [491962.093750, 2490959.000000, -2.963361], //3dt文件特有属性,包围盒bbox-BoundsMin \"BoundsMax\": [493933.843750, 2493104.750000, 0.376975], // 3dt文件特有属性,包围盒bbox-BoundsMax \"LineIntersectPoint\": [492751.687500, 2491406.000000, -2.780900] //从线段起点开始延伸至对象的第一个交点 } linesIntersect(startEndPointArr, highPrecision, returnDetails, fn) 多条线段批量求交 注意：1、求交要在相机视野范围内 2、获取地形高度时从上往下求交，起始点高度Z要大于结束点Z。 Parameters: Name Type Description startEndPointArr array 线段起止点坐标数组，数组元素对象支持以下属性：数组格式示例：[{\"start\":[1500,86600,100],\"end\":[1512.514892578125,86679.796875,-10]},{\"start\":[1200,82600,100],\"end\":[1512.514892578125,86679.796875,-10]}] start 线段起点坐标，取值示例 end 线段终点坐标，取值示例 highPrecision boolean 是否高精度，默认值：false returnDetails boolean 是否返回求交数据的详情，默认值：true，注意：设置为false后只返回交点信息LineIntersectPoint，且当数据量大时设置为false可以提升效率 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回距离折线起点位置最近的对象信息数组 返回数据格式示例： [{ \"Id\": \"8198F86D439A3782739C1EBD9440AFC7\", // 图层树上对象唯一标识id \"Type\": \"TileLayer\", // 对象类型 \"ObjectID\": \"Shape027\", // Actor对象ID \"PropertyName\": \"L3\", //图层树上对象名称 \"BoundsMin\": [491962.093750, 2490959.000000, -2.963361], //3dt文件特有属性,包围盒bbox-BoundsMin \"BoundsMax\": [493933.843750, 2493104.750000, 0.376975], // 3dt文件特有属性,包围盒bbox-BoundsMax \"LineIntersectPoint\": [492751.687500, 2491406.000000, -2.780900] //从线段起点开始延伸至对象的第一个交点 }, { \"Id\": \"8198F86D439A3782739C1EBD94ADC543\", \"Type\": \"TileLayer\", \"ObjectID\": \"SM_outdoor_wall_01_2\", \"PropertyName\": \"L2\", \"BoundsMin\": [883.421265, -602.091553, 3.599805], \"BoundsMax\": [916.103149, -595.874084, 23.368118], \"LineIntersectPoint\": [893.660950, -601.525940, 22.460133], }] replaceTextureByImage(texturePath, imageUrl, fn) 使用图片替换纹理 Parameters: Name Type Description texturePath string UE资源包里的纹理路径 imageUrl string 图片路径 可以是本地路径，也支持网络路径，资源引入说明 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 replaceTextureByUrl(texturePath, url, fn) 使用网页替换纹理 Parameters: Name Type Description texturePath string UE资源包里的纹理路径 url string 包含纹理效果的url路径 可以是本地路径，也支持网络路径，资源引入说明 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 replaceTextureByVideo(texturePath, videoUrl, fn) 使用视频流替换纹理 Parameters: Name Type Description texturePath string UE资源包里的纹理路径 videoUrl string 视频地址，支持本地文件和网络文件，同时支持rtsp实时视频流协议，资源引入说明，注意：mp4文件视频只支持H264/AVC编码格式的 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 restoreTexture(texturePathArr, fn) 恢复纹理 Parameters: Name Type Description texturePathArr string | array UE资源包里的纹理路径，（支持单个路径或路径数组） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 riverCrossSection(option, fn) 根据河道的坐标点和tif高程对河道横断面进行分析 Parameters: Name Type Description option object 计算河道断面的参数配置对象，包含的属性如下： riverPolygon (array) 必选，河道面范围包含的坐标数组，取值示例：[[x,y,z],[x1,y1,z1]...] riverCenterLine (array) 必选，河道中心线包含的坐标数组，取值示例：[[x,y,z],[x1,y1,z1]...] demPath (string) 必选，河道DEM高程栅格文件路径，格式为.tif sectionInterval (number) 可选，沿河道中心线断面的采样间距，默认值：500，单位：米 sampleInterval (number) 可选，河道断面内采样点的间距，默认值：50，单位：米 tangentWindowRadius (number) 可选，河道断面的切向平滑窗口半径，用来估算河道断面方向，如果设置为0则接口自动计算窗口范围，默认值：0，单位：米 sampleDirection (number) 可选，河道断面的采样方向，0：从河道中心线走向的左侧开始采样 1：从河道中心线走向的右侧开始采样，默认值：0 defaultSectionWidth (number) 可选，默认断面宽度，注意：如果某些区域河道中心线和河道范围没有交点，就会使用这个默认的断面宽度，默认值：500，单位：米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 riverCrossSectionByShp(option, fn) 根据河道的shp文件和tif高程对河道横断面进行分析 Parameters: Name Type Description option object 计算河道断面的参数配置对象，包含的属性如下： riverPolygonPath (string) 必选，河道面范围的shp文件路径，格式为.shp，三个文件包含的坐标系需保证一致 riverCenterLinePath (string) 必选，河道中心线shp文件路径，格式为.shp，三个文件包含的坐标系需保证一致 demPath (string) 必选，河道DEM高程栅格文件路径，格式为.tif，三个文件包含的坐标系需保证一致 sectionInterval (number) 可选，沿河道中心线断面的采样间距，默认值：500，单位：米 sampleInterval (number) 可选，河道断面内采样点的间距，默认值：50，单位：米 tangentWindowRadius (number) 可选，河道断面的切向平滑窗口半径，用来估算河道断面方向，如果设置为0则接口自动计算窗口范围，默认值：0，单位：米 sampleDirection (number) 可选，河道断面的采样方向，0：从河道中心线走向的左侧开始采样 1：从河道中心线走向的右侧开始采样，默认值：0 defaultSectionWidth (number) 可选，默认断面宽度，注意：如果某些区域河道中心线和河道范围没有交点，那么就使用这个默认河面宽度采样河道断，默认值：500，单位：米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setMeasurement(type, options, fn) 设置测量模式及相关参数 Parameters: Name Type Description type MeasurementMode 测量模式，参见MeasurementMode，目前支持：坐标测量、直线测量、水平测量、垂直测量、多边形测量、地表面积测量、角度测量 options object 测量选项，目前支持的选项有： unitType: 可选，测量单位，0：米 1：千米 2：英尺，默认值 0 coordinates: 可选，待测量坐标数组，不传则根据交互拾取的坐标进行测量 pointSize: 可选，测量点的像素尺寸，默认值 8.0 textSize: 可选，文字大小，默认值 10.0 textColor: 可选，文字颜色，默认值 Color.Yellow pointColor: 可选，点的颜色，默认值 [0,0,1,0.3] lineColor: 可选，线的颜色，默认值 Color.Red areaColor: 可选，测量区域的颜色，默认值 [0,1,0,0.3] showCoordinateText: 可选，是否显示坐标测量的文本，默认值 false fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showClipPanel(clipType, screenPosition, fn) 打开剖切功能操作面板 Parameters: Name Type Description clipType number 剖切面板对应的3种剖切功能，取值范围：[0,1,2]，详情参考 UIPanelType screenPosition array 剖切面板显示的屏幕位置，数组类型：[left, top]，取值单位：像素 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showMeasurePanel(measureType, screenPosition, fn) 打开测量功能操作面板 Parameters: Name Type Description measureType number 测量面板对应的6种测量功能，取值范围：[0,1,2,3,4,5]，详情参考 UIPanelType screenPosition array 测量面板显示的屏幕位置，数组类型：[left, top]，取值单位：像素 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showUIPanel(type, screenPosition, fn) 显示系统UI功能操作面板 Parameters: Name Type Description type number 操作面板对应枚举，取值范围：[0~正整数]，详情参考 UIPanelType screenPosition array 操作面板显示的屏幕位置，数组类型：[left, top]，取值单位：像素 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 startContourLineAnalysis(options, fn) 开始等高线分析，适用于地形 Parameters: Name Type Description options object 参数对象信息，支持以下属性（如果未设置某个属性，则使用默认值） coordinates 等高线分析的点位数组，可选参数，当不传入此参数时需通过鼠标交互拾取目标点 isShowContourPlane 是否显示等高面，{boolean}，默认值：true contourPlaneOpacity 等高面颜色不透明度，仅当isShowContourPlane设置为true时生效，{number}，取值范围：[0~1]，默认值：1 isShowContourLine 是否显示等高线，{boolean}，默认值：true contourLineColor 等高线颜色值，仅当isShowContourLine设置为true时生效，{Color}，默认值：[1,1,1,1] contourLineSpacing 等高线的间距，仅当isShowContourLine设置为true时生效，{number}，单位：米，默认值：20米 contourLineRangeMax 等高线最高显示高度，{number}，单位：米，默认值：1000000米 contourLineRangeMin 等高线最低显示高度，{number}，单位：米，默认值：-1000000米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 startCutFillAnalysis(options, fn) 开始填挖方分析，适用于地形 Parameters: Name Type Description options object 参数对象信息，支持以下属性（如果未设置某个属性，则使用默认值） coordinates 填挖方分析范围的点位数组，可选参数，当不传入此参数时需通过鼠标交互拾取目标点 height 高度，单位：米，取值范围：[任意负数~任意正数]，默认值：0 gridSize 网格的大小，取值范围：[0~100]，默认值：5 lineThickness 线段的宽度，单位：米，取值范围：[0~100]，默认值：2 pointSize 点的大小，取值范围：[0~100]，默认值：5 gridLineThickness 网格线的宽度，单位：米，取值范围：[0~100]，默认值：5 cutLineColor 挖方线的颜色，默认值：红色 Color.Red fillLineColor 填方线的颜色，默认值：绿色 Color.Green cutPointColor 挖方点的颜色，默认值：蓝色 Color.Blue fillPointColor 填方点的颜色，默认值：蓝色 Color.Blue gridColor 网格线的颜色，默认值：黄色 Color.Yellow fn function 可选的回调函数，请参考二次开发：异步接口调用方式 startFloodFill(options, fn) 开始水淹分析 Parameters: Name Type Description options object 参数信息，支持以下属性 min (array) 水淹分析坐标范围: [minX, minY]，最小X/Y坐标值 max (array) 水淹分析坐标范围: [maxX, maxY]，最大X/Y坐标值 seed (array) 出水点: [X, Y]，X/Y取值需在对应的min和max范围内，注意：出水点必须在水淹分析范围内，且不能被物体遮挡，否则会无效 elevation (number) 水位高度，单位：米 color (Color) 水颜色，支持四种格式，取值示例 precision (number) 水淹模拟精度 (取值范围：[0~1] 精度越高效率会降低)，默认值：0.5 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 startGeometryEdit(id, type, fn) 开始顶点编辑，目前支持watermesh polygon 3dpolygon polyline RadiationPoint customObject Parameters: Name Type Description id string 对象ID type number 坐标架类型，共四种类型，取值说明：1.缩放 2.旋转 3.位移 4.混合，默认取值是4 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 startMeasurement(fn) 开始测量，用户可以在三维场景中点击鼠标进行测量 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 startPlaneClip(location, rotation, isShowPlane, isEditable, fn) 开始面剖切 Parameters: Name Type Description location array 生成位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] rotation array 旋转角度 [Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] isShowPlane boolean 剖切时是否显示辅助面，默认值：false isEditable boolean 剖切时是否可交互编辑，默认值：false fn function 可选的回调函数，请参考二次开发：异步接口调用方式 startPolygonClip(coordinates, isReverseCut, fn) TileLayer多边形剖切， 效果图如下： Parameters: Name Type Description coordinates array 多边形坐标数组（数组的格式与Polygon、Polygon3D、HighlightArea一样），取值示例 isReverseCut boolean 多边形剖切是否反转，默认值：false fn function 可选的回调函数，请参考二次开发：异步接口调用方式 startSkylineAnalysis(options, fn) 开始天际线分析 Parameters: Name Type Description options object 参数信息，支持以下属性（如果未设置某个属性，则使用默认值）： startPoint 可选参数，天际线分析起点坐标位置，若不传入则从鼠标点击 n function 可选的回调函数，请参考二次开发：异步接口调用方式 startViewDomeAnalysis(options, fn) 开始开敞度分析 Parameters: Name Type Description options object 参数信息，支持以下属性（如果未设置某个属性，则使用默认值） startPoint 观察点位置坐标，可选参数，当不传入此参数时需通过鼠标交互拾取目标点 radius 展示半径，单位：米，取值范围：[0.01~任意正数]，默认值：500 opacity 透明度，取值范围：[0~1]，默认值：0.5 visibleColor 可见区域的颜色，默认值：红色 Color.Red invisibleColor 不可见区域的颜色，默认值：绿色 Color.Green fn function 可选的回调函数，请参考二次开发：异步接口调用方式 startViewshedAnalysis(options, fn) 开始可视域分析 Parameters: Name Type Description options object 参数信息，支持以下属性（如果未设置某个属性，则使用默认值）： startPoint 可选，视域分析起点坐标位置，若不传入则从鼠标点击拾取获取，取值示例 endPoint 可选，视域分析终点坐标位置，若不传入则从鼠标点击拾取获取，取值示例 yaw 可选，水平角，取值范围：[-180°~180°]，默认值：0，注意：只有在鼠标点击拾取起始点目标点坐标时才生效 pitch 可选，俯仰角，取值范围：[-90°~90°]，默认值：0，注意：只有在鼠标点击拾取起始点目标点坐标时才生效 fov_h 横向视角，取值范围：[1°~150°]，默认值：60 fov_v 纵向视角，取值范围：[1°~150°]，默认值：30 height 视点高度（距离场景交互所拾取点的高度），默认值：0 visibleColor 可见区域的颜色，默认值：绿色 Color.Green invisibleColor 不可见区域的颜色，默认值：红色 Color.Red interactiveLock是否开启交互锁定，默认值：false fn function 可选的回调函数，请参考二次开发：异步接口调用方式 startVisiblityAnalysis(options, fn) 开始通视分析 Parameters: Name Type Description options object 参数信息，支持以下属性（如果未设置某个属性，则使用默认值） startPoint 观察点位置坐标，可选参数，当不传入此参数时需通过鼠标交互拾取目标点 endPoints 目标点位置集合数组，可选参数，当不传入此参数时需通过鼠标交互拾取目标点 height 视点高度（距离场景交互所拾取点的高度），取值范围：[任意负数~任意正数]，默认值：0 visibleColor 可见区域的颜色，默认值：红色 Color.Red invisibleColor 不可见区域的颜色，默认值：绿色 Color.Green fn function 可选的回调函数，请参考二次开发：异步接口调用方式 startVolumeClip(bbox, direction, isShowBBox, isEditable, rotation, fn) 开始体剖切 Parameters: Name Type Description bbox array 剖切的包围盒，即bounding box，取值示例 direction number 0：正向剖切，1：反向剖切 isShowBBox boolean 剖切时是否显示剖切范围的包围盒，默认值：false isEditable boolean 剖切时是否可交互编辑，默认值：false rotation array bbox的欧拉角，[Pitch,Yaw,Roll]，设置包围盒的旋转 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 stopClip(fn) 停止多边形剖切 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Deprecated: 2021.03.23之后的版本已弃用，请用stopPolygonClip代替 stopContourLineAnalysis(fn) 停止等高线分析 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 stopCutFillAnalysis(fn) 停止填挖方分析 Parameters ~1000]，默认值：0.5 flowRate (number) 流速，取值范围：[0~1.0]，默认值：0.5 depthTest (boolean) 是否做深度检测，默认为true，true会被遮挡，false不会被遮挡 shape (number) 样式，0：直线， 1：曲线，注意：设置为曲线坐标点多的时候会非常影响添加添加效率 style (PolylineStyle) 折线样式，箭头/光流/贴地/实线/虚线等，取值范围：[0~7]，详情参考 PolylineStyle tiling (number) 可选参数，材质贴图平铺比例，和PolylineStyle取值有关，目前仅部分样式支持此参数，从起始位置开始平铺，超过的部分会按此比例生成新的区域，类似CSS的repeat。如果这个值 &lt;= 0 使用自动计算按Polyline长度比例平铺， &gt;0使用用户输入的值去平铺 material (string) 可选参数，自定义材质路径，即资源库PAK文件里材质文件的路径，设置自定义材质参数后style相关参数会失效 scalarParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数值类型参数，包含name/value键值对的数组，其中value为数值，格式示例：[{\"name\":\"不透明度\",\"value\":0.5},{\"name\":\"UV重复\",\"value\":1.0}] vectorParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质矢量类型参数，包含name/value键值对的数组，其中value为数组，格式示例：[{\"name\":\"color1\",\"value\":[1,1,1,1]},{\"name\":\"color2\",\"value\":[1,0,0,1]}] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的TopologyLine Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个TopologyLine对象 Parameters: Name Type Description ids string | array 要删除的TopologyLine对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array TopologyLine对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取TopologyLine的详细信息 Parameters: Name Type Description ids string | array 要获取的TopologyLine对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example TopologyLine的详细信息 [ { \"id\": \"p1\", \"objectIds\": [ \"E78C50304F64ED20151624970CFA4FED\", \"8ECFECA747068210E87C618F8DF0B3E5\", \"1F95B7BD4A993AF2D9C4ECA3A214EA77\" ], \"range\": [ 1, 10000 ], \"color\": [ 1, 0, 0, 1 ], \"thickness\": 100, \"flowRate\": 1.5, \"shape\": 1, \"depthTest\": false, \"style\": 0, \"tiling\": 3, \"brightness\": 0.8 } ] hide(ids, fn) 隐藏TopologyLine对象 Parameters: Name Type Description ids string | array TopologyLine对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideAll(fn) 隐藏所有TopologyLine对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示TopologyLine对象 Parameters: Name Type Description ids string | array TopologyLine对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showAll(fn) 显示所有TopologyLine对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(topologyLine, fn) 修改一个或多个·TopologyLine对象 Parameters: Name Type Description topologyLine object | array 对象数据结构，结构参考add()方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"TrafficSimulation.html":{"id":"TrafficSimulation.html","title":"Class: TrafficSimulation","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: TrafficSimulation TrafficSimulation TrafficSimulation类，提供城市级交通仿真对象相关的操作，支持十万级别的城市车辆交通仿真。 一般通过api.trafficSimulation调用其方法 &lt;protected&gt; new TrafficSimulation() See: DigitalTwinAPI#trafficSimulation Extends BaseObject Methods add(trafficSimulation, fn) 初始化一个TrafficSimulation对象，支持十万级别的城市交通车辆仿真模拟 展示效果如下动图： Parameters: Name Type Description trafficSimulation object 交通仿真对象，支持以下属性： id (string) TrafficSimulation对象的ID groupId (string) 可选，Group分组Id userData (string) 可选，用户自定义数据 coordinateType (number) 可选，坐标系类型，取值：0为Projection类型，1为WGS84类型，默认值：0 noiseThreshold (number) 车辆摆头的降噪距离，单位：米，默认值：0.05 timer (boolean) 设置为false使用dat数据内的时间字段time，设置为true则使用定时器的时间间隔，默认：false， heatmap (object) 交通仿真热力图模式配置对象，包含结构如下： bbox (array) 热力图覆盖的范围：[minX,minY,minZ,maxX,maxY,maxZ]，数组元素类型：[任意浮点数] visible (boolean) 热力图是否可见，默认值：false blur (number) 热力图模糊因子，默认值：0.85，注意：模糊系数越高，渐变越平滑，取值范围：[0~1.0] heatRadiusScale (number) 热力点影像半径，单位：米，取值范围：[任意数值] gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 值对应的调色板颜色 value (number) 值 models (array) 交通仿真包含的车辆模型类型数组，注意：只需要在add()方法执行时配置，每一个数组元素对象包含属性如下： type (number) 车辆类型，注意这个数值会写入更新方法使用的.dat文件内。 package (string) 资源库车辆载具路径，取值类似CustomObject对象的assetPath，示例值：'/AirCityPlugin/ArtResources/Traffic/SUVTemplete' fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求参数示例 { \"id\": \"traffic\", \"coordinateType\": 1, \"groupId\": \"groupAll\", \"userData\": \"交通仿真\", \"noiseThreshold\": 0.05, //车辆降噪距离 \"timer\": false,// 禁用定时器时间间隔，使用dat数据内的time字段 \"heatmap\": { \"bbox\": [491439.1, 2490518, -5, 494439.1, 2493518.6, 20], \"visible\": false, \"blur\": 0.7, \"heatRadiusScale\": 5, \"colors\": { \"gradient\": true, \"size\": 256, \"colorStops\": [ { \"value\": 0, \"color\": [ 0, 0, 1, 1 ] }, { \"value\": 0.25, \"color\": [ 0, 1, 1, 1 ] }, { \"value\": 0.5, \"color\": [ 0, 1, 0, 1 ] }, { \"value\": 0.75, \"color\": [ 1, 1, 0, 1 ] }, { \"value\": 1, \"color\": [ 1, 0, 0, 1 ] } ] } }, \"models\": [ { \"type\": 1, \"package\": \"/AirCityPlugin/ArtResources/Traffic/SUVTemplete\" }, { \"type\": 2, \"package\": \"/JC_CustomAssets/VehicleLibrary/Exhibition/公交车_04\" }, { \"type\": 3, \"package\": \"/JC_CustomAssets/VehicleLibrary/Exhibition/迷你巴士_01\" } ] } autoHighlight(id, distance, fn) 根据相机高度自动高亮TrafficSimulation对象包含的所有车辆 Parameters: Name Type Description id string 要高亮TrafficSimulation对象的id distance number 达到此相机高度则车辆自动高亮，默认值：600米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个TrafficSimulation对象 Parameters: Name Type Description ids string | array 要删除的TrafficSimulation对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, distanceRotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array TrafficSimulation对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] distanceRotation array 可选参数，跟车相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hide(id, fn) 隐藏TrafficSimulation对象包含的所有车辆 Parameters: Name Type Description id string | array TrafficSimulation对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideHeatMap(id, fn) 隐藏TrafficSimulation对象的热力图效果 Parameters: Name Type Description id string TrafficSimulation对象的id fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideTextLabel(id, fn) 隐藏TrafficSimulation对象包含的所有车辆文字标签 Parameters: Name Type Description id string TrafficSimulation对象的id fn function 可选的回调函数，请参考二次开发：异步接口调用方式 highlight(id, fn) 高亮TrafficSimulation对象包含的所有车辆 Parameters: Name Type Description id string 要高亮TrafficSimulation对象的id fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(id, fn) 显示TrafficSimulation对象包含的所有车辆 Parameters: Name Type Description id string TrafficSimulation对象的ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showHeatMap(id, fn) 显示TrafficSimulation对象的热力图效果 Parameters: Name Type Description id string TrafficSimulation对象的id fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showTextLabel(id, fn) 显示TrafficSimulation对象包含的所有车辆文字标签 Parameters: Name Type Description id string TrafficSimulation对象的id fn function 可选的回调函数，请参考二次开发：异步接口调用方式 unHighlight(id, fn) 取消高亮TrafficSimulation对象包含的所有车辆 Parameters: Name Type Description id string 要高亮TrafficSimulation对象的id fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(trafficSimulation, fn) 更新一个时刻的TrafficSimulation对象 Parameters: Name Type Description trafficSimulation object 交通仿真对象，支持以下属性： id (string) TrafficSimulation对象的ID groupId (string) 可选，Group分组Id userData (string) 可选，用户自定义数据 file (string) 某个时刻的多辆车的轨迹点数据文件路径，包含：车辆id、车辆经度、车辆纬度、车辆类型、时间。二进制文件格式(.dat)，包含内容如下：id(int 4字节),lon(double 8字节),lat(double 8字节),type(int 4字节),time(int 4字节) coordinateType (number) 可选，坐标系类型，取值：0为Projection类型，1为WGS84类型，默认值：0 noiseThreshold (number) 车辆摆头的降噪距离，单位：米，默认值：0.05 timer (boolean) 设置为false使用dat数据内的时间字段time，设置为true则使用定时器的时间间隔，默认：false， heatmap (object) 交通仿真热力图模式配置对象，包含结构如下： bbox (array) 热力图覆盖的范围：[minX,minY,minZ,maxX,maxY,maxZ]，数组元素类型：[任意浮点数] visible (boolean) 热力图是否可见，默认值：false blur (number) 热力图模糊因子，默认值：0.85，注意：模糊系数越高，渐变越平滑，取值范围：[0~1.0] heatRadiusScale (number) 热力点影像半径，单位：米，取值范围：[任意数值] gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 值对应的调色板颜色 value (number) 值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求参数示例 { \"id\": \"traffic\", \"coordinateType\": 1, \"groupId\": \"\", \"userData\": \"\", \"file\": \"F:\\\\vehicle\\\\vehicle_\" + index + \".dat\", \"heatmap\": { \"bbox\": [474853.14,2484137.02,0,562179.26,2528221.135,383.999922], \"visible\": true, \"blur\": 0.1, \"heatRadiusScale\": 10, \"colors\": { \"gradient\": true, \"size\": 256, \"colorStops\": [ { \"value\": 0, \"color\": [0, 0, 1, 0] }, { \"value\": 0.25, \"color\": [0, 1, 1, 0] }, { \"value\": 0.5, \"color\": [0, 1, 0, 1] }, { \"value\": 0.75, \"color\": [1, 1, 0, 1] }, { \"value\": 1, \"color\": [1, 0, 0, 1] } ] } } updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Train.html":{"id":"Train.html","title":"Class: Train","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomOb eleration (number) 加速度，取值范围1-10000数值越大，提速和减速越快 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 对象结构示例 { \"id\": \"p1\", \"coordinates\": [ [2166.33, 322.46, 6.50], [1844.61, -296.01, 6.50], [1196.64, -592.53, 6.50], [-380.55, -277.10, 6.50] ], \"coordinateType\": 0, \"range\": [1, 100000], \"doubleLocomotive\": 1, \"direction\": 0, \"maxSpeed\": 300, \"carriageNum\": 4, \"carriageStyle\": \"复兴号2\", \"acceleration\": 1000 } clear(fn) 清空场景中所有的Train对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个Train对象 Parameters: Name Type Description ids string | array 要删除的Train对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, offset, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array Train对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，如果设置为负值则会在模型内部，可以用来模拟驾驶员视角 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] offset array 可选参数，定位后载具视角的偏移量，单位：米，默认值：[0,0,0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取Train对象的详细信息 Parameters: Name Type Description ids string | array 要获取的Train对象的Train对象的ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example train对象的详细信息 [{ \"id\": \"p1\", \"coordinates\": [ [2166.33, 322.46, 6.50], [1844.61, -296.01, 6.50], [1196.64, -592.53, 6.50], [-380.55, -277.10, 6.50] ], \"coordinateType\": 0, \"range\": [1, 100000], \"doubleLocomotive\": 1, \"direction\": 0, \"maxSpeed\": 300, \"carriageNum\": 4, \"carriageStyle\": \"复兴号2\", \"acceleration\": 1000 } hide(ids, fn) 隐藏一个或多个Train对象 Parameters: Name Type Description ids string | array Train对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 moveTo(data, fn) 火车按时间和里程移动 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) Train对象的ID distance (number) 行驶里程，单位：公里 time (number) 行驶耗时，单位：秒 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 pause(ids, fn) 根据火车ID暂停火车 Parameters: Name Type Description ids string | array 一辆火车ID或多辆火车的ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 resume(ids, fn) 根据火车ID恢复火车移动 Parameters: Name Type Description ids string | array 一辆火车ID或多辆火车的ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setFollow(ids, distance, flyTime, pitch, yaw, sensitivity, fn) 设置火车行驶时自动跟随相机 Parameters: Name Type Description ids string | array Train对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，如果设置为负值则会在模型内部，可以用来模拟驾驶员视角 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 pitch number 可选参数，相机旋转的Pitch，取值范围：[-90~90] yaw number 可选参数，相机旋转的Yaw，取值范围： [-180~180] sensitivity number 可选参数，载具灵敏度，取值范围： [0~1] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示一个或多个Train对象 Parameters: Name Type Description ids string | array Train对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个Train对象 Parameters: Name Type Description data object | array Train对象或者数组，请参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"VectorField.html":{"id":"VectorField.html","title":"Class: VectorField","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: VectorField VectorField 向量场类对象，基于真实数据对风场、波浪、洋流、河流、箭头、烟雾的场数据形态进行仿真，支持tif和bin格式 一般通过api.vectorField调用其方法 数据格式参考以下说明： 流场数据最终提供给程序使用是以三维纹理的方式用于渲染，所以要求在三个维度上采样均匀，也就是采样点间隔均匀，否则会变形甚至错误。 鉴于大部分气象海洋数据的坐标系都是wgs84坐标系，所以支持内部进行坐标重投影。 场如果是投影后的，可以变量控制加以区分。 场数据一个bin文件是一层数据，bin文件中不再保存采样点坐标，只有三维向量(U,V,W)。采样点存储需要行优先，横向从左到右存储，纵向从上向下顺序存储。 注意：向量的方向要在一个文件里，不能分别存储。 场数据导出时，每一层的数据文件必须以 （当前层索引).bin 为后缀存储。 比如 time0_isobaricInhPa2.bin， 因为配置给程序时只给一个参数，路径+time0_isobaricInhPa，后面的索引和后缀根据配置的层数自动添加循环加载数据。 如果是二维向量场，第三个分量W也必须给值，可以设置为0，不能只写两个变量，程序只识别三维向量。 bin文件结构描述： bin文件类似于dem文件结构的一个二维数组，数组元素可以是一个浮点数（标量）或者3个浮点数（向量），按行顺序排列。 例如有321*701的bin文件，即一个321x701的行列矩阵，前701个浮点是第0行，再701个浮点是第1行，直至第320行。bin文件渲染后在空间上会对应渲染范围参数。 tif文件结构描述： 所有tif文件的坐标系须和acp工程坐标系保持一致 每一个tif文件包含uvw三波段 每层是一个tif文件 所有tif文件的分辨率须保持一致 &lt;protected&gt; new VectorField() See: DigitalTwinAPI#vectorField Methods add(data, fn) 添加一个或多个VectorField向量场对象 Parameters: Name Type Description data object | array 构造向量场对象VectorField的数据对象，可以是Object类型或者Array类型，对于每一个VectorField对象，支持以下属性： id (string) VectorField对象ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 coordinateType (number) 坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 coordinate (array) 向量场对象的坐标位置 spawnRate (number) 粒子每秒生成的速率，影响粒子数量 spawnRateMin (number) 近距离粒子的生成速度，影响粒子数量 spawnRateMax (number) 远距离粒子的生成速度，影响粒子数量 spawnRatePower (number) 按距离插值时使用指数函数，设置指数函数的N次方，影响粒子数量 spawnLineRate (number) 每个线条上每秒生成的粒子数量 spawnLineCap (number) 每个线条上粒子的最大数量 repeatCount (number) 向量场重复次数，即粒子发射器的数量，影响粒子数量 killSpeed (number) 粒子显示的最小速度，影响粒子数量 backKill (boolean) 是否背面剔除，影响粒子数量 vfIntensAsVelocity (number) 场的强度到速度的缩放比例，影响粒子长度 lifeTime (number) 粒子的生命周期，即粒子存活时间，单位：秒，影响粒子长度 lifeTimeOcean (number) 洋流模式下粒子存活时间，仅displayMode为洋流模式生效，单位：秒，影响粒子长度 singleSpriteSize (number) 单个粒子大小，单位米，影响粒子大小 singleSpriteSizeOcean (number) 洋流模式下单个粒子大小，仅displayMode为洋流模式生效，单位米，影响粒子大小 lodMin (number) 粒子大小最小缩放比例，默认值：0.6，影响粒子大小 lodMax (number) 粒子大小最大缩放比例，默认值：2，影响粒子大小 lodMaxDistance (number) 粒子大小的最大缩放距离，即从[0~lodMaxDistance]映射到[lodMin~lodMax]对粒子大小进行缩放，注意：若超过此值则使用lodMax进行缩放，影响粒子大小 lodMinDistance (number) 粒子大小的最小缩放距离，即从[0~lodMinDistance]映射到[lodMin~lodMax]对粒子大小进行缩放，注意：若小于此值则使用lodMin进行缩放，影响粒子大小 headBrightness (number) 粒子发射器头部粒子的亮度缩放值，默认值：0.3，值越大发射器头部的粒子越亮 vectorFieldArray (array) 向量场点位数据数组，注意：和vectorFieldFilePath参数二选一即可 vetorFieldFilePath (string) 包含向量场点位数据的文件路径，支持通配符（xxx{z}.tif），{z}即文件名称最后的数字序号，注意：和vectorFieldArray参数二选一即可 binFileIndex (number) 数据文件名称开始索引，(xxx_0.tif,xxx_1.bin,xxx_2.bin...)，即从第几个bin/tif文件开始加载，默认从bin/tif文件名称数字后缀索引为0的开始加载，比如设置为0 则从xxx0.bin/xxx0.tif开始加载 depth (number) 向量场数据加载bin/tif的层数，范围：[0~文件最大索引值] fileOrder (number) 向量场数据加载bin/tif文件的堆叠顺序，0：正向堆叠（0~z层） 1：反向堆叠（z~0层） reset (boolean) 向量场更新时是否对原场数据进行重置（动画拖影效果），默认：false，注意：仅对update()函数生效 displayMode (string) 向量场的显示形态类型枚举【风场、波浪、洋流、河流、箭头、烟雾等类型】 ，参考 VectorFieldStyle width (number) 向量场分层数据宽的分辨率 height (number) 向量场分层数据高的分辨率 dataBounds (array) 向量场数据包含的bbox范围和高度范围 renderBounds (array) 待绘制的bbox范围，可以与向量场数据范围不一致，渲染裁切的部分区域 bDynamicRenderBound (boolean) 是否动态计算渲染范围，默认：false。注意：仅球面上生效 fieldScale (array) 向量场缩放大小 bNeedProjection (boolean) 是否需要重投影，经纬度坐标需要设置为true，默认值：false wkt (string) 重投影时的wkt字符串，为空时，默认投影到web墨卡托 offset (array) 向量场数据的整体偏移，默认不需要偏移 posFile (string) 位置坐标文件路径，txt文件格式类型 vFFile (string) UV流速流向的文件路径，txt文件格式类型 nDim (number) 流速流向数据纬度，即二维UV或者三维UVW speedRange (array) 流速流向的取值范围，示例：[min,max] vecScale (array) 向量缩放，默认值：[1,1,1]，仅支持txt文件格式类型 downsample (number) 分辨率按此参数进行缩放的比例，一般取2的n次幂，如：2，4，6，8，16... particleMaxNumber (number) 粒子最大数量限制 speedPower (number) 粒子速度的幂次方，小于1则粒子速度变小，大于1则粒子速度变大。默认值：1，注意：场内粒子的速度差距比较大时才需要设置此参数 colorStops (array) 颜色插值对象数组，支持按速度显示对应颜色，每一个对象都有以下属性： color (Color) 速度值对应的图例颜色 value (number) 速度值 opacityStops (array) 不透明度插值对象数组，支持按速度显示对应的不透明度，每一个对象都有以下属性： opacity (number) 速度值对应的不透明度，取值范围：[0~1] value (number) 速度值 subFields (array) 向量场支持的子场渲染范围会根据相机距离自动计算，定义一个或多个区域的子场来实现远近景切换Lod的效果，子场范围是依次包含的关系，第一个是从整体中指定一部分，第二个应该比第一个更小，依次类推，形成多级lod效果，每一个子场对象包含的参数如下： renderSphereOutRadius (number) 子场动态渲染的球的内径 renderSphereInnerRadius (number) 子场动态渲染的球的外径 startIndex (number) 父场repeatcount参数中该子场区域使用的粒子发射器数量的起始索引，剩下的粒子发射器影响父场 endIndex (number) 父场repeatcount参数中该子场区域使用的粒子发射器数量的结束索引，剩下的粒子发射器影响父场 singleSpriteSize (number) 子场的单个粒子大小，单位米，影响粒子大小 lodMin (number) 子场包含粒子大小的最小缩放比例，默认值：0.6，影响粒子大小 lodMax (number) 子场包含粒子大小的最大缩放比例，默认值：2.0，影响粒子大小 spawnRate (number) 子场粒子每秒生成的速率，影响粒子数量 spawnLineRate (number) 每个线条上每秒生成的粒子数量 spawnLineCap (number) 每个线条上粒子的最大数量 spawnRateMin (number) 子场近距离粒子的生成速度，影响粒子数量 spawnRateMax (number) 子场远距离粒子的生成速度，影响粒子数量 spawnRatePower (number) 子场粒子的密度变化曲线，即按距离插值时使用指数函数，设置指数函数的N次方，影响粒子数量 lodMaxDistance (number) 子场粒子大小的最大缩放距离，即从[0~lodMaxDistance]映射到[lodMin~lodMax]对粒子大小进行缩放，注意：举例若超过此值则使用lodMax进行缩放，影响粒子大小 lodMinDistance (number) 子场粒子大小的最小缩放距离，即从[0~lodMinDistance]映射到[lodMin~lodMax]对粒子大小进行缩放，注意：若小于此值则使用lodMin进行缩放，影响粒子大小 lifeTime (number) 子场粒子的生命周期，即粒子存活时间，单位：秒，影响粒子长度 lifeTimeMinScale (number) 子场粒子生命周期的缩放因子范围的最小值 lifeTimeMaxScale (number) 子场粒子生命周期的缩放因子范围的最大值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求数据结构示例 [{ \"id\":\"vectorField\", \"coordinate\":[0,0,0], \"repeatCount\":10, \"displayMode\":0, \"width\": 720, \"height\": 360, \"binFileIndex\": 0, \"depth\": 2, \"vetorFieldFilePath\": \"D:\\\\tif\\\\vf_{z}.tif\", //通配符{z}表示从0开始加载：vf_0.tif,vf_1.tif 两层tif \"dataBounds\":[-20037508,-20037508,0,20037508,20037508,1000], \"renderBounds\": [-20037508,-20037508,0,20037508,20037508,1000], \"fieldScale\":[1,1,1], \"bNeedProjection\": false, \"wkt\": \"\", \"offeset\": [0,0,0], \"singleSpriteSize\": 100, \"vfIntensAsVelocity\": 2, \"spawnRate\": 200, \"lifeTime\": 3, \"colorStops\": [ {\"value\": 100, \"color\": [1,0,0,1]}, {\"value\": 50, \"color\": [1,1,0,1]}, {\"value\": 25, \"color\": [0,0,1,1]}, {\"value\": 0, \"color\": [0,1,0,1]} ], \"opacityStops\": [ {\"value\": 100, \"opacity\": 1}, {\"value\": 50, \"opacity\": 0.75}, {\"value\": 25, \"opacity\": 0.5}, {\"value\": 0, \"opacity\": 0} ], \"subFields\": [ { \"renderBoundRatio\":[0.2,0.2,1], \"startIndex\": 0, \"endIndex\": 2, \"singleSpriteSize\": 50, \"lodMin\": 1, \"lodMax\": 1, \"spawnRate\": 200, \"spawnRateMin\": 100, \"spawnRateMax\": 500, \"spawnRatePower\": 1, \"lodMinDistance\": 500, \"lodMaxDistance\": 1000, \"lifeTime\": 3, \"lifeTimeMinScale\": 1, \"lifeTimeMaxScale\": 2, }, ] }] clear(fn) 清空场景中所有的VectorField对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个VectorField对象 Parameters: Name Type Description ids string | array 要删除的VectorField对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array VectorField对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取VectorField对象的详细信息 Parameters: Name Type Description ids string | array 要获取的VectorField对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example VectorField的详细信息 [{ \"id\": \"flowField1\", \"groupId\": \"flowFieldGroup1\", \"userData\": \"myFlowFieldData\", \"coordinateType\": 0, ... }] hide(ids, fn) 隐藏VectorField对象 Parameters: Name Type Description ids string | array VectorField对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setViewportVisible(id, vp, fn) 设置向量场对象在进入多视口状态下视口可见性 Parameters: Name Type Description id string VectorField对象ID vp Viewport 视口掩码（Viewport位运算） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示VectorField对象 Parameters: Name Type Description ids string | array VectorField对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个VectorField对象 Parameters: Name Type Description data object | array 构造向量场对象VectorField的数据对象，可以是Object类型或者Array类型，对于每一个VectorField对象，目前只支持更新以下属性： id (string) VectorField对象ID dataBounds (array) 向量场数据经纬度范围和高度范围 renderBounds (array) 待绘制的数据范围，可以与向量场数据不一致 singleSpriteSize (number) 单个粒子大小，单位米 singleSpriteSizeOcean (number) 洋流模式下单个粒子大小，仅displayMode为洋流模式生效，单位米 vfIntensAsVelocity (number) 场到强度到速度的缩放比例 lifeTime (number) 粒子的生命周期，即粒子存活时间，单位：秒，影响粒子长度 lifeTimeOcean (number) 洋流模式下粒子存活时间，仅displayMode为洋流模式生效，单位：秒 colorStops (array) 颜色插值对象数组，支持按速度显示对应颜色，每一个对象都有以下属性： color (array) 速度值对应的图例颜色 value (number) 速度值 opacityStops (array) 不透明度插值对象数组，支持按速度显示对应的不透明度，每一个对象都有以下属性： opacity (number) 速度值对应的不透明度，取值范围：[0~1] value (number) 速度值 fenceThickness (number) 向量场栅栏宽度，默认值：1 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Vehicle.html":{"id":"Vehicle.html","title":"Class: Vehicle","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourData  | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 字符串类型的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 coordinateType (number) 可选，坐标系类型，取值：0为Projection类型，1为WGS84类型，默认值：0 videoURL (string) 视频地址，支持本地文件和网络文件，同时支持rtsp协议、http协议等实时流媒体地址 location (array) 位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] rotation (array) 旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] fov (number) 垂直夹角，取值范围：[0~160]，单位：度 aspectRatio (number) 宽高比，常见比例如：16:9或4:3等，取值范围：[0.1~10.0] exposure (number) 曝光度，取值范围：[0~3]，默认值：0.6 screen (boolean) 是否显示投影幕布，默认值：false screenDistance (number) 投影幕布的显示距离，单位：米，默认值：100米 distance (number) 投影距离，取值范围：[0~1000000.0]，单位：米 minDistance (number) 近裁距离，取值范围：[0~1000000.0]，单位：米 depthCulling (boolean) 是否背面剔除，默认值：false frustumVisible (boolean) 是否显示投影线框，默认值：false frustumColor (Color) 投影线框颜色，支持四种格式，取值示例 texturePath (string) 自定义投影蒙版图片路径，可以是本地路径，也支持网络路径，资源引入说明 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的VideoProjection对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个VideoProjection对象 Parameters: Name Type Description ids string | array 要删除的VideoProjection对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array VideoProjection对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取VideoProjection的详细信息 Parameters: Name Type Description ids string | array 要获取的VideoProjection对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example VideoProjection的详细信息 [{ \"id\": \"vp1\", \"groupId\": \"\", \"videoURL\": \"C:\\\\Users\\\\Administrator\\\\AppData\\\\Roaming\\\\Cloud\\\\SDK/media/video/video2.mov\", \"mediaType\": 153, \"location\": [495333.593750, 2490901.000000, 20.000000], \"rotation\": [-49.999992, 0.000000, 0.000000], \"fov\": 90.000000, \"aspectRatio\": 1.770000, \"distance\": 100.000000, \"depthCulling\": 1, \"frustumColor\": [0.000000, 0.000000, 1.000000, 1.000000] }] hide(ids, fn) 隐藏VideoProjection Parameters: Name Type Description ids string | array VideoProjection对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setAspectRatio(id, newVal, fn) 设置纵横比 Parameters: Name Type Description id string VideoProjection对象的ID newVal number 新纵横比，取值范围：[0.1~10.0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setDepthCulling(id, newVal, fn) 设置是否背面剔除 Parameters: Name Type Description id string VideoProjection对象的ID newVal boolean 是否背面剔除，默认值：false fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setDistance(id, newVal, fn) 设置距离 Parameters: Name Type Description id string VideoProjection对象的ID newVal number 新距离值，取值范围：[0~1000000.0]，单位：米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setFovy(id, newVal, fn) 设置垂直夹角 Parameters: Name Type Description id string VideoProjection对象的ID newVal number 新垂直夹角，取值范围：[0~160]，单位：度 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setFrustumColor(id, newVal, fn) 设置投影线框颜色 Parameters: Name Type Description id string VideoProjection对象的ID newVal Color 新颜色值，支持四种格式，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setLocation(id, newVal, fn) 设置位置 Parameters: Name Type Description id string VideoProjection对象的ID newVal array 新位置坐标：[X,Y,Z]，取值示例，数组元素类型：(number)，取值范围：[任意数值] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setRotation(id, newVal, fn) 设置旋转值 Parameters: Name Type Description id string VideoProjection对象的ID newVal array 新旋转值：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setVideoURL(id, newVal, fn) 设置视频地址 Parameters: Name Type Description id string VideoProjection对象的ID newVal string 新视频地址，支持本地文件和网络地址，同时支持rtsp实时视频流协议，注意：mp4文件视频只支持H264/AVC编码格式的 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示VideoProjection Parameters: Name Type Description ids string | array VideoProjection对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个VideoProjection对象 Parameters: Name Type Description data object | array 数据结构，请参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"WaterFlowField.html":{"id":"WaterFlowField.html","title":"Class: WaterFlowField","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: WaterFlowField WaterFlowField WaterFlowField流场类对象，用于精确控制水流单个网格的方向速度等 一般通过api.waterFlowField调用其方法 &lt;protected&gt; new WaterFlowField() See: DigitalTwinAPI#waterFlowField Methods add(data, fn) 添加一个或多个WaterFlowField对象 Parameters: Name Type Description data object | array WaterMesh数据，可以是Object类型或者Array类型，对于每一个WaterFlowField对象，支持以下属性： id (string) WaterFlowField对象ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 coordinateType (number) 坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 indices (array) 可选，顶点坐标的索引，用来绘制流场内的三角网格，可以为空，若不传则使用系统默认计算的顶点索引；数组元素类型：(number)；数组元素顺序：顶点索引顺序需构成三角网格且同为顺时针或逆时针方向；数组元素取值范围：[0~points.length-1]，取值示例：[2, 0, 3, 0, 2, 1] maxEdgeLength (number) 三角网格边的最大长度，用于控制流场内各三角形边的最大长度，取值范围：[0~任意正数]，单位：米，默认值：0，自动计算最大长度 points (array) 流场内运动的采样点位置坐标数组，二维数组，数组元素：[X,Y,Z]，取值示例 uvs (array) 流场内运动的采样点流速流向数组，二维数组，数组元素：[U,V]，单位：米/秒，其中uvs数组必须和points保持对应关系且长度一致 alphas (array) 流场内运动的采样点渲染区域不透明度数组，一维数组，数组元素：数值，范围：[0~1]，其中alphas数组必须和points和uvs保持对应关系且长度一致 validUVRange (array) 流速有效范围，流速小于min的区域会显示蓝色，min到max之间的区域会从蓝色过渡到红色显示热力图的颜色变化效果，流速大于max的显示红色，[min,max]，数组元素min/max的取值范围：[0~任意正数]，默认值：[0,max]，数组元素单位：米/秒 uvRangeMapping (array) 流速重映射范围，为了突出流动效果，可以对流速有效范围进行一个映射，把ValidUVRange的min和max映射到一个新的min和max，方便看出流向，[mapMin,mapMax]，即validUVRange范围的对应数值映射的新范围，用来增加流速从而调整渲染效果。 displayMode (WaterFlowFieldStyle) 流场的材质样式，参考 WaterFlowFieldStyle，0为热力值材质，1为水流材质，2为光流粒子材质，默认取值：0 heatValues (array) 可选，热值数组，一维数组，数组元素为数值，仅displayMode参数为0时生效，heatValues数组长度必须和points/uvs保持对应关系且长度一致 colorLookUpArray (array) 可选，热值显示对应的颜色数组，二维数组，数组元素为[r,g,b,a]颜色数组，rgba取值范围：[0~1]，即各颜色值除于255，仅displayMode参数为0时生效，数组长度大于2 heatValueRange (array) 可选，热值取值范围数组，仅displayMode参数为0时生效，取值示例：[min,max]，数组元素min/max的取值范围：[0~1000]，默认值：[0,1] waterColor (Color) 水流材质的颜色，仅displayMode=1时生效，默认值：[0.0, 0.325, 0.223, 1.00]，支持四种格式，取值示例 particleScale (number) 水流粒子缩放大小，取值范围：[1~30]，默认值：1 traceFactor (number) 光流轨迹保持因子，仅在displayMode=2生效，取值范围：[0~100] 值越大粒子轨迹越长，注意：水流场的采样点越稀疏，因子值就要设置越大 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求数据结构示例 [{ \"id\":\"waterFlowField1\", //WaterFlowField对象ID \"groupId\": \"waterFlowFieldGroup1\", //可选，Group分组 \"userData\": \"myWaterFlowFieldData\",//可选，用户自定义数据 \"coordinateType\": 0, //坐标系类型 0为投影坐标系 \"displayMode\": WaterFlowFieldStyle.HeapMap, //0为热力值材质，1为水流材质 \"waterColor\": [0.0, 0.325, 0.223, 1.00],//水流材质的颜色，仅displayMode=1时生效 \"validUVRange\": [2,3.2], //水流速度叠加后显示的颜色热力值范围 \"particleScale\": 2, //水流粒子大小 //\"indices\":[2, 0, 3, 0, 2, 1],//采样点顶点坐标的索引，允许为空，当此参数为空时系统自动计算三角面的顶点索引 \"maxEdgeLength\": 0,//三角网格边的最大长度，用于控制流场内各三角形边的最大长度，传入默认值0时则自动计算最大长度 \"points\": [[1000, 1000, 100], [1000, -1000, 100], [-1000, -1000, 100], [-1000, 1000, 100]],//采样点位置坐标数组 \"uvs\": [[2.85,-0.17],[5,9],[10,20],[20,10]]//流速流向数组 \"alphas\": [1,1,1,1] }] clear(fn) 清空场景中所有的WaterFlowField对象 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个WaterFlowField对象 Parameters: Name Type Description ids string | array 要删除的WaterFlowField对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array WaterFlowField对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取WaterFlowField对象的详细信息 Parameters: Name Type Description ids string | array 要获取的WaterFlowField对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example WaterFlowField的详细信息 [{ \"id\": \"flowField1\", \"groupId\": \"flowFieldGroup1\", \"userData\": \"myFlowFieldData\", \"coordinateType\": 0, \"maxEdgeLength\": 0, \"displayMode\": 0, \"waterColor\": [0.0, 0.325, 0.223, 1.00], \"validUVRange\": [2.000000, 3.200000], \"particleScale\": 2.000000 }] hide(ids, fn) 隐藏WaterFlowField对象 Parameters: Name Type Description ids string | array WaterFlowField对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setViewportVisible(id, vp, fn) 设置水流场对象在进入多视口状态下视口可见性 Parameters: Name Type Description id string WaterFlowField对象ID vp Viewport 视口掩码（Viewport位运算） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示WaterFlowField对象 Parameters: Name Type Description ids string | array WaterFlowField对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个WaterFlowField对象 Parameters: Name Type Description data object | array WaterFlowField数据，支持单个对象和对象数组，结构参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"WaterMesh.html":{"id":"WaterMesh.html","title":"Class: WaterMesh","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials
