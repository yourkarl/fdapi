mber 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取WaterMesh的详细信息 Parameters: Name Type Description ids string | array 要获取的WaterMesh对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example WaterMesh的详细信息 { \"id\": \"\", \"groupId\": \"\", \"userData\": \"\", \"waterColor\": [0.000000, 0.000000, 1.000000, 1.000000], \"waterUVRepeat\": 1000.000000, \"waterSpeed\": 5.000000, \"waterDirection\": 0.250000, \"waterWave\": 0.500000 } hide(ids, fn) 隐藏WaterMesh Parameters: Name Type Description ids string | array WaterMesh对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideAll(fn) 隐藏所有WaterMesh Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setCoordinates(id, newVal, fn) 设置WaterMesh顶点坐标 Parameters: Name Type Description id string 唯一标识符 newVal array 新的顶点坐标，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setIndices(id, newVal, fn) 设置WaterMesh顶点坐标索引 Parameters: Name Type Description id string 唯一标识符 newVal array 新顶点坐标的索引，数组元素类型：(number)，数组元素取值范围：[0~coordinates.length-1]，取值示例：[2, 0, 3, 0, 2, 1] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setNormals(id, newVal, fn) 设置WaterMesh法向 Parameters: Name Type Description id string 唯一标识符 newVal array 新法向 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setWaterColor(id, newVal, fn) 设置颜色 Parameters: Name Type Description id string WaterMesh唯一标识符 newVal Color 新颜色值，支持四种格式，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setWaterDirection(id, newVal, fn) 设置水流方向 Parameters: Name Type Description id string WaterMesh唯一标识符 newVal number 新的水流方向 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setWaterSpeed(id, newVal, fn) 设置水流速度 Parameters: Name Type Description id string WaterMesh唯一标识符 newVal number 新的水流速度 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setWaterUVRepeat(id, newVal, fn) 设置水流贴图重复间隔距离 Parameters: Name Type Description id string WaterMesh唯一标识符 newVal number 新的水流贴图重复间隔距离 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setWaterWaveScale(id, newVal, fn) 设置水波纹大小 Parameters: Name Type Description id string WaterMesh唯一标识符 newVal number 新的水波纹大小 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示WaterMesh Parameters: Name Type Description ids string | array WaterMesh对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showAll(fn) 显示所有WaterMesh Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个WaterMesh对象 Parameters: Name Type Description data object | array WaterMesh数据，参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Weather.html":{"id":"Weather.html","title":"Class: Weather","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: Weather Weather Weather类，提供天气相关的参数设置和获取接口 &lt;protected&gt; new Weather() See: DigitalTwinAPI#weather Methods disableRainSnow(fn) 关闭雨雪效果 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 getDateTime(fn) 获取日期时间 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 获取的日期时间 { \"hour\": 9, // 时 \"minute\": 0, // 分 \"year\": 2021, // 年 \"month\": 10, // 月 \"day\": 28, // 日 \"latitude\": 20.000000, // 经度 \"longitude\": 116.000000, // 维度 \"timeZone\": 8.000000, // 时区 \"daynightLoop\": 0, // 是否日夜循环，0关闭 1开启 \"dayLength\": 3.000000 //模拟时长，即几分钟模拟循环一天，仅在开启日夜循环后生效 } getOceanWave(fn) 查询海浪效果参数 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 getParams(fn) 获取天气相关的参数 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 获取的天气参数 { \"darkMode\": 0, //是否黑暗模式，0关闭 1打开 \"cloudDensity\": 0.500000, //云层密度，取值范围：[0~1.0] \"cloudThickness\": 2.00000, //云层厚度，取值范围：[0~20.0] \"fogDensity\": 0.100000, //整体雾浓度，取值范围:[0~1.0] \"fogGroundDensity\": 0.000000, //地面雾浓度，取值范围:[0~1.0] \"fogGroundHeight\": 0.000000, //地面雾高度，取值范围:[0~10]（单位KM） \"rainsnow\": 0, //是否雨雪效果，0关闭 1打开 \"rainsnowStrength\": 0.000000, //雨雪强度（必须大于0，才会有下雨效果），取值范围:[0~1.0] \"rainsnowSpeed\": 0.300000, //雨雪速度，取值范围:[0~10] \"raindropSize\": 0.200000, //雨滴大小，取值范围:[0~5] \"snowflakeSize\": 0.800000, //雪花大小，取值范围:[0~25] \"sunSize\": 25, //太阳尺寸，取值范围:[0~100] \"sunColor\": [1,1,1,1], //太阳尺寸，取值范围:[0~100] \"moonSize\": 30,//月亮尺寸，取值范围:[0~100] \"sunIntensity\": 0.7,//太阳光照射强度，取值范围:[0~10] \"moonIntensity\": 30,//月亮光照射强度，取值范围:[0~100] \"ambientLightIntensity\": 0.3,//环境光强度，取值范围:[0~10] \"temperature\": 8500,//色温值，取值范围:[1700~12000] \"shadowQuality\": 2,//阴影质量，取值范围：[1~5] \"shadowDistance\": 2000,//阴影可视距离，取值范围:[0~任意正数]，单位：米 } setAmbientLightIntensity(ambientLightIntensity, fn) 设置环境光强度 Parameters: Name Type Description ambientLightIntensity number 环境光强度，取值范围:[0~5] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setCloudDensity(cloudDensity, fn) 设置云层的密度 Parameters: Name Type Description cloudDensity number 云层密度，取值范围：[0~1.0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setCloudParam(cloudsColor, cloudsAltitude, cloudShadowStrength, fn) 设置云效参数 Parameters: Name Type Description cloudsColor number 云层颜色，支持四种格式，取值示例 cloudsAltitude number 云层海拔高度，单位：千米/km，取值范围：[0~8km] cloudShadowStrength number 云层阴影，取值范围:[0~1] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setCloudThickness(cloudThickness, fn) 设置云层的厚度 Parameters: Name Type Description cloudThickness number 云层厚度，取值范围：[0~0.5] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setDarkMode(bDark, fn) 设置是否进入黑暗模式 效果图： Parameters: Name Type Description bDark boolean 布尔值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setDateTime(year, month, day, hour, minute, daynightLoop, fn) 设置日期时间 Parameters: Name Type Description year number 年 month number 月 day number 日 hour number 时 minute number 分 daynightLoop boolean 是否日夜循环 如果为true 则三分钟模拟循环一天 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setEarthCloudIntensity(earthCloudIntensity, fn) 球面工程坐标系下，设置地球大气云层的亮度 Parameters: Name Type Description earthCloudIntensity number 地球大气云层的亮度，默认值：0，取值范围：[0~1]，设置0则隐藏云层 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Returns: setEarthNightLightIntensity(earthNightLightIntensity, fn) 球面工程坐标系下，设置地球夜晚灯光的亮度 Parameters: Name Type Description earthNightLightIntensity number 地球夜晚灯光的亮度，默认值：0，取值范围：[0~1]，设置0则关闭灯光 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Returns: setEarthStarBackgroundIntensity(earthStarBackgroundIntensity, fn) 球面工程坐标系下，设置星空背景的亮度 Parameters: Name Type Description earthStarBackgroundIntensity number 星空背景的亮度，默认值：0，取值范围：[0~1]，设置0则关闭星空背景亮度 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Returns: setFogParam(fogDensity, fogColor, fogHeightFalloff, fogStartDistance, fogOpacity, fn) 设置雾效参数。 效果图： Parameters: Name Type Description fogDensity number 雾的浓度，取值范围:[0~2.0] fogColor number 雾的颜色，支持四种格式，取值示例 fogHeightFalloff number 高度衰减，取值范围:[0~2] fogStartDistance number 起雾距离，取值范围:[0~10000] fogOpacity number 透明度，取值范围:[0.00~1.00] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setHighCloud(highCloudLayerCoverage, highCloudWindSpeed, highCloudWindDirection, cirrusCloudDensity, cirrostratusCloudDensity, cirrocumulusCloudDensity, fn) 设置高云层效果参数 Parameters: Name Type Description highCloudLayerCoverage number 密度，取值范围：[0~1] highCloudWindSpeed number 风速，取值范围：[0~100] highCloudWindDirection number 风向，取值范围：[0~360] cirrusCloudDensity number 卷云密度，取值范围：[0~1] cirrostratusCloudDensity number 卷层云密度，取值范围：[0~1] cirrocumulusCloudDensity number 卷积云密度，取值范围：[0~1] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setLowCloud(lowCloudCoverage, lowCloudDensity, lowCloudHeight, lowCloudWindSpeed, lowCloudWindDirection, fn) 设置低云层效果参数 Parameters: Name Type Description lowCloudCoverage number 覆盖率，取值范围：[0~1] lowCloudDensity number 密度，取值范围：[0~1] lowCloudHeight number 厚度，取值范围：[0~0.5] lowCloudWindSpeed number 风速，取值范围：[0~100] lowCloudWindDirection number 风向，取值范围：[0~360] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setMoonIntensity(moonIntensity, fn) 设置月亮光照强度 Parameters: Name Type Description moonIntensity number 月亮光照强度，取值范围:[0~1] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setMoonSize(moonSize, fn) 设置月亮尺寸 Parameters: Name Type Description moonSize number 月亮尺寸，取值范围:[0~10] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setOceanWave(options, fn) 设置海浪效果参数 Parameters: Name Type Description options object 海浪效果的相关参数如下： scale (number) 海浪起伏整体的缩放倍率（包括以下波长、振幅和速度参数），默认值：1 length (number) 海浪的波长，值越大海面越平静，默认值：6米 amplitude (number) 海浪的振幅，值越大上下起伏越大，默认值：4.2米 speed (number) 海浪的运动速度倍率，值越大海浪运动越快，默认值：9 formDensity (number) 海浪泡沫的强度，默认值：0.2，取值范围：[0,1] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setRainParam(strength, speed, raindropSize, rainColor, alignCamera, overcastStrength, fn) 设置雨效。注意：开启雨效前需先设置云层的厚度和密度，效果图： Parameters: Name Type Description strength number 雨效强度（必须大于0，才会有下雨效果），取值范围:[0~1.0] speed number 雨效速度，取值范围:[0~1.0] r iption temperature number 色温值，单位：开尔文，简称K，取值范围:[1700~12000] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 simulateTime(startTime, endTime, duration, fn) 模拟时间播放 Parameters: Name Type Description startTime array | number 开始时间，类型可以是数组或数字。 如果是数组，则设置时、分：[hour, minute]；如果是数字，则设置整点：hour。 endTime array | number 结束时间，类型可以是数组或数字。 如果是数组，则设置时、分：[hour, minute]；如果是数字，则设置整点：hour。 duration number 模拟的时长，单位：秒 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"tutorial-API_AsyncCall.html":{"id":"tutorial-API_AsyncCall.html","title":"Tutorial: API_AsyncCall","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode API_AsyncCall 二次开发：异步接口调用方式说明文档 ​ DigitalTwinAPI的接口大部分都是异步的，所以在调用的时候需要进行特殊处理，否则可能因为调用错误而不能实现预期的效果。目前有三种异步接口的调用方式，DigitalTwinAPI同时支持这3种方式，需要注意的是：在一个函数体内，这3种方式不能混合使用，只能选择其中一种。 方式一：使用callback回调函数进行调用 这是最先支持的一种方式，代码逻辑简单，容易理解，但是当一个函数体内调用的异步接口比较多的时候，代码可读性变差，维护比较麻烦，在下面的例子里可以看到使用了多个嵌套函数，括号太多，比较混乱。 fdapi.tag.delete('tag1', function () { fdapi.camera.get(function (cam) { let o = new TagData('tag1'); o.coordinate = [cam.x, cam.y, 25.4]; o.imagePath = HostConfig.Path + '/samples/images/tag.png'; o.imageSize = [28, 28]; o.text = '北京银行'; o.showLine = true; fdapi.tag.add(o, function () { fdapi.tag.focus(o.id, 500, 0.2, function () { log(\"Test Finished.\"); }); //focus }); //add }) //get }); //delete 方式二：使用then链的方式调用 这种方式通过连续的then调用来解决函数嵌套问题，可读性比回调的方式要好一些。 fdapi.tag.delete('tag1').then(() =&gt; fdapi.camera.get()) .then((cam) =&gt; { let o = new TagData('tag1'); o.coordinate = [cam.x, cam.y, 25.4]; o.imagePath = HostConfig.Path + '/samples/images/tag.png'; o.imageSize = [28, 28]; o.text = '北京银行'; o.showLine = true; fdapi.tag.add(o); }) .then(() =&gt; fdapi.tag.focus('tag1', 500, 0.2)) .then(() =&gt; { log(\"Test Finished.\"); }) 方式3：使用async/await的异步方式调用 这种方式其实是第2种方式的语法糖，但是可读性大大提高。 await fdapi.tag.delete('tag1') let cam = await fdapi.camera.get(); let o = new TagData('tag1'); o.coordinate = [cam.x, cam.y, 25.4]; o.imagePath = HostConfig.Path + '/samples/images/tag.png'; o.imageSize = [28, 28]; o.text = '北京银行'; o.showLine = true; await fdapi.tag.add(o); await fdapi.tag.focus(o.id, 500, 0.2); log(\"Test Finished.\"); 在int.html运行上面三种方式的代码，可以看到页面的输出都是一样的： Request: CustomTag_Delete（下午1:40:10） {\"command\":37,\"ids\":[\"tag1\"],\"timestamp\":1616132410590,\"callbackIndex\":35,\"__command\":\"CustomTag_Delete\"} Response: CustomTag_Delete（耗时：33ms） 请求时间：下午1:40:10 响应时间：下午1:40:10 { \"command\": 37, \"timestamp\": 1616132410590, \"callbackIndex\": 35, \"result\": 0, \"resultMessage\": \"OK\", \"message\": { }, \"ids\": [\"tag1\"] } Request: Camera_GetCamera（下午1:40:10） {\"command\":6,\"timestamp\":1616132410624,\"callbackIndex\":36,\"__command\":\"Camera_GetCamera\"} Response: Camera_GetCamera（耗时：100ms） 请求时间：下午1:40:10 响应时间：下午1:40:10 { \"command\": 6, \"timestamp\": 1616132410624, \"callbackIndex\": 36, \"result\": 0, \"resultMessage\": \"OK\", \"x\": -57.773582, \"y\": -3309.501221, \"z\": 687.396240, \"pitch\": -44.999958, \"yaw\": -88.999962, \"roll\": 0.000002, \"camera\": [-57.773582, -3309.501221, 687.396240, -44.999958, -88.999962, 0.000002] } Request: Tag_Add（下午1:40:10） {\"command\":36,\"data\":[{\"id\":\"tag1\",\"coordinate\":[-57.773582,-3309.501221,25.4],\"imagePath\":\"D:\\\\Pojects\\\\DigitalTwinCloud\\\\SDK/images/tag.png\",\"imageSize\":[28,28],\"text\":\"北京银行\",\"range\":[1,100000],\"showLine\":true,\"textColor\":[0,0,0,1],\"textBackgroundColor\":[1,1,1,0.85],\"textBorderColor\":[0,0,0,0],\"textRange\":100000,\"autoHidePopupWindow\":true}],\"timestamp\":1616132410726,\"callbackIndex\":37,\"__command\":\"Tag_Add\"} Response: Tag_Add（耗时：99ms） 请求时间：下午1:40:10 响应时间：下午1:40:10 { \"command\": 36, \"timestamp\": 1616132410726, \"callbackIndex\": 37, \"result\": 0, \"resultMessage\": \"OK\", \"message\": { }, \"ids\": [\"tag1\"] } Request: CustomTag_Focus（下午1:40:10） {\"command\":40,\"ids\":[\"tag1\"],\"distance\":500,\"flyTime\":0.2,\"timestamp\":1616132410828,\"callbackIndex\":38,\"__command\":\"CustomTag_Focus\"} Response: CustomTag_Focus（耗时：97ms） 请求时间：下午1:40:10 响应时间：下午1:40:10 { \"command\": 40, \"timestamp\": 1616132410828, \"callbackIndex\": 38, \"result\": 0, \"resultMessage\": \"OK\" } Test Finished. Response: Event { \"eventtype\": \"CameraChanged\", \"Pitch\": -44.999958038330078, \"Yaw\": -88.999961853027344, \"Position\": [ -69.326980590820313, -3971.396484375, 687.396240234375 ] } OnEvent: CameraChanged 从上面的输出可以看到异步接口是按顺序执行的，每调用一次接口，都是收到服务器返回数据后才会往下继续执行下一次异步接口。 我们把代码做如下的修改，去掉所有的异步调用方式： fdapi.tag.delete('tag1') let cam = fdapi.camera.get(); let o = new TagData('tag1'); o.coordinate = [cam.x, cam.y, 25.4]; o.imagePath = HostConfig.Path + '/samples/images/tag.png'; o.imageSize = [28, 28]; o.text = '北京银行'; o.showLine = true; fdapi.tag.add(o); fdapi.tag.focus(o.id, 500, 0.2); log(\"Test Finished.\"); 然后再执行，然后观察页面的输出： Request: CustomTag_Delete（下午1:45:17） {\"command\":37,\"ids\":[\"tag1\"],\"timestamp\":1616132717350,\"callbackIndex\":39,\"__command\":\"CustomTag_Delete\"} Request: Camera_GetCamera（下午1:45:17） {\"command\":6,\"timestamp\":1616132717351,\"callbackIndex\":40,\"__command\":\"Camera_GetCamera\"} Request: Tag_Add（下午1:45:17） {\"command\":36,\"data\":[{\"id\":\"tag1\",\"coordinate\":[null,null,25.4],\"imagePath\":\"D:\\\\Pojects\\\\DigitalTwinCloud\\\\SDK/images/tag.png\",\"imageSize\":[28,28],\"text\":\"北京银行\",\"range\":[1,100000],\"showLine\":true,\"textColor\":[0,0,0,1],\"textBackgroundColor\":[1,1,1,0.85],\"textBorderColor\":[0,0,0,0],\"textRange\":100000,\"autoHidePopupWindow\":true}],\"timestamp\":1616132717351,\"callbackIndex\":41,\"__command\":\"Tag_Add\"} Request: CustomTag_Focus（下午1:45:17） {\"command\":40,\"ids\":[\"tag1\"],\"distance\":500,\"flyTime\":0.2,\"timestamp\":1616132717352,\"callbackIndex\":42,\"__command\":\"CustomTag_Focus\"} Test Finished. Response: Camera_GetCamera（耗时：73ms） 请求时间：下午1:45:17 响应时间：下午1:45:17 { \"command\": 6, \"timestamp\": 1616132717351, \"callbackIndex\": 40, \"result\": 0, \"resultMessage\": \"OK\", \"x\": -69.326981, \"y\": -3971.396484, \"z\": 687.396240, \"pitch\": -44.999958, \"yaw\": -88.999962, \"roll\": 0.000002, \"camera\": [-69.326981, -3971.396484, 687.396240, -44.999958, -88.999962, 0.000002] } Response: CustomTag_Delete（耗时：175ms） 请求时间：下午1:45:17 响应时间：下午1:45:17 { \"command\": 37, \"timestamp\": 1616132717350, \"callbackIndex\": 39, \"result\": 0, \"resultMessage\": \"OK\", \"message\": { }, \"ids\": [\"tag1\"] } Response: Tag_Add（耗时：275ms） 请求时间：下午1:45:17 响应时间：下午1:45:17 { \"command\": 36, \"timestamp\": 1616132717351, \"callbackIndex\": 41, \"result\": 0, \"resultMessage\": \"OK\", \"message\": { }, \"ids\": [\"tag1\"] } Response: Event { \"eventtype\": \"CameraChanged\", \"Pitch\": -44.999958038330078, \"Yaw\": -88.999961853027344, \"Position\": [ -11.553402900695801, -661.8956298828125, 687.396240234375 ] } OnEvent: CameraChanged Response: CustomTag_Focus（耗时：377ms） 请求时间：下午1:45:17 响应时间：下午1:45:17 { \"command\": 40, \"timestamp\": 1616132717352, \"callbackIndex\": 42, \"result\": 0, \"resultMessage\": \"OK\" } 从上面的输出可以看到，异步接口的Request、Response不再有序，而是混乱的， 另外从三维场景的变化也可以看到，并没有达到预期的效果。 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"tutorial-API_AuthSDK.html":{"id":"tutorial-API_AuthSDK.html","title":"Tutorial: API_AuthSDK","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeM ieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode API_Event 一、关于事件交互系统的说明 1.1、内置交互事件名称及监听说明 初始化API时根据回调函数监听 初始化API时监听，示例代码如下： //场景交互事件回调函数，默认构造参数event即为事件对象 function onEvent(event) { //事件类型 参考交互事件类型枚举对象 var eventType = event.eventtype; //图层类型 var layerType = event.Type; //图层Id var layerId = event.Id || event.ID; //点击ActorId var objectId = event.ObjectID; //当前点击位置 var objectLocation = event.MouseClickPoint; switch (eventType) { //鼠标左键点击时触发此事件 case \"LeftMouseButtonClick\": log('触发事件类型：鼠标左键单击，eventType：' + eventType); break; //鼠标悬停时触发此事件 //注意需提前开启鼠标拾取：fdapi.settings.setMousePickMask(7); case \"MouseHovered\": log('触发事件类型：鼠标悬停，eventType：' + eventType); break; //鼠标移动时触发此事件 //注意需提前开启鼠标拾取：fdapi.settings.setMousePickMask(7); case \"MouseMoved\": log('触发事件类型：鼠标移动，eventType：' + eventType); break; //相机开始移动时触发此监听事件 //注意需先开启事件：fdapi.settings.setEnableCameraMovingEvent(true); case \"CameraStartMove\": log('触发事件类型：相机开始飞行，eventType：' + eventType); break; //相机正在移动时触发此监听事件 //注意需先开启事件：fdapi.settings.setEnableCameraMovingEvent(true); case \"CameraMoving\": log('触发事件类型：相机正在飞行，eventType：' + eventType); break; //相机停止移动时触发此监听事件 //注意需先开启事件：fdapi.settings.setEnableCameraMovingEvent(true); case \"CameraStopMove\": log('触发事件类型：相机停止飞行，eventType：' + eventType); break; //对象执行focus()或相机执行set()/lookAt()/lookAtBBox()方法时触发 case \"CameraChanged\": log('触发事件类型：相机位置发生变化，eventType：' + eventType); break; //进入面剖切模式，编辑面剖切位置后触发事件并返回剖切结果 case \"PlaneClipEdit\": log('触发事件类型：编辑面剖切，eventType：' + eventType); break; //进入体剖切模式，编辑体剖切位置后触发事件并返回剖切结果 case \"VolumeClipEdit\": log('触发事件类型：编辑体剖切，eventType：'+ eventType); break; //进入测量模式后，测量完成时触发此事件并返回测量结果 case \"Measurement\": log('触发事件类型：测量完成，eventType：' + eventType); break; //播放导览结束触发此事件 //fdapi.camera.playAnimation(id)和导览对象播放导览结束__g.cameraTour.play(id)均触发此事件 case \"CameraTourFinished\": log('触发事件类型：播放导览结束，eventType：' + eventType); break; default: \"\" } } //视频流初始化配置 let options = { //必选参数，网页显示视频流的dom节点id 'domId': 'player', //必选参数，二次开发时必须指定，否则无法进行二次开发 'apiOptions': { //事件监听回调函数 'onEvent': onEvent, }, ... }; //构造DigitalTwinAPI对象并初始化 let acapi = new DigitalTwinPlayer('127.0.0.1:8080', options).getAPI(); 1.2、通过API接口设置监听事件 初始化API完成后，调用API方法进行事件监听设置，代码示例如下： //通过API接口设置监听事件 注意：使用此方式监听事件会覆盖上一次设置的事件监听代码 fdapi.setEventCallback(function (event) { //事件类型 参考交互事件类型枚举对象 var eventType = event.eventtype; //图层类型 var layerType = event.Type; //图层Id var layerId = event.Id || event.ID; //点击ActorId var objectId = event.ObjectID; //当前点击位置 var objectLocation = event.MouseClickPoint; //TODO... }); 1.3、自定义监听鼠标、键盘 自定义键盘鼠标交互 自定义键盘鼠标交互，代码示例如下： DigitalTwinPlayer的初始化参数params增加属性：events#mouseKeyListener，可以用来设置键盘、鼠标交互事件的回调函数，目前支持以下事件的回调： onmouseenter//鼠标进入 获取焦点 onmouseleave//鼠标离开 失去焦点 onmousemove//鼠标移动 onmousedown//鼠标按下 onmouseup//鼠标松开 onkeydown//键盘按下 onkeyup //键盘松开 let mouseKeyListener = { 'onmousedown': e =&gt; { log(`[MouseDn] button: ${e.button}, pos: ${e.x}, ${e.y}`) }, 'onmouseup': e =&gt; { log(`[MouseUp] button: ${e.button}, pos: ${e.x}, ${e.y}`) }, 'onkeydown': e =&gt; { log(`KeyDown: ${e.code}`) } } fdPlayer = new DigitalTwinPlayer(\"127.0.0.1:8080\", { 'events': mouseKeyListener //鼠标、键盘交互事件的回调 //其他属性 //... }); 运行效果： [MouseDn] button: 2, pos: 892, 625 [MouseUp] button: 2, pos: 892, 625 KeyDown: KeyF KeyDown: KeyA KeyDown: KeyD KeyDown: ControlLeft KeyDown: ShiftLeft × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"tutorial-API_FrameTick.html":{"id":"tutorial-API_FrameTick.html","title":"Tutorial: API_FrameTick","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode API_FrameTick DigitalTwinAPI之tick功能使用说明 2023.03.17 一、功能简介 tick功能提供了一种高性能的DigitalTwinAPI接口调用方式。 常规的DigitalTwinAPI调用流程是这样的：客户端调用DigitalTwinAPI（通过网络传输），后台渲染进程接收命令，然后进行异步处理。这样就有几个方面的延迟： （1）客户端的异步等待（命令发送后等待返回结果） （2）网络传输（通过WebRTC） （3）后台渲染进程的线程切换（接收线程收到数据后，投递到执行线程，执行线程处理后投递到发送线程） 通过上面的流程可以看到如果高频率的调用接口，性能是不会太高的。为了解决这一问题，实现了tick功能。通过tick功能，可以在渲染进程的每帧直接同步地调用DigitalTwinAPI，极大的提高了调用性能。 二、实现原理 tick功能是通过渲染进程内嵌的chrome浏览器内核（cef）执行JS脚本达到目的的。 调用注册接口后，进程会创建一个cef浏览器引擎，参数url将被设置为浏览器要显示的页面，在此页面内的DigitalTwinAPI调用，都是在同进程直接调用底层C++接口的，C++处理完成后，通过回调cef页面的Javascript函数来通知JS进行后续操作。 由于是在同一个进程内进行JS/C++互操作，所以性能非常高。 三、使用详解 1、接口说明 总共有4个方法： registerTick registerTick用于注册tick功能，注意：全局只能注册一个tick页面，多次registerTick，后面的tick功能会覆盖掉前面的。参数说明： url tick功能是通过一个独立的html页面实现的，此参数用来设置页面的地址。注意：由于是在后台渲染进程执行，所以页面地址必须是完整的网络路径或者服务器上的本地绝对路径， 不能传递相对路径。 options 用来设置是否显示调试页面，由于cef调试JS比较麻烦，所以可以设置此参数，将tick页面显示出来，将调试信息在页面上显示，这样就极大的方便了代码调试。options支持以下属性（可设置一个或多个属性，未设置的属性会使用默认值）： x 调试窗口距离左上角的X偏移量。 默认值4 y 调试窗口距离左上角的Y偏移量。默认值4 width 调试窗口的宽度。默认值400 height 调试窗口的高度。默认值300 visible 是否可见。 默认为false（不可见） removeTick removeTick用于移除tick功能，调用此方法后，tick功能会停止。 showTickWindow showTickWindow用于显示/隐藏调试窗口。此方法既可以在客户端调用，也可以在tick页面调用。 executeJsInTickPage executeJsInTickPage用于实现客户端页面与tick页面的通信，通过此方法，可以在客户端页面执行tick页面的JS代码。 客户端页面和tick页面（服务器页面）之间可以双向通信，在tick页面调用ue.internal.postevent(\"str\")，可以实现tick页面向客户端页面发送消息 2、tick页面说明 在tick页面里调用DigitalTwinAPI与常规调用有一些区别，主要体现在以下几个方面： （1）DigitalTwinAPI初始化 var fdapi; window.onload = function () { fdapi = new DigitalTwinAPI(); } 一般在onload里初始化，与常规初始化不同，tick页面里初始化DigitalTwinAPI不需要传递任何参数。注意：这里也可以使用异步操作例如： window.onload = async function () { fdapi = new DigitalTwinAPI(); await fdapi.marker.delete(id); await fdapi.marker.add(data); } （2）固定回调方法 function tick(frameNo) { //业务代码 } tick页面里的回调方法是被服务端执行的固定方法：tick(frameNo)。 tick 参数frameNo，是当前帧序号 是主页面调用registerTick后，渲染进程在每帧都会回调的方法。 如下示例代码： &lt;!doctype html&gt; &lt;html&gt; &lt;head&gt; &lt;meta charset=\"utf-8\"&gt; &lt;title&gt;TICK-FollowVideoProjection&lt;/title&gt; &lt;script type=\"text/javascript\" src=\"../../ac_conf.js\"&gt;&lt;/script&gt; &lt;script type=\"text/javascript\" src=\"../../ac.min.js\"&gt;&lt;/script&gt; &lt;style type=\"text/css\"&gt; body { color: white; background-color: black; } &lt;/style&gt; &lt;/head&gt; &lt;body&gt; Tick Test &lt;hr&gt; &lt;div id=\"info1\"&gt;&lt;/div&gt;&lt;br&gt; &lt;div id=\"info2\"&gt;&lt;/div&gt; &lt;/body&gt; &lt;/html&gt; &lt;script&gt; window.onload = async function () { new DigitalTwinAPI(); } /** * tick事件 监听每一帧操作 */ async function tick(frame) { //获取无人机每一帧实时位置 注意：tick方法里禁止调用耗时接口 否则会导致视频流卡顿影响交互 let resultStr = await fdapi.customObject.get('co1'); //反序列化 let result = JSON.parse(resultStr); //调试显示代码 //document.getElementById('info').innerText = `[Frame:${frame}] ` + JSON.stringify(result); //当前每帧的车辆位置 let currentPos = result.data[0].location; let currentRoa = result.data[0].rotation; //显示无人机实时位置 朝向 document.getElementById('info1').innerText = \"无人机实时位置: \\n\"+ currentPos; document.getElementById('info2').innerText = \"无人机实时朝向: \\n\"+ currentRoa; if (result.command == CommandType.CustomObject_Get) { //当前每帧的无人机位置 let location = result.data[0].location; let rotation = result.data[0].rotation; let vp1 = { id: \"vp1\", location: location, rotation: [rotation[0] - 45, rotation[1], rotation[2]], }; //根据无人机位置朝向更新视频投影 fdapi.videoProjection.update(vp1); } } &lt;/script&gt; 上面代码实现的功能是：每帧改变标签的值，然后获取该标签的信息，在tick页面上显示出来。代码运行效果： × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"tutorial-API_Introduction.html":{"id":"tutorial-API_Introduction.html","title":"Tutorial: API_Introduction","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode API_Introduction 二次开发中的基础概念介绍 一、常见坐标解释 目前云渲染支持四类坐标系，这几种坐标系可以调用相关函数进行转换。 屏幕坐标： 以显示器屏幕显现的位置信息构成屏幕坐标系，通常以像素为单位 。 屏幕坐标系为三维坐标系，但显示屏是二维平面的，（x,y）表示位置信息，屏幕左上角为（0,0）点【原点】，X值从屏幕左侧往右侧递增，Y值从上往下递增。以1920*1080的屏幕分辨率为例，右下角为（1920,1080）.X、Y的可视值域取决于你当前显示设备的分辨率,超出视野之外依然有数值，只是不显示在场景窗口中。z值表示深度。 模型的屏幕坐标：（x，y）用分辨率宽高表示。 UI元素的屏幕坐标：同上。 输入的鼠标位置和触摸位置，其屏幕坐标为横纵由分辨率表示，Z值默认为0. 场景坐标： 以X、Y、Z值表示的空间直角坐标系。用来表示三维场景中的模型UI元素的物理位置。 即东西方向为X轴，正东方向为X轴正值；南北方向为Y轴，正北方向为Y轴正值；上下方向为Z轴，上方向为Z轴正值。 如下图： 注意：如果我们把一个相机坐标放在我们认为场景坐标系的原点上，这时候相机坐标就等于场景坐标。场景坐标也可以称作为世界坐标。 地理坐标： 地理坐标系 (GCS) 使用三维球面来定义地球上的位置。以经度、维度、海拔高度表示的地理空间坐标系，例如WGS84、CGCS2000。 投影坐标： 投影坐标系在二维平面中进行定义。与地理坐标系不同，在二维空间范围内，投影坐标系的长度、角度和面积恒定。投影坐标系始终基于地理坐标系，而后者则是基于球体或旋转椭球体的。 在投影坐标系中，通过格网上的 x,y 坐标来标识位置，其原点位于格网中心。每个位置均具有两个值，这两个值是相对于该中心位置的坐标。一个指定其水平位置，另一个指定其垂直位置。这两个值称为 x 坐标和 y 坐标。采用此标记法，原点坐标是 x = 0 和 y = 0。 在等间隔水平线和垂直线的格网化网络中，中央水平线称为 x 轴，而中央垂直线称为 y 轴。在 x 和 y 的整个范围内，单位保持不变且间隔相等。原点上方的水平线和原点右侧的垂直线具有正值；下方或左侧的线具有负值。四个象限分别表示正负 X 坐标和 Y 坐标的四种可能组合。 投影坐标系通常也称为本地坐标系。 二、常见名词解释 在二次开发的过程中你可能会遇到地理信息相关的一些专业名词，请在开发前仔细阅读以下名词解释： WKT：由国际组织OCG，即开放地理空间联盟制定的一种文本标记语言，全称为Well-known text， 用于表示矢量几何对象、空间参照系统之间的坐标转换，使用WKT能够很好的与其它系统进行数据交换，譬如转换地理坐标为世界坐标。目前大部分支持空间数据存储的数据库都支持这种方式。 BBox：即3D Bounding Box，3D物体的包围盒，用于表示三维物体坐标的取值边界，取值方法如下： 在已经渲染成功的视频流场景中坐标至少选择两个点， 例如： [ 488654.71875, 2890294.5, 5.0999999046325684 ],[ 494277.71875, 2789172, -0.0010937500046566129 ]，分别取各坐标点最小和最大的X、Y、Z值，分别再组成两个点： \"BoundsMin\": [ 488654.71875, 2789172, -0.0010937500046566129 ] \"BoundsMax\": [ 494277.71875, 2890294.5, 5.0999999046325684 ] 其中由坐标值较小的那个点即BoundsMin[minX,minY,minZ]，沿对应X、Y、Z坐标轴延伸至maxX、maxY、maxZ对应的值，延伸后的三条线组成的空间盒子就是BBox，如下图： 相机：即Camera，就像大家拍照使用的相机，用来确定观察三维场景的视角。 在计算机图形学中常用来定义用户和场景的相对位置和朝向，和我们真实世界人的眼睛一样。 相机包含两个重要的位置参数：观察点（镜头位置 position）；目标点（被拍摄物体位置 target），如下图： 观察点：摄像机镜头位置的初始坐标[X,Y,Z]（眼睛位置） 目标点：摄像机镜头对准的被观察物体的坐标位置[X,Y,Z] 观察点和目标点距离：摄像机镜头位置距离被观察物体的距离，单位是米 视口：即Viewport可视窗口，浏览器某块矩形绘图区域，用来展示视频流；可以对一个窗口进行切分，在同一个窗口显示分割屏幕的效果，以便显示多个可视窗口。 投影：即Projection，生活中的物体都是三维的，但是人的眼睛只能看到正面，不能看到被遮挡的背面，三维几何体在人的眼睛中的效果就像相机拍摄的一张二维照片，你看到的是一个2D的投影图。我们在计算机中看到的3D画面其实就是计算机把三维空间中的物体从世界坐标系 通过各种复杂计算投影到屏幕坐标系并显示在视口中。投影其实就是空间几何体转化为一个二维图的过程，不同的投影方式对应不同的投影算法。 常见投影方式分正射投影和透视投影，在机械设计、工业设计领域常用正射投影（平行投影），游戏场景（AirCloud云渲染场景）常用透视投影（中心投影）。 透视投影：又叫中心投影，距离镜头近的物体大，距离镜头远的物体小。类似人类眼睛观察真实世界。 正射投影：又叫平行投影，无论距离相机镜头多远，投影后的物体大小尺寸不变。投影尺寸取决于观察角度。 欧拉角：即Euler angles，由瑞士数学家欧拉提出，指物体绕坐标系三个坐标轴（X、Y、Z）的旋转角度， 用来表示三维物体的基本旋转，旋转分以下两种情况： 静态旋转：即绕世界坐标系的三个轴旋转，三维物体在旋转过程中坐标轴保持静止；ACP渲染的场景中的物体旋转默认为静态旋转。 动态旋转：即绕物体坐标系的三个轴旋转，三维物体在旋转过程中坐标轴随着物体一起做相同旋转，即场景视角也旋转。 想象一下飞机，Yaw指水平方向的机头航向，绕Y轴旋转；Pitch指与水平方向的夹角，绕X轴旋转；Roll指飞机的翻滚，绕Z轴旋转。如下图： 俯仰-Pitch：上下旋转角度，欧拉角向量的X轴，取值范围：[-90~+90] 航向-Yaw：左右旋转角度，欧拉角向量的Y轴，取值范围：[-180~+180] 翻滚-Roll：翻滚角度，欧拉角向量的Z轴 &lt;br&gt; WMTS服务：全称OpenGIS Web Map Tile Service，即Web地图切片服务，由国际组织开放地理空间联盟(OCG)提出的一种缓存技术标准。 提供了一种采用预定义图块方法发布数字地图服务的标准化解决方案，可以通过RESTful方式访问，是WMS服务的改进版，服务端可缓存且访问性能更优。 MVT服务：Mapbox vector tile，即Mapbox 矢量瓦片服务，是Mapbox（地图盒子）提供的一种矢量瓦片数据编码服务。 三、常用几何对象 以下是API中常用的几何对象，包含点、线、面、三维形状和一些标注等。 Polyline：折线/多段线，用来创建仅包含一段或多段直线的形状。创建后的Polyline可以设置多种显示效果，以及多种应用。 ODline：OD线，即Origin-Destination Line，用来描述起点和终点的连线，通常表示两点之间的关系，如航班线路、人口迁徙、交通流量、经济往来等。 Polygon：多边形，用来创建包含不少于三个边的多边形。 3DPolygon：三维多边形，三维空间的多面体。 TileLayer：三维图层对象，即3DT文件。 Cesium3DTileset： 3D Tiles是由Cesium创立的用于流式传输大规模异构3D地理空间数据集的开放规范。在DTS平台中泛指为符合这种规范的数据及服务。 HeatMap：热力图，如建筑物受力分析区域等。 HighlightArea：高亮区域，如高亮显示建筑物某一区域等。 RadiationPoint：辐射圈，模拟显示辐射效果，如展示一个区域的污染源影响范围等。 CustomMesh：自定义三角网格，模拟流体等。 CustomObject：自定义对象，可以操作TileLayer中的Actor对象，对其进行平移缩放着色等。 Beam：光流粒子/光束，可以在场景中模拟显示车流方向等。 Tag：标签，可以在场景中添加一个包含图像和文字的标签。（停止维护，建议使用Marker） Marker：标注，更加强大的标签对象，支持更多的属性设置。 Marker3D：三维动态标注，可以在场景中添加动态标注。 CustomTag：自定义标签，支持对Tag进行更多的样式设置。 四、常用文件格式 ShapeFile：后缀为.shp，美国环境系统研究所公司（ESRI）开发的一种空间数据文件格式，是地理信息软件界的一个开放标准，也是一种重要的数据交换格式。 可以描述几何对象，点、折线和多边形，也可以存储建筑、河流、湖泊等空间对象的属性、几何形状与位置信息。 3DT：后缀为.3dt，飞渡科技DTS高渲染平台针对数字孪生体场景的特点和需求，独创了专属的标准数字孪生数据库——3D Twins Scenes Database（简称为3DT）。 3DT可以实现数据的优化和加速，增强用户在DTS高渲染平台中的操作体验。 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"tutorial-API_MultiVideoInPage.html":{"id":"tutorial-API_MultiVideoInPage.html","title":"Tutorial: API_MultiVideoInPage","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode API_MultiVideoInPage 在一个页面中嵌入多个云渲染窗口 要在同一个页面中嵌入多个云渲染视频流窗口，目前有以下两种方式： 第1种方式：使用iframe框架 代码如下：（具体示例请参考：player_2_1.html） &lt;body&gt; &lt;table width=\"100%\" height=\"600\" border=\"0\"&gt; &lt;tr&gt; &lt;td&gt; &lt;iframe id=\"player1\" src=\"player.html?ms\" width=\"100%\" height=\"100%\"&gt;&lt;/iframe&gt; &lt;/td&gt; &lt;td&gt; &lt;iframe id=\"player2\" src=\"player.html?ms\" width=\"100%\" height=\"100%\"&gt;&lt;/iframe&gt; &lt;/td&gt; &lt;/tr&gt; &lt;/table&gt; &lt;/body&gt; 这种方式代码简单，适合快速开发展示多个视频流的情况，但是这种方式调用DigitalTwinAPI接口的适合比较繁琐，因为用到了iframe所以设计到了跨域的问题，可以通过postMessage的方式实现，这里不详细讨论， 我们主要介绍第2种方案。 第2种方式：（仅适用于20210315之后的版本） HTML核心代码如下： &lt;div id=\"player1\"&gt;&lt;/div&gt;&lt;button onclick=\"callPlayer1()\"&gt;调用Player1的接口&lt;/button&gt; &lt;div id=\"player2\"&gt;&lt;/div&gt;&lt;button onclick=\"callPlayer2()\"&gt;调用Player2的接口&lt;/button&gt; JS核心代码如下： //注意：显卡要支持Cloud启动多个实例 let instanceId1 = '2464721833873';//实例id1 请在cloud实例列表中右键复制实例id let instanceId2 = '2464721833874';//实例id2 请在cloud实例列表中右键复制实例id let host = '127.0.0.1:8080'; let option1 = { //必选参数，网页显示视频流的domId 'domId': 'player1', //实例id 'iid': instanceId1, //必选参数，二次开发时必须指定，否则无法进行二次开发 'apiOptions': { //必选参数，与云渲染主机通信成功后的回调函数 //注意：只有在onReady之后才可以调用DigitalTwinAPI接口 'onReady': _onReady1 } }; let option2 = { //必选参数，网页显示视频流的domId 'domId': 'player2', //实例id 'iid': instanceId2, //必选参数，二次开发时必须指定，否则无法进行二次开发 'apiOptions': { //必选参数，与云渲染主机通信成功后的回调函数 //注意：只有在onReady之后才可以调用DigitalTwinAPI接口 'onReady': _onReady2 } }; //根据不同实例id初始化两个api对象 var __api1 = new DigitalTwinPlayer(host, option1).getAPI(); var __api2 = new DigitalTwinPlayer(host, option2).getAPI(); //例子：隐藏各自的右侧ui function callPlayer1() { __api1.settings.setMainUIVisibility(false); } function callPlayer2() { __api2.settings.setMainUIVisibility(false); } 具体示例代码请参考：player_2_2.html × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"tutorial-API_ResourceDesc.html":{"id":"tutorial-API_ResourceDesc.html","title":"Tutorial: API_ResourceDesc","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode API_ResourceDesc 关于引入外部资源文件的说明 API接口调用过程中需要引入外部资源，如弹窗url地址、图片、视频、三维模型等。 外部资源分两类，如下： 弹窗地址：目前对弹窗网页进行渲染的是C++内置的简化版浏览器渲染引擎，推荐使用原生JS语法，避免使用ES6新特性，也尽量避免使用一些CSS3新特性。 资源文件：包含图片、视频、3dt、shapeFile、pakFile等文件类型；目前全部接口已经支持资源文件的相对路径写法，示例如下 @path:/images/demo1.png @path:/movies/demo.mov @path:/3dt/demo.3dt @path:/shapefile/demo.shp 注:@path:相当于CloudMaster里文件资源的根目录 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"tutorial-API_Revision.html":{"id":"tutorial-API_Revision.html","title":"Tutorial: API_Revision","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode API_Revision 2026.05.27 Satellite卫星系统新增高亮和取消高亮方法 Satellite新增方法如下： highlight() 打开指定卫星的缩略图的高亮效果 unHighlight() 取消指定卫星缩略图的高亮效果 unHighlightAll() 取消所有卫星缩略图的高亮效果 2026.05.22 Weather天气对象新增方法、Satellite卫星系统新增方法 Weather新增设置大气环境的瑞利散射系数方法如下： setRayleighScatter(rayleighScatter) 设置大气环境的瑞利散射系数 Satellite新增方法如下： addLinkage(data) 添加卫星之间的连接线，卫星运动时连接线会跟随同步运动 updateLinkage(data) 更新卫星连接线的参数配置 deleteLinkage(data) 删除指定的卫星连接线 clearLinkage(data) 清空卫星之间的连接线 2026.05.12 多边形对象Polygon新增填充透明渐变样式和参数 Polygon新增参数如下： gradualWidth (number) 透明渐变的间隔宽度，单位：米，默认值：10 outerAlpha (number) 多边形填充的透明度渐变的起始值，取值范围：[0~1]，默认值：0.3 innerAlpha (number) 多边形填充的透明度渐变的结束值，取值范围：[0~1]，默认值：1 Polygon新增style样式枚举如下： AlphaGradualBorder 透明渐变边界 2026.05.09 Plot对象新增停止绘制方法、 VectorField对象新增子场参数 Plot对象新增停止绘制方法stopDraw() stopDraw() 停止绘制Plot VectorField对象新增子场参数如下： spawnLineRate (number) 每个线条上每秒生成的粒子数量 spawnLineCap (number) 每个线条上粒子的最大数量 2026.05.08 新增引导线GuideLine对象及操作方法 引导线GuideLine对象新增操作方法如下 add() 添加引导线 update() 更新引导线 clear() 清空引导线 focus() 定位引导线 hide() 隐藏引导线 show() 显示引导线 delete() 删除引导线 get() 查询引导线 2026.04.28 Polyline对象新增贴合模型方法 新增方法如下： attachObject(array) 设置一个或多个Polyline对象的起点和终点跟随对应的模型移动 2026.04.27 向量场VectorFiled对象新增支持子场的系列参数 新增子场subFields包含的参数如下： renderSphereOutRadius (array) 子场渲染的粒子发射器的外径 renderSphereInnerRadius (array) 子场渲染的粒子发射器内径 startIndex (number) 父场repeatcount参数中该子场区域使用的粒子发射器数量的起始索引，剩下的粒子发射器影响父场 endIndex (number) 父场repeatcount参数中该子场区域使用的粒子发射器数量的结束索引，剩下的粒子发射器影响父场 singleSpriteSize (number) 子场的单个粒子大小，单位米，影响粒子大小 lodMin (number) 子场包含粒子大小的最小缩放比例，默认值：0.6，影响粒子大小 lodMax (number) 子场包含粒子大小的最大缩放比例，默认值：2.0，影响粒子大小 spawnRate (number) 子场粒子每秒生成的速率，影响粒子数量 spawnRateMin (number) 子场近距离粒子的生成速度，影响粒子数量 spawnRateMax (number) 子场远距离粒子的生成速度，影响粒子数量 spawnRatePower (number) 子场粒子的密度变化曲线，即按距离插值时使用指数函数，设置指数函数的N次方，影响粒子数量 lodMaxDistance (number) 子场粒子大小的最大缩放距离，即从[0~lodMaxDistance]映射到[lodMin~lodMax]对粒子大小进行缩放，注意：举例若超过此值则使用lodMax进行缩放，影响粒子大小 lodMinDistance (number) 子场粒子大小的最小缩放距离，即从[0~lodMinDistance]映射到[lodMin~lodMax]对粒子大小进行缩放，注意：若小于此值则使用lodMin进行缩放，影响粒子大小 lifeTime (number) 子场粒子的生命周期，即粒子存活时间，单位：秒，影响粒子长度 lifeTimeMinScale (number) 子场粒子生命周期的缩放因子范围的最小值 lifeTimeMaxScale (number) 子场粒子生命周期的缩放因子范围的最大值 2026.04.17 CustomObject对象新增拆分楼层方法、SmoothedParticleHydrodynamics对象新增支持vtk文件和bin文件添加方法、新增海岸线Coastline对象及操作方法 CustomObject对象新增拆分楼层方法如下 cutFloor(obj) 把一个CustomObject类型的楼宇模型按层高拆分为若干个指定的楼层，注意：仅支持CustomObject类型的楼宇模型 SmoothedParticleHydrodynamics对象新增支持vtk和bin文件加载方法 addByBin(data) 根据bin文件添加sph addByVtk(data) 根据vtk文件添加sph 海岸线Coastline对象新增操作方法如下 add() 添加海岸线 update() 更新海岸线 clear() 清空海岸线 focus() 定位海岸线 hide() 隐藏海岸线 show() 显示海岸线 delete() 删除海岸线 get() 查询海岸线 2026.04.02 Tools对象新增河道横断面分析方法 新增河道横断面分析方法如下 riverCrossSectionByShp(option) 根据河道的shp文件和tif高程对河道横断面进行分析 riverCrossSection(option) 根据河道的坐标点和tif高程对河道横断面进行分析 2026.03.31 Settings对象新增方法、Plot对象新增方法 Settings新增设置VTPK标注的深度检测的相机高度阈值方法 setLabelLayerDepthTestHeight(height) {number} depthTestHeight 深度检测的相机高度阈值，高于此高度时深度检测失效，默认值：2000米，单位：米 Plot对象新增根据ID获取Plot对象的描边坐标集合方法 getStrokeCoordinates(ids) {string|array} ids 要获取的Plot对象ID或者ID数组（可以获取一个或者多个） 2026.03.25 GeoJsonLayer对象新增控制自定义材质底面和顶面是否绘制参数 GeoJsonLayer对象新增参数 generateTop (boolean) 可选参数，是否生成顶面，默认：true generateBottom (boolean) 可选参数，是否生成底面，默认：true 2026.03.20 态势标绘制对象新增绘制方法startDraw()、Hydrodynamic2d更新方法新增参数 根据鼠标交互获取到坐标值创建对象 startDraw(plot) 进入标绘对象的手工绘制模式， 新增两类样式枚举，自由绘制线和面 FreehandLineString 自由线绘制：从鼠标左键按下不松开然后光标开始移动进行绘制线段，光标经过的所有坐标位置按顺序连成线，直到松开鼠标左键结束绘制。 FreehandPolygon 自由面绘制：从鼠标左键按下不松开然后光标开始移动进行绘制平面，光标经过的所有坐标位置首尾闭合绘制成面，直到松开鼠标左键结束绘制 Hydrodynamic2d对象update()更新方法新增参数 vertexWaterDepth (boolean) 是否根据顶点水深插值，默认值：true 2026.03.14 Tools测量方法新增测量单位和坐标支持 Tools设置测量方法新增以下参数 unitType (number) 单位 0：米 1：千米 2：英尺，默认值 0 coordinates (array) 待测量坐标数组，不传则根据交互拾取的坐标进行测量 2026.03.13 卫星仿真对象Satellite新增操作方法 Satellite对象新增如下方法： setFollow() 设置相机跟随卫星移动 showSatellite() 显示卫星模型及文字标签 hideSatellite() 隐藏卫星模型及文字标签 showText() 显示卫星文字标签 hideText() 隐藏卫星文字标签 showModel() 显示卫星模型 hideModel() 隐藏卫星模型 2026.03.05 Weather天气对象新增设置太阳颜色方法 Weather对象新增setSunColor(color)方法 setSunColor() (color) 自定义太阳颜色 2026.03.04 球面工程Weather天气对象新增以下方法 Weather对象新增以下三个方法 setEarthCloudIntensity() (number) 设置地球大气云层的亮度，取值范围：[0~1]，设置0则隐藏云层 setEarthNightLightIntensity() (number) 设置地球夜晚灯光的亮度，取值范围：[0~1]，设置0则关闭灯光 setEarthStarBackgroundIntensity() (number) 设置星空背景的亮度，取值范围：[0~1]，设置0则关闭星空背景亮度 2026.02.11 新增卫星仿真对象Satellite及操作方法、Cesium3DTileset对象新增属性 Satellite对象新增如下方法： add() 添加卫星 update() 更新卫星 clear() 清空卫星 focus() 定位卫星 callBPFunction() 调用卫星模型的蓝图函数 getBPFunction() 查询卫星模型的蓝图函数 Cesium3DTileset对象新增是否参与光照属性 enableLighting (boolean) 可选，服务是否参与光照，默认值：true 2026.02.02 T  type=\"text/javascript\" src=\"../../ac.min.js\"&gt;&lt;/script&gt; &lt;/head&gt; &lt;body&gt; &lt;/body&gt; &lt;/html&gt; &lt;script&gt; var fdapi; let tagdata = {id: 't1',coordinate: [491274.65625, 2489124, 21.0],text: '北京银行'}; window.onload = function () { fdapi = new DigitalTwinAPI(); fdapi.tag.delete('t1'); fdapi.camera.set(492472.750000, 2487660.750000, 1637.308838, -49.619568, -93.635345, 0); fdapi.tag.add(tagdata); } function ontick() { tagdata.coordinate[0] += 10; fdapi.tag.setCoordinate('t1', tagdata.coordinate); } &lt;/script&gt; 说明： 1）此页面是在服务器上执行的 2）此页面可以使用所有的Cloud API，约束条件跟在POI弹窗里调接口是一样的，不支持回调。 3）ontick方法名是固定的，在C++渲染的每帧会调用此JS方法 4）registerTick可以多次调用，后面的调用会冲掉前面的调用 removeTick用于移除设置的每帧回调。 2022.03.23 ShapeFile对象新增Feature要素操作方法 ShapeFile对象新增方法如下： 高亮单个要素区域：highlightFeature(shapeFileId,featureId) 取消高亮单个要素区域：stopHighlightFeature(shapeFileId,featureId) 高亮多个要素区域：highlightFeatures(data) 取消高亮多个要素区域：highlightFeatures(data) 定位要素区域：focusFeature(shapeFileId, featureId, distance, flyTime) 查询多个要素区域：getFeature(data) 2022.03.22 实现在POI弹窗里进行接口调用及交互操作 因为这些对象的弹出窗口是在后台渲染的，之前是一个孤立的浏览器内核窗口，不能进行API调用，不能和主页面进行交互操作，用户要实现这些功能，需要进行非常复杂的代码实现，既不稳定也很难用， 为了解决这一问题，今天的版本实现了以下几个功能： 和主页面进行通信（单向） 在弹窗的页面中进行如下调用：``FDExternal.postevent('this is a message.')` FDExternal是弹窗的浏览器内核的内置对象 主页面的事件处理： //onEvent let _onEvent = (e) =&gt; { if (e.eventtype == 'MarkerCallBack') { alert(e.Data); } log('OnEvent: ' + e.eventtype); }; 在弹窗里直接进行接口调用 var fdapi; window.onload = function () { fdapi = new DigitalTwinAPI(); //初始化时不需要传递任何参数 } function callApi() { fdapi.settings.setMainUIVisibility(false); fdapi.odline.clear(); let o = { id: 'od1',color: Color.Green, coordinates: [[492303.65625, 2487534.5, 4.195], [491391.5625, 2487777.5, 4.2]], flowRate: 1,intensity: 1,bendDegree: 0.5, tiling: 0.5,lineThickness: 15,flowPointSizeScale: 30, labelSizeScale: 1000,endLabelShape: 1， lineShape: 1,lineStyle: 0,flowShape: 1, startPointShape: 1,endPointShape: 1,startLabelShape: 1 }; fdapi.odline.add(o); fdapi.odline.focus(o.id); } 这种方式效率很高，不会通过网络传输，也不会占用主页面的脚本执行时间，直接通过JS调用C++的底层功能。 但是也是有缺点的： 调试不方便，因为代码是在POI弹窗里运行，所以没有办法像浏览器一样进行调试，如果直接在浏览器运行弹窗页面也是不能进行API调用的（因为浏览器里没有FDExternal对象） 没有接口调用的返回值，不能使用回调函数或者异步操作(await/async, then等) 如果不能接受上面2个缺点，可以通过第1条更新进行迂回实现，通过向主页面发送消息，所有逻辑代码在主页面里实现。 在弹窗里直接调用C++方法关闭窗口 function closeWindow() { FDExternal.close(); } ​ 通过这个方法可以在弹窗页面里实现自定义的关闭按钮 2022.03.17 新增三维热力图对象，Settings新增交互模式、Marker新增方法 HeatMap3D对象新增方法如下： 添加对象：add() 修改对象：update() 删除对象：delete() 查询对象：get() 聚焦对象：focus() 隐藏对象：hide() 显示对象：show() 清空对象: clear() Settings对象修改方法如下： setInteractiveMode(mode)：设置交互模式，0：自由交互模式，1：第三人称模式，2：无人机模式，3：中心漫游模式（物体观察模式），4：地图模式 Marker对象新增方法如下： setAttachCustomObject(data)：设置标注Marker贴合模型对象CustomObject，模拟标注跟随物体运动 2022.03.11 Settings对象setMapMode()方法增加设置WMTS最大层级参数 Settings对象setMapMode()方法新增设置WMTS最大层级参数如下： maxLevel : WMTS服务最大显示层级，取值范围：[0~22]，默认值：10 2022.03.10 图层TileLayer对象新增getAllFlattenInfo方法、get()方法增加包围盒bbox信息 TileLayer对象新增方法和属性如下： BBox：[minX,minY,minZ,MaxX,maxY,maxZ] 新增方法：getAllFlattenInfo() 查询所有图层的剖切信息 2022.03.08 优化光标资源 将光标文件内置 之前的SDK用户在进行二次开发时需要将SDK目录的cursors文件夹拷贝到自己的环境并与ac.min.js在一个文件夹下。今天之后的版本不再需要这个cursors文件夹了，光标资源已经内置到API里，不需要单独的cur文件了。 DigitalTwinPlayer初始化增加属性：useBuiltinCursors 参数类型：boolean，默认值true 设置是否使用内置光标，如果设置为false, 则不使用内置光标，视频窗口将一直显示箭头样式的光标 2022.03.04 水流场WaterFlowField对象属性调整 WaterFlowField对象调整属性如下： WaterFlowField对象新增属性：uvRangeMapping (array) 流速重映射范围，为了突出流动效果，可以对流速有效范围进行一个映射 WaterFlowField对象修改属性：colorSpeedRange修改为validUVRange (array) 流速有效范围，流速小于min的区域会显示蓝色，min到max之间的区域会从蓝色过渡到红色显示热 2022.03.02 DigitalTwinPlayer对象增加初始化属性 DigitalTwinPlayer初始化参数options增加属性urlExtraInfo 在初始化DigitalTwinPlayer对象时，可以在options参数中设置属性：urlExtraInfo，用于在创建WebSocket连接的URL后面添加附加信息（例如授权认证信息等），例如如下的示例代码： var player = new DigitalTwinPlayer('127.0.0.1:8080', { iid:'2471787814316', pid:1, urlExtraInfo:{ userToken:'jb3k5b345', appToken:'jbsfhjg4234' } }) 最终生成的WebSocket URL是这样的：ws://192.168.1.29:8080/player?hasVideo=true&amp;iid=2471787814316&amp;pid=1&amp;userToken=jb3k5b345&amp;appToken=jbsfhjg4234 2022.03.01 视频投影对象自定义蒙版图片 不需要单独设置端口号。如果想使用之前的WebSocket方式，也是可以的，现在可以同时支持这两种方式。开启WebSocket调用方式的方法如下： 在CloudMaster配置界面的实例编辑高级参数里开启： 如果是通过实例管理服务的接口进行实例动态启停，可以在实例运行参数里加上websocketPort属性即可，具体使用方法请参考SDK/manager.html 2021.07.21 水淹分析 实现水淹分析接口 tools对象增加方法：startFloodFill，stopFloodFill 支持WMTS 地图设置(settings.setMapMode)支持wmts，具体请参考API文档 2021.07.13 重构API和测试代码 重构对象的创建方式 之前的对象XX创建方式是通过XXData来创建的，比如创建标签（Tag），需要先simple.html然后设置调用tag.add，现在不需要用这种方式了，直接构造object即可，例如： let o = { id: 'p1', coordinate: [495269.37, 2491073.25, 25.4], imagePath: HostConfig.Path + '/samples/images/tag.png', url: HostConfig.Path + '/samples/popup/simple.html', imageSize: [28, 28], text: '北京银行', range: [1, 8000.0], textRange: 3000, showLine: true, textColor: Color.Black, textBackgroundColor: Color.White, hoverImagePath: HostConfig.Path + '/samples/images/hilightarea.png', textSize: 10, autoHeight: true } await fdapi.tag.add(o); fdapi.tag.focus(o.id, 200, 0); SDK自带的测试代码已经全部换成这种创建方式。 注意： ​ 以前的创建方式目前仍然可以继续使用，不过API文档已经移除了相关Data的注释，如果要查看之前的调用方式，请参考之前版本的API文档。 RadiationPoint对象增加属性：autoHeight autoHeight：自动判断下方是否有物体，设置正确高度，默认值：false 2021.07.12 完善接口 完善CustomTag类的方法 CustomTagData增加属性popupPos，用于设置弹窗的位置。 2021.07.07 完善OnReady回调 解决onReady回调引起的接口调用问题 之前的onReady回调函数是在WebSocket连接成功时触发，这样有隐患，因为此时可能工程尚未加载完成，Explorer环境尚未准备好，如果此时调用接口，可能导致接口调用无效或者程序崩溃。 修改后的逻辑是：当工程加载完成后才会触发onReady回调。 注：用户不需要自己处理CompleteInitialization事件，SDK内部会自动处理，当收到CompleteInitialization事件时自动触发onReady回调。 2021.07.01 DigitalTwinCloud重磅升级！！！ DigitalTwinCloud改变API调用方式 之前的版本是通过WebSocket方式进行API调用的，所以需要设置一个-websocketport参数，现在不需要这个参数设置了，改为直接通过WebRTC信道进行API调用。 这个改变只针对Cloud， 对于Explorer还需要之前的调用方式。 优化DigitalTwinPlayer、DigitalTwinAPI对象的初始化方式 之前的DigitalTwinAPI的构造函数是这样的：constructor(host, fnOnReady, fnLog); 重构之后的构造函数是这样的：constructor(host, options, reserved); 重构之后，仍然兼容之前的调用方式（建议改成新的调用方式）。具体请参考帮助文档以及API测试页面。需要注意的是：之前的第一个参数host可以传实例ID，重构之后的host参数只能使用ip:port这样的形式，不能再传实例ID。 示例代码： //DigitalTwinAPI初始化选项 let apiOptions = { 'onReady': _onReady, 'onApiVersion': _onApiVersion, 'onEvent': _onEvent, 'onLog': log }; aircityApi = new DigitalTwinAPI(HostConfig.API, apiOptions); 之前的DigitalTwinPlayer构造函数是这样的：constructor(host, domId, token, showStatus, showStartupInfo); 重构之后的构造函数是这样的：constructor(host, options); 重构之后，仍然兼容之前的调用方式（不过建议改成新的调用方式）。具体请参考帮助文档以及API测试页面。需要注意的是：之前的第一个参数host可以传实例ID，重构之后的host参数只能使用ip:port这样的形式，不能再传实例ID。 对于Cloud应用可以不用显式的创建DigitalTwinAPI对象，只需要在DigitalTwinPlayer创建参数里指定apiOptions，就会自动创建。 示例代码： let iid = getQueryVariable('iid'); let apiOptions = { 'onReady': _onReady, 'onApiVersion': _onApiVersion, 'onEvent': _onEvent, 'onLog': log }; //DigitalTwinPlayer let options; if (document.getElementById('player')) { //需要显示视频流 options = { 'iid': iid, //如果想连接指定的云渲染实例，可以指定这个参数 'domId': 'player', 'apiOptions': apiOptions, 'showStatus': true, 'showStartupInfo': true } } else { options = { 'iid': iid, //不带视频流的连接必须指定云渲染实例 'apiOptions': apiOptions }; } aircityPlayer = new DigitalTwinPlayer(HostConfig.Player, options); //对于Cloud应用可以不用显式的创建DigitalTwinAPI对象，只需要在DigitalTwinPlayer创建参数里指定apiOptions，就会自动创建。 aircityApi = aircityPlayer.getAPI(); 支持内网穿透功能 之前的版本只能在有公网IP的机器上部署云渲染，这样有了很大的限制。 现在可以支持在任意网络环境中部署云渲染了。 支持分布式部署 之前的版本云渲染相关的所有功能组件都必须在一台机器上部署，现在可以分布式部署了，比如在内网只部署云渲染节点，服务功能放在有公网IP的机器上。当用户连接的时候，可以自动分配空闲的云渲染实例，也可以指定访问特定的实例。 2021.06.30 设置交互模式 settings对象增加设置交互模式的方法 setInteractiveMode(mode, fn) mode 交互模式，0：自由，1：第三人称，2：无人机 Polyline, Polygon的样式增加“贴地模式” Polyline, Polygon之前的样式现在可以用枚举值了 ，具体请参考API文档。 TileLayer增加新的方法 增加设置视口可见性的方法：setViewportVisible 增加获取指定TileLayer的所有ObjectID的方法：getObjectIDs 增加相机移动事件的开关 settings对象增加setEnableCameraMovingEvent方法 CameraMoving事件默认不再触发，如果需要触发CameraMoving事件，可以调用settings.setEnableCameraMovingEvent(true)来实现。 增加新的功能类 增加CustomMesh类 增加新的标注类（标注类比之前的标签类tag功能更加强大） 2021.05.25 增加接口 settings对象增加交互开关 fdapi.settings.setEnableInteract(bEnable) 用来设置交互开关，包括键盘、鼠标、触摸，如果禁用，只能通过接口控制相机 增加设置指北针是否可见的接口 fdapi.settings.setCampassVisible Tag对象增加属性：autoHeight, textSize autoHeight: 自动判断Tag下方是否有物体，设置tag的正确高度 textSize：设置标签文本大小 camera对象增加pauseAnimation, resumeAnimation方法 可用于暂停、恢复播放动画导览。 2021.04.28 优化API版本信息接口 云渲染 e\": 3000.000000, \"showLine\": 1, \"autoHidePopupWindow\": 1 }] } 2021.03.18 重构JS库完善API接口 增加获取图层数信息的接口 调用方法： fdapi.infoTree.get((response) =&gt; { let str = response.infotree; let o = JSON.parse(str); log(JSON.stringify(o)); }); 回调返回的数据格式如下： { \"command\": 217, \"timestamp\": 1615272910405, \"callbackIndex\": 3, \"result\": 0, \"infotree\": [{ \"iD\": \"ProjectTree_Root\", \"index\": 0, \"parentIndex\": -1, \"name\": \"世界\", \"type\": \"EPT_Folder\" }, { \"iD\": \"D18ABAB9405A2AC58E6D49BF28A86706\", \"index\": 1, \"parentIndex\": 0, \"name\": \"EmergencyRoom_UniversalKey\", \"type\": \"EPT_Scene\" }, { \"iD\": \"8F4AD37744DCF514E62EED80BA6D4064\", \"index\": 2, \"parentIndex\": 0, \"name\": \"SDKDemo\", \"type\": \"EPT_Scene\" }, { \"iD\": \"8E543D9B427BE68A2726C380501D6DC2\", \"index\": 3, \"parentIndex\": 0, \"name\": \"building\", \"type\": \"EPT_Scene\" }] } playMovie方法增加loop参数，用于指定是否循环播放 fdapi.misc.playMovie('c:/media/courier.mp4', true); 增加reset方法 fdapi.reset(); 调用后可以将场景重置到刚打开工程的状态。 重构JS库以支持VUE开发 点击查看 API_Vue DigitalTwinCloud对象改名为DigitalTwinAPI，现在的调用方法如下： var api = new DigitalTwinAPI(...); 为了保持兼容，DigitalTwinCloud还可以继续使用，var api = new DigitalTwinCloud(...); 重构JS库，现在支持在同一个HTML页面创建多个云渲染实例了 具体使用方法请参考在一个页面中嵌入多个云渲染窗口 完善CustomObject类的方法 增加了以下几个方法：（具体参数请参考API修改记录） addByTileLayer：从TileLayer图层添加CustomObject对象 highlight：高亮 unhighlight：取消高亮 callFunction：调用CustomObject对象的蓝图函数 focus：该方法距离参数功能增强 配置工具增加使用样例功能的功能： 首次使用DigitalTwinCloud或者想学习接口使用方法，查看示例代码的时候可以选择样例功能。 回调函数返回的JSON数据里增加resultMessage属性，用于只是错误代码的信息 { \"command\": 255, \"timestamp\": 0, \"callbackIndex\": 0, \"result\": 7, \"resultMessage\": \"InvalidRequestType\" } 统一Camera的Get/Set方法的参数 camera的get方法返回的信息由之前的x, y, z, heading, tilt, roll调整为x, y, z, pitch, yaw, roll和数组 set/lookAt/lookAtBBox方法的参数也做了对应的调整，参见下面第2条说明 camera增加useOldDataFormat方法 用于设置是否使用旧版本的数据格式（2021.03.17之前的版本），这是一个全局的设置。 受影响的方法有：camera对象的set、lookAt、lookAtBBox，以camera.set举例： 之前版本的方法定义如下：(x, y, z, heading, tilt, flyTime, fn) 现在的定义如下：set(x, y, z, pitch, yaw, f ：ObjectID就是revit里每个构件的GUID 美工工程发布3dt：ObjectID就是UE工程里actor的NameID 另外之前拾取事件返回的Name信息可以去掉了，那是历史遗留问题，现在统一用ObjectID信息 layers对象更名为infoTree 之前通过__g.layers调用的接口为了兼容依然可以继续使用 layers对象去掉setVisibility， enableXRay, disableXRay这3个方法 解决几个接口相关的BUG: polygon填充色无效 customTag弹出窗口无法隐藏的BUG customObject无法显示的BUG 2020.12.13 TileLayer挖洞 增加TileLayer挖洞相关的接口 misc对象增加2个方法：startPolygonClip和stopClip，用于对TileLayer进行多边形挖洞StartPolygonClip的坐标参数支持多Part Polygon，与Polygon、3DPolygon、HighlightArea对象创建时传递的坐标数组参数一样。 tileLayer对象增加2个方法：enableClip, disableClip，用于设置指定的TileLayer是否参与挖洞 2020.12.08 Polygon增加属性 polygon增加2个属性：brightness和style 优化安装程序，去掉python依赖 2020.12.02 显示隐藏植物 misc类增加ShowAllFoliage和HideAllFoliage接口，用来显示 隐藏Explorer里创建的植物。 2020.11.23 polyline增加shape polyline增加属性：shape,取值：0或1， 0：直线， 1：曲线 2020.11.06 Polygon格式-相机导览 misc对象增加进入、退出汇报演示的接口： enterReportMode exitReportMode Polygon、3DPolygon可以创建多Part以及带内环的样式了， 在创建时，通过给coordinates参数传递不同的格式即可，具体请参考API帮助文档。 ​ 增加cameraTour对象，可以创建相机导览 2020.10.29 崩溃-拾取-标签窗口 增加CustomObject拾取事件，可以返回创建时传递的ID 解决3D Polygon调用显示接口崩溃的BUG 优化标签弹出窗口的显示方式 之前是点击个标签弹出一个新窗口，现在是所有点击共享一个窗口，当点击另外一个标签时，之前的窗口隐藏，然后在点击处显示一个窗口。 2020.10.26 depthTest-移动端视频流 Polyline和Polygon对象增加是否做深度检测的属性depthTest，默认是true。（DepthTest=true应该会被遮挡，false的话不会被遮挡） （depthTest为true） ​ ​ （depthTest为false） 解决DigitalTwinCloud视频流在移动设备上无法正常显示的BUG： 2020.10.20 withOffset EditHelper.Finish方法增加withOffset参数 用于设置是否计算工程中心偏移，默认值是true。 2020.10.14 增加接口-工具自适应 增加EditHelper接口，实现用户手动绘制线、面等几何类型。可以通过__g.editHelper进行调用 配置工具增加配置选项： 可以设置是否开启视频流自适应客户端分辨率的功能 可以设置是否限制一个实例只允许一个用户连接，默认是勾选的。 当超过一个客户端连接的时候，客户端会提示错误： ws close 4001: Only allow one client Layers对象增加接口： ShowByGroupId、 HideByGroupId、 HighlightByGroupId、 DeleteByGroupId。 在创建对象的时候，可以设置groupId属性，然后就可以通过上面的接口进行批量显隐、删除、高亮。 对象增加userData属性，在创建对象时，可以设置userData属性，通过get获取时，可以返回当初设置的userData，例如： let o = new TagData(); o.id=\"tag1\"; o.userData = \"用户自定义数据\"; ... 完善视频流的自适应机制， 在一个实例允许多个客户端连接的时候，当连接数大于1时，所有客户端会自动停止视频流大小自适应，直到关闭其他页面只剩下一个连接时，才会重新自适应。 Polygon3D接口增加2个属性：tillingX， tillingY DigitalTwinCloud接口增加方法：highlightColor，用于设置高亮时的颜色 fdapi.highlightColor(Color.Red); TileLayer增加ShowAllActor和HideAllActor接口 function test_tileLayer_actor_showAllActors() { fdapi.tileLayer.showAllActors('1'); } function test_tileLayer_actor_hideAllActors() { fdapi.tileLayer.hideAllActors('1'); } 2020.09.28 VectorTile管理 DigitalTwinCloud配置工具增加VectorTile发布结果管理功能 2020.09.23 黑暗模式 Weather接口增加设置黑暗模式的功能 fdapi.weather.setDarkMode(true); 调用上面接口后，天空会进入黑暗模式 2020.09.22 优化Polygon创建效率 DigitalTwinPlayer对象增加方法enableAutoAdjustResolution， 可以设置启用或关闭视频窗口缩放时自动调整分辨率的功能。这个功能默认是启用的，如果想关闭此功能，可以在初始化的时候调用enableAutoAdjustResolution(false) let acp = new DigitalTwinPlayer(HostConfig.Player, 'player', HostConfig.Token, true, true); acp.enableAutoAdjustResolution(false); 优化Polygon创建 当Polygon的定点数组过大时，创建速度非常慢，优化后创建速度大大提高 另外Polygon的属性frameThickness之前的单位是cm，现在改成了m，当frameThickness设置为0时，不会创建边框（轮廓）了。 优化测试页面index.html， int.html 2020.09.18 视频播放-ODLine 增加视频播放窗口 fdapi.misc.playVideo(1, 20, 20, 400, 300, 'd:/data/video/1.mp4'); fdapi.misc.stopPlayVideo(1); 增加ODLine对象 视频流窗口缩放时，可以自动改变后台渲染窗口大小，以达到自适应分辨率的效果 2020.09.09 视频投影 增加视频投影对象VideoProjection let o = new VideoProjectionData(); o.id = \"vp1\"; o.videoURL = \"d:/data/video/1.mp4\"; o.mediaType = 0; o.location = [66.14, -7288.16, 9.47]; o.rotation = [-50, 0, 0]; o.fov = 90; o.aspectRatio = 1.77; o.distance = 100; fdapi.videoProjection.add(o); 2020.09.02 tiling-hoverImagePath Polyline（PolylineData）增加 tiling属性， 用于设置材质贴图平铺，这个值 &lt;= 0 使用自动计算按Polyline长度比例平铺， &gt;0使用用户输入的值去平埔 Tag（TagData）增加 hoverImagePath 属性， 用于设置鼠标悬停时的图片 2020.08.28 样式-安装包 3D Polygon增加样式 修改安装包的默认安装位置：由Program Files修改为AppData， 因为Program Files文件夹没有写入权限 2020.08.26 安装包目录结构 DigitalTwinCloud目录结构改变，增加Tools文件夹 2020.08.21 增加Polyline对象 增加Polyline对象 let coords = [[2084.75, -8474.21, 5.7], [2133.45, -8556.37, 5.7], [2270.38, -8499.91, 5.7], [2278.18, -8436.39, 5.7], [2152.5, -8361.8, 5.7]];//多边形的坐标数组 let color = [0, 0, 1, 1];//多边形的填充颜色 let o = new PolylineData('p1', color, coords); fdapi.polyline.add(o); 显示效果： 2020.08.14 增加CustomTag对象 接口的简化别名： g.tileLayer 的别名： g.tl g.customTag的别名： g.ctag g.radiationPoint的别名： g.rp g.highlightArea的别名： g.ha g.customObject的别名： g.co 增加CustomTag，可以创建HTML样式的标签 显示效果： CustomTag的背景可以设置透明度，在需要透明的地方设置CSS属性background-color为rgba颜色即可。 background-color: rgba(255, 255, 255, 0); 2020.08.07 Polygon样式-Tag可见距离 Polygon增加设置边框颜色和厚度的属性：frameColor、frameThickness let coords = [[2084.75, -8474.21, 5.7], [2133.45, -8556.37, 5.7], [2270.38, -8499.91, 5.7], [2278.18, -8436.39, 5.7], [2152.5, -8361.8, 5.7]];//多边形的坐标数组 let color = [0, 0, 1, 1];//多边形的填充颜色 let frameColor = Color.Red; let frameThickness = 500; let o = new PolygonData('1', color, coords, frameColor, frameThickness); fdapi.polygon.add(o); 运行效果： tag增加文字的最大最小可见距离属性 也就是说图片和文字要能分别设置最大最小可见距离。图标和文字的可见距离分开主要是为了解决这种文字挤到一起的问题，例如： 图标的可见距离可以设远点，文字的可见距离设近点，离远了能看到图标，近了再显示出文字。当然鼠标移到标签的图标上不关多远都会显示文字。 2020.08.05 truesky 支持truesky 完善heatmap 2020.08.03 初始化日志-beam-token 实现视频流初始化过程中的日志显示，此功能有以下几个好处： 方便的看到视频流初始化过程，用户就不会再盲目的等待了 如果有错误发生，也可以看到是哪个地方出现问题 视频流连接成功出现三维画面的时候，日志窗口会自动隐藏 如果不需要此功能，可通过接口关闭： new DigitalTwinPlayer(HostConfig.Player, 'player', HostConfig.Token, true, true); 第4个参数是控制左下角“显示信息“ 按钮的可见性 第5个参数控制视频流初始化过程中日志窗口的可见性，如果设置为false，则不可见，如果设置true或者未设置，则可见。 Beam线宽修改，现在的取值范围：[0.01, 100] 下图是宽度0.2的效果： 调用 fdapi.beam.setThickness('1', 5); 将宽度设置到5后的效果： vedeo标签的样式去掉 position:absolute 恢复之前的Token机制 2020.07.22 增加CustomObject对象 增加CustomObject接口 2020.07.15 TileLayer增加Actor方法 TileLayer接口增加以下方法 其中单数的方法用于对一个TileLayer Actor进行操作，复数方法可以对多个Actor操作，方法中的data是TileLayerActorData类型的数组： TileLayerActorData构造函数接受2个参数： 第1个参数是TileLayer的ID，第2个参数是Actor Name的字符串数组，可以对多个TileLayer的多个Actor进行操作。 增加settings接口，实现以下3个方法 setMapMode, getMapMode, setMapURL 配置工具增加发布VectorTile功能 修复拾取事件中的拼写错误：（TileLyaer） 2020.07.10 实现可视化配置工具 实现可视化配置工具 class Explorer 改名为 DigitalTwinCloud DigitalTwinCloud和DigitalTwinPlayer两个类增加 destroy方法， 调用destroy()方法后，会断开当前的连接， 并且不会再尝试重连 测试页面：int.htm, index.htm, player.htm 重构Token机制， 现在Token值保存在config.json文件里，并且可以通过可视化配置工具进行设置 视频流信息窗口相关接口 DigitalTwinPlayer构造函数增加了一个参数，用来设置是否在左下角显示控制显隐信息窗口的超链接 如果这个参数设置为true， 会在左下角显示一个超链接 “显示信息”， 点击可以显示详细的视频流信息。 2020.07.09 实现C# SDK 【C#】实现Aircity的C# SDK，接口、方法、参数与JS基本完全一致 【C# &amp; JS】所有的focus, focusAll方法，distance都可以省略了（也可以传递0值），程序会自动定位到一个合适的位置，几种用法如下： fdapi.tag.focus('p1'); //自动计算距离 fdapi.tag.focus('p1', 200); fdapi.tag.focus('p1', 0); //自动计算距离 fdapi.tag.focus('p1', 0, ()=&gt;{ ​ //如果带回调函数，又想自动计算合适的距离，distance可以传递0值 }) 【C# &amp; JS】MathServer可以通过配置文件控制AircityCloud.exe的窗口大小（视频流的分辨率）了。 【JS】去掉对event的封装，直接返回服务器信息。 去掉以下类型：EventType， MouseButtonType， TagEventParam， ActorEventParam 【C# &amp; JS】完善Actor事件的返回的信息格式 2020.07.01 接口时间戳 每个请求都加了一个参数时间戳 除了是为了计算接口调用时间，更重要的功能是为了解决客户端回调的问题，如果没有时间戳，客户端在多个地方调用同一个接口就无法正确的判断是哪次发出的请求收到的结果。 丰富颜色值的设置 之前的接口只能传递一种格式的颜色值：[1,0,1,1]，现在设置颜色的参数，都可以传递以下类型的颜色值了 1）RGB格式的颜色值 显示效果： ​ 2）十六进制的颜色值 显示效果 3）预定义的颜色常量 显示效果 预定义的常量值请参考： https://www.sioe.cn/yingyong/yanse-rgb-16/ 对象重命名 Tag -&gt; TagData Beam -&gt; BeamData TileLayer -&gt; TileLayerData HighlightArea -&gt; HighlightAreaData Polygon -&gt; PolygonData Polygon3D -&gt; Polygon3DData HeatMapPoint -&gt; HeatMapPointData RadiationPoint -&gt; RadiationPointData ImageButton -&gt; ImageButtonData AnimatedImageButton -&gt; AnimatedImageButtonData LayerVisibility -&gt; LayerVisibleData 实现对象的get接口，例如 fdapi.tag.get( 'p1' ); fdapi.tag.get( ['p1', 'p2'] ); 对于回调函数，如果获取的是一个对象的信息，那么回调函数的参数就是这个对象； 如果获取的是一组对象的信息，那么回调函数的参数是一个map，map的key是对象的id, value是对象的数据 实现属性的set接口 拿标签对象举例： 这些set方法有两种使用方式： （1）直接调用这些set方法，会立即生效 （2）在调用这些方法之前，先调用updateBegin，这些set方法会将修改临时保存，等调用updateEnd的时候，一次性的提交修改。这种方式适合一次大批量修改属性的时候用，可以大大提高性能。 2020.06.23 接口版本号 misc接口增加两个属性：apiVersion, sdkVersion apiVersion：AircityCloud提供的WebSocket接口的版本号 sdkVersion：javascript SDK的版本号 misc接口增加一个setApiVersionReceived的方法，用户可以通过这个方法设置回调，用以判断SDK的版本是否与云渲染服务器的版本一致 2020.06.16 增加focus方法 几个focus方法支持支持传递ID数组（也可以传递单个ID），影响的接口： polygon3d.focus polygon.focus beam.focus tag.focus highlightArea.focus 使用方法： (1) fdapi.tag.focus(1, 1000.0); (2) fdapi.tag.focus([1, 2, 3], 1000.0); (3) fdapi.tag.focus(\"1\", 1000.0); (4) fdapi.tag.focus([\"1\", \"2\", \"3\"], 1000.0); ID可以使用数字也可以使用字符串，SDK内部统一用字符串处理。 接口增加新的方法： tag接口增加以下方法： 1、focusAll(distance) 2、show(ids) 3、hide(ids) 4、showAll() 5、hideAll() radiationPoint接口增加以下方法： 1、focus(ids, distance) 2、focusAll(distance) 3、show(ids) 4、hide(ids) polygon接口增加以下方法： 1、show(ids) 2、hide(ids) polygon3d接口增加以下方法： 1、update(data) 2、clear() 3、focus(ids) 4、show(ids) 5、hide(ids) 6、highlight(ids) 7、glow(ids, duration) × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"tutorial-Cloud.html":{"id":"tutorial-Cloud.html","title":"Tutorial: Cloud","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVER e Aircity Explorer 二次开发指南 注意：标准版Explorer不支持二次开发，仅专业版Explorer支持二次开发 启动参数设置 Explorer安装之后，有两个文件夹：Explorer和Engine， 在Explorer\\Binaries\\Win64文件夹下找到Explorer.exe，点击鼠标右键，选择“创建快捷方式”，然后修改新创建的快捷方式的属性，在目标后面添加启动参数，目前支持以下启动参数： -projectpath 配置程序启动时自动加载的项目文件，例如： -projectpath=d:/data/acp/111.acp -WindowWidth -WindowHeight 配置程序主窗口的宽高，例如： -WindowWidth=1440 -WindowHeight=768 -websocketport 配置Explorer提供WebSocket服务的端口号，例如： -websocketport=4322 -webui 配置Explorer启动时加载的HTML页面，详细介绍参考下面的“使用WebUI”。 使用WebUI 按照上面的启动参数配置方法，在目标后面添加一个启动参数： -webui=http://192.168.1.222/webui-sampe/ webui可以设置网络路径，也可以是本地路径，需要注意的是本地路径里不能有空格，例如： -webui=D:\\SDK\\webui-sample\\index.html 设置完成之后，双击快捷方式，就可以启动，在界面上显示出HTML页面。 在使用WebUI的时候，有一下几点需要注意的地方： 页面body的样式要设置成透明： .. transparent是全透明，也可以设置成半透明：background-color: rgba(255,255,255,0.18); 注意：alpha的值要小于0.2（0-0.19之间），如果大于等于0.2，虽然也可以半透明，但是三维无法交互了，鼠标事件会被浏览器接管 WebUI的页面没有限制，可以跟正常页面一样设计制作，也可以使用全部的JS功能，唯一需要注意的地方就是在需要透明地方设置一下style的background-color的透明度。 调用接口 可以在页面的JS代码中通过WebSocket调用Explorer提供的API。在调用之前，需要先设置一个启动参数：-websocketport=4322，设置一下WebSocket服务的端口号。设置完成以后，双击快捷方式启动。 WebUI Sample启动后，在页面上设置好WebSocket服务的端口号，然后点击“连接”按钮，即可连接到Explorer的WebSocket服务，进行接口调用了 我们以添加一个标签举例，在页面中添加一个button: &lt;button onclick=\"addTag()\"&gt;添加标签&lt;/button&gt; 然后实现addTag函数： function addTag() { //设置参数 var id = 'p1'; //标签的ID，字符串值，也可以用数字（内部会自动转成字符串） var coord = [-178.14, -8038.16, 5.47]; //坐标值：标签添加的位置 var imagePath = 'https://ss0.bdstatic.com/70cFvHSh_Q1YnxGkpoWK1HF6hhy/it/u=1816424559,1043488893&amp;fm=26&amp;gp=0.jpg'; //图片路径，可以是本地路径，也支持网络路径 var imageSize = [28, 28]; //图片的尺寸 var text = '北京银行'; //标签显示的文字 var range = [1, 3000.0]; //标签的可见范围 var showLine = true; //标签下方是否显示垂直牵引线 var o = new TagData(id, coord, imagePath, imageSize, url, text, range, showLine); o.textColor = Color.Black; //设置文字颜色 o.textBackgroundColor = Color.White; fdapi.tag.add(o, () =&gt; { fdapi.tag.focus('p1', 100); }); } 程序启动后，点击“添加标签“，可以看到三维场景会自动飞到标签添加的位置 我们再以添加3dt图层举例，在页面中设置好文件的路径，然后点击“添加”按钮，可以看到三维场景自动飞到3dt场景所在的位置了，添加3dt文件的代码如下： function addTileLayer() { if (!text3dtFile.value || text3dtFile.value == '') { logWithColor('red', '请先设置3dt文件的路径'); return; } let location = [0, 0, 0]; let rotation = [0, 0, 0]; let scale = [1, 1, 1]; let fileName = text3dtFile.value; let o = new TileLayerData('1', fileName, location, rotation, scale); fdapi.tileLayer.add(o, () =&gt; { fdapi.tileLayer.focus('1'); }); } 接口测试页 SDK文件夹下有一个完整的接口测试页面：int.html，里面包含了Explorer提供的所有接口测试代码。启动Explorer后，双击int.html，即可看到页面效果： 左侧是所有接口列表，右边是实时日志输出，左边下面有一个JS代码编辑区域，可以实时编辑JS代码，然后运行看到效果 API开发帮助 详细的API开发文档，请点击最上面的Classes查看 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"tutorial-HelloWorld.html":{"id":"tutorial-HelloWorld.html","title":"Tutorial: HelloWorld","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode HelloWorld 一、获取安装引用 1.1、获取安装 点击DTS-Cloud软件右上角的链接【SDK】打开默认安装目录在SDK文件夹下，获取ac.min.js文件。 1.2、引用API方式 使用HTML方式引用（推荐） 在你工程的HTML页面引用下载的ac.min.js文件，推荐放入lib文件夹内，代码示例如下： &lt;script src='本地工程目录/lib/ac.min.js'&gt;&lt;/script&gt; 使用ES方式引用 在你使用组件的页面中，在最开始的js代码区域填写，代码示例如下： &lt;script&gt; import * as acapi from '本地工程目录/lib/ac.min'; &lt;/script&gt; 二、传统开发模式 【 Hello World示例】 2.1、添加视频流显示区域标签，代码示例如下： 在你工程的HTML页面的 &lt;body&gt; 标签中添加 &lt;div&gt; 标签，供渲染视频流场景使用： &lt;div id=\"player\" style=\"width:800px;height:500px;\"&gt;&lt;/div&gt; 2.2、HTML页面引用JavaScript文件，代码示例如下： &lt;script src='本地工程目录/lib/ac.min.js'&gt;&lt;/script&gt; 2.3、使用API初始化视频流显示区域并加载场景 function _onReady() { console.info('此时可以调API了'); } function _onLog(s, nnl) { console.info('输出接口调用日志：'); var logStr = (s + (nnl ? \"\" : '\\n')); console.info(logStr); } function _onEvent(event) { console.info('监听各类交互事件'); if (e.eventtype == 'LeftMouseButtonClick' &amp;&amp; e.Type == 'TileLayer') { console.info('监听图层点击事件'); } } //Cloud云渲染服务器地址和端口 var host = '192.168.1.27:8081'; //构造DigitalTwinPlayer对象所需的参数选项，更多参数详情请参考API开发手册里DigitalTwinPlayer对象 var options = { //必选参数，网页显示视频流的domId domId: 'player', //必选参数，二次开发时必须指定，否则无法进行二次开发 apiOptions: { //必选参数，与云渲染主机通信成功后的回调函数 //注意：只有在onReady之后才可以调用DigitalTwinAPI接口 onReady: _onReady, onLog: _onLog, //可选参数，日志输出回调函数 onEvent: _onEvent //可选参数，三维场景交互事件回调函数 }, ui: { startupInfo: true, //可选参数，是否显示页面加载详细信息，默认值false statusButton: true, //可选参数，是否显示状态按钮，默认false }, events: { onVideoLoaded: _onLoaded, //可选参数，视频流加载成功回调函数 onConnClose: _onClose, //可选参数，连接断开回调函数 }, //可选参数，设置三维交互的键盘事件接收者 //注意：接收类型有视频标签(video)，网页文档(document)，空(none) keyEventTarget: 'none', }; //构造player对象 var demoPlayer = new DigitalTwinPlayer(host, options); //构造DigitalTwinAPI对象并初始化 var airCityApi = demoPlayer.getAPI(); 注意事项：1、div需要设置长度和宽度 2、查看示例前请先修改云渲染服务器的地址和端口 加载场景成功后效果图如下： 2.4、重置、销毁场景 调用__g.reset()方法将场景从当前状态重置为场景初始渲染的状态；调用__g.destroy()方法销毁场景。 销毁场景将停止视频流渲染并断开API连接，HTML页面中的视频流场景将会消失， 但HTML中的DOM元素（即上例中的id为player的div元素）将会保留。场景销毁完成后，在同一页面可以重新创建和加载场景。 2.5、退出云服务 调用__g.quit()方法将退出云服务。 三、SPA开发模式 支持和Vue、React和Angular三种框架集成 3.1、在VUE中使用DigitalTwinAPI 示例代码如下： //待渲染区域模板 &lt;template&gt; &lt;div id=\"player\"&gt;&lt;/div&gt; &lt;/template&gt; &lt;script&gt; import * as acapi from '../ac.min' export default{ name: 'Player', data(){ return { api:null } }, mounted(){ //初始化API实例并启动渲染，DigitalTwinPlayer对象的构造参数请参考API开发文档 this.api = new acapi.DigitalTwinPlayer(\"192.168.1.27:8081\", { \"domId\": \"player\",'apiOptions': {...} }).getAPI(); }, destroyed(){ //关闭云渲染并释放资源 this.api.destroy(); } } &lt;/script&gt; 上述示例代码有几处需要注意的地方： 需要将ac.min.js放在Vue项目的static文件夹里（ac.min.js不需要再进行打包编译） 需要在mounted事件中初始化DigitalTwinPlayer对象（需要用到DOM元素） 与普通的前端开发（使用script标签的方式包含ac.min.js）的区别的地方就是，所有的对象需要使用前缀acapi来引用，例如创建Tag： let tagData = new TagData(id, .....); this.api.tag.add(tagData); 3.2、在React中使用DigitalTwinAPI 示例代码如下： //引入API import * as acapi from '../ac.min' class Content extends React.Component { constructor(props) { this.api = null; } componentDidMount() { //初始化API实例并启动渲染，DigitalTwinPlayer对象的构造参数请参考API开发文档 this.api = new acapi.DigitalTwinPlayer(\"192.168.1.27:8081\", { \"domId\": \"player\",'apiOptions': {...} }).getAPI(); } componentWillUnmount() { //关闭云渲染并释放资源 this.api.destroy(); } render() { return ( &lt;div&gt; &lt;div id=\"player\" style=\"display:none;\"&gt;&lt;/div&gt; &lt;/div&gt; ); } } 3.3、在Angular中使用DigitalTwinAPI 示例代码如下： //引入API import * as acapi from '../ac.min' @Component({ selector: 'app-root', template: `&lt;div id=\"player\" style=\"display:none;\"&gt;&lt;/div&gt;` }) export class AppComponent implements AfterViewInit, OnDestroy { //云渲染api api; ngAfterViewInit() { //初始化API实例并启动渲染，DigitalTwinPlayer对象的构造参数请参考API开发文档 this.api = new acapi.DigitalTwinPlayer(\"192.168.1.27:8081\", { \"domId\": \"player\",'apiOptions': {...} }).getAPI(); } ngOnDestroy() { //关闭云渲染并释放资源 this.api.destroy(); } } × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "}}
