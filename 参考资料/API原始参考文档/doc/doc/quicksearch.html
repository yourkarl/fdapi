oc 3.6.10 on 2026-05-28 using the DocStrap template. "},"MarkerLayer.html":{"id":"MarkerLayer.html","title":"Class: MarkerLayer","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: MarkerLayer MarkerLayer 标注图层对象：一共分三个层级，第三层级为圆形标记点，第二层级为标记图片，第一层级为标注Marker 一般通过api.markerLayer调用其方法 MarkerLayer标注点的效果图： new MarkerLayer() See: DigitalTwinAPI#markerLayer Extends BaseObject Methods add(data, fn) 添加一个或多个标注图层服务对象 Parameters: Name Type Description data object | array 标注图层对象包含的数据结构，可以是Object类型或者Array类型，对于每一个对象，支持以下属性： id (string) 标注图层对象的唯一标识符 groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 range (array) 标注图层对象三段可视范围，共分2段： [minDis,lodDis,maxDis]，第一段近距离（标记点Marker）：[minDis,lodDis]，第二段距离（标记图片）：[lodDis,maxDis] minPixel (number) 相机观察距离达到最远距离(maxDis)时显示的像素大小，单位：像素 viewHeightRange (array) 可见高度范围：[最小可见高度, 远最大可见高度]，默认值: [-1000000000, 1000000000] autoHeight (boolean) 自动判断下方是否有物体，设置正确高度，默认值：false coordinateType (number) 坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 textRange (array) 文本可视范围: [近裁距离, 远裁距离]，默认值: [100, 6000] useTextAnimation (boolean) 是否打开文字展开动画效果，默认值：true textOffset (array) 文本偏移: [x, y]，默认值：[0,0] fontSize (number) 字体大小，默认值：12 fontOutlineSize (number) 字体轮廓线大小，默认值：1 textBackgroundColor (Color) 文本背景颜色，默认值白色[1, 1, 1, 0.85]，支持四种格式，取值示例 fontColor (Color) 字体颜色，默认值：黑色Color.Black，支持四种格式，取值示例 fontOutlineColor (Color) 字体轮廓线颜色，默认值：黑色Color.Black，支持四种格式，取值示例 popupBackgroundColor (Color) 弹窗背景颜色， [1.0,1.0,1.0,0.1] ，支持四种格式，取值示例 popupSize (array) 弹窗大小: [width, height]，默认值：[600,400] popupOffset (array) 弹窗偏移: [x, y]，默认值：[0,0] autoHidePopupWindow (boolean) 是否自动关闭弹出窗口，默认值：true displayMode (number) 显示模式，默认值：4，取值说明如下： 0：相机移动不显示，参与避让聚合 1：相机移动时显示，参与避让聚合 2：相机移动时显示，不参与避让聚合 3：相机移动时不显示，不参与避让聚合 4：智能模式，根据当前相机高度自动适配以上模式，类似金字塔lod加载效果，内置默认规则:range范围的1%内取值2，大于1%小于10%取值1，大于10%取值0 clusterByImage (boolean) 聚合时是否根据图片路径(imagePath)分类聚合显示，即当多个markerLayer的imagePath路径参数相同时按路径对markerLayer分类聚合 priority (number) 避让优先级，默认值：0 occlusionCull (boolean) 是否参与遮挡剔除 markers (array) 标注图层对象包含的标记点对象或数组，可以是Object类型或者Array类型，对于每一个对象，支持以下属性： id (string) 必选，标记点的ID coordinate (array) 标注点的位置坐标: [x, y, z]，取值示例 anchors (array) 锚点: [x, y]，设置Marker的聚焦图片位置的偏移，默认值：[0,0]，取值规则如下图：![](../images/api/anchors.png) text (string) 显示的文字 popupURL (string) 弹窗HTML链接或者视频文件路径，也支持实时流媒体视频地址，资源引入说明 imagePath (string) 图片路径，支持gif动图，支持本地路径和网络路径，资源引入说明 imageSize (array) 图片的尺寸: [width, height]， 默认值[32,32] hoverImagePath (string) 鼠标悬停时显示的图片路径，支持gif动图，支持本地路径和网络路径，资源引入说明 hoverImageSize (array) 鼠标悬停时显示的图片尺寸: [width, height]， 默认值：[0,0] 使用图片自身的尺寸，注意：如果设置的值比imageSize尺寸小，则默认使用imageSize的尺寸。 ) 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Misc.html":{"id":"Misc.html","title":"Class: Misc","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: Misc Misc Misc类，提供一些杂项功能 一般通过api.misc调用其方法 &lt;protected&gt; new Misc() See: DigitalTwinAPI#misc Methods addAnimatedImageButtons(data, fn) 添加动画按钮 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (number) 按钮的ID x (number) 图片按钮的位置:x坐标 y (number) 图片按钮的位置:y坐标 width (number) 图片按钮的宽度，单位像素 height (number) 图片按钮的高度，单位像素 imageSequecePath (string) 序列贴图的路径，资源引入说明 imageSequeceLength (string) 序列贴图的图片数量，也就是帧数 loop (boolean) 是否循环播放序列贴图 interactable (boolean) 是否可以用鼠标点击操作 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addImageButtons(data, fn) 添加图片按钮 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 按钮的ID x (number) Button的屏幕坐标X y (number) Button的屏幕坐标Y width (number) Button的宽度 height (number) Button的高度 normalImage (string) Button正常显示的图片 hoverImage (string) 鼠标移上去后显示的图片 tooltip (string) Button的文字提示 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 callBPFunction(data, fn) 调用整个渲染场景内指定的蓝图函数 注意：调用前请先确认被调用的蓝图函数已存在，并和设计蓝图函数的开发人员沟通确认相关参数取值后再调用 Parameters: Name Type Description data object 支持以下属性： actorTag (string) 发布蓝图函数时在模型包含的Actor上添加的tag，调用前需和设计蓝图函数的开发人员确认 objectName (string) 模型包含的Actor对象的ID，可以根据__g.tileLayer.getObjectIDs(tileLayerIds)方法获取 functionName (string) 待调用的蓝图函数名称，调用前需和设计蓝图函数的开发人员确认此函数已存在 paramType (BPFuncParamType) 传入单个参数，待传入参数类型 参考BPFuncParamType，如果需传递对象类型参数可以把Json对象定义为StringArray类型，在蓝图函数内部自己实现反序列化解析。 paramValue (any) 传入单个参数，根据参数类型设置对应参数值 parameters (array) 传入多个参数，数组类型，注意：传入多参数的顺序与类型务必与蓝图函数的参数顺序及其参数类型一致以保证执行结果符合预期。多个参数结构示例：[{\"paramType\":BPFuncParamType.String,\"paramValue\":\"示例值\"},{\"paramType\":BPFuncParamType.Bool,\"paramValue\":false},{\"paramType\":BPFuncParamType.Float,\"paramValue\":100.8}] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 deleteImageButtons(ids, fn) 删除动画按钮 Parameters: Name Type Description ids array 按钮的ID或数组（可以一次删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 enterMultiViewportMode(viewportMode, lineColor, lineSize, fn) 进入多视口模式 Parameters: Name Type Description viewportMode number 视口布局类型，取值范围：[1~7]，参考上图从上到下从左到右计数，即录制导览动画时的视口布局 lineColor Color 可选参数，激活后视口边框线的颜色，默认值：#DEA309，支持四种格式，取值示例 lineSize number 可选参数，激活后视口边框线的宽度，单位：像素，默认值：2px fn function 可选的回调函数，请参考二次开发：异步接口调用方式 enterReportMode(fn) 进入汇报演示模式 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 exitMultiViewportMode(fn) 退出多视口模式 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 exitReportMode(fn) 退出汇报演示模式 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 getActiveViewport(fn) 查询当前激活的视口信息 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 getBPFunction(assetPath, fn) 根据模型Actor路径或者对象id查询模型包含的蓝图函数信息，支持查询单个模型和多个模型包含的蓝图函数信息 如何获取assetPath参数见如下动图： Parameters: Name Type Description assetPath string | array 模型Actor的路径或路径数组，可以从资源库的模型列表复制获取 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回结果示例： [{ \"idOrPath\": \"/JC_CustomAssets/EffectLibrary/Exhibition/3DUI/3D_UI_C_3\", \"objectType\": \"Actor\", \"params\": [{ \"functionName\": \"特效\", \"functionParams\": [{ \"name\": \"点特效样式\", \"type\": 16, \"defaultValue\": \"\" }, { \"name\": \"线特效样式\", \"type\": 16, \"defaultValue\": \"\" }] }, { \"functionName\": \"图标\", \"functionParams\": [{ \"name\": \"图标样式\", \"type\": 16, \"defaultValue\": \"\" }, { \"name\": \"图标背景\", \"type\": 16, \"defaultValue\": \"\" }] }, { \"functionName\": \"动画\", \"functionParams\": [{ \"name\": \"启用动画\", \"type\": 0, \"defaultValue\": 0 }, { \"name\": \"反向动画\", \"type\": 0, \"defaultValue\": 0 }] }, { \"functionName\": \"文字\", \"functionParams\": [{ \"name\": \"文字内容\", \"type\": 5, \"defaultValue\": \"\" }, { \"name\": \"文字大小\", \"type\": 2, \"defaultValue\": 0 }, { \"name\": \"背景颜色\", \"type\": 6, \"defaultValue\": [1.000000, 1.000000, 1.000000, 1.000000] }, { \"name\": \"背景倒角\", \"type\": 3, \"defaultValue\": 0.000000 }] }] }] getConvexPolygon(pointArray, fn) 从一组离散点中获取凸多边形的顶点索引 Parameters: Name Type Description pointArray boolean 离散点坐标数组，数组元素格式：[X,Y] 注意：没有高度Z fn function 可选的回调函数，请参考二次开发：异步接口调用方式 getMaterial(materialPath, fn) 根据材质路径查询材质包含的图片纹理和材质参数信息，同时支持查询单个材质和多个材质包含的信息 如何获取materialPath参数见如下动图： Parameters: Name Type Description materialPath string | array 单个材质路径或路径数组，可以从资源库的材质列表复制获取 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回结果示例： [{ \"idOrPath\": \"/JC_CustomAssets/MaterialLibrary/Exhibition/地面_自然/地面_自然_1\", \"objectType\": \"Material\", \"params\": [{ \"name\": \"颜色\", \"type\": 6, \"defaultValue\": [1.000000, 1.000000, 1.000000, 1.000000] }, { \"name\": \"脏迹颜色\", \"type\": 6, \"defaultValue\": [0.400000, 0.400000, 0.400000, 1.000000] }, { \"name\": \"亮度\", \"type\": 3, \"defaultValue\": 1.300000 }, { \"name\": \"金属度\", \"type\": 3, \"defaultValue\": 0.000000 }, { \"name\": \"法线强度\", \"type\": 3, \"defaultValue\": 1.000000 }, { \"name\": \"粗糙度\", \"type\": 3, \"defaultValue\": 1.616593 }] }] hideAllFoliages(fn) 隐藏Explorer里创建的植物 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 isApiVersionMatched() 判断JS-API的版本和云渲染服务器的接口版本是否一致 Returns: 如果一致返回true，否则返回false playMovie(url, loop, fn) 全屏播放影片（播放过程中会暂停三维渲染以提高性能） Parameters: Name Type Description url string 影片文件路径，支持本地绝对路径和流媒体网络路径，注意：不支持工程本地的相对路径 loop boolean 是否循环播放（from V2021.03.09） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 playVideo(id, x, y, width, height, url, fn) 播放视频（显示播放窗口） Parameters: Name Type Description id string 字符串类型的ID x number 视频窗口的位置X y number 视频窗口的位置Y width number 视频窗口的宽度 height number 视频窗口的高度 url string 视频文件路径，支持本地绝对路径和流媒体网络路径，注意：不支持工程本地的相对路径 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 playVideoAlone(url, options, fn) 在独立的进程播放视频，注意：此接口仅在基于Explorer进行二次开发时生效 Parameters: Name Type Description url string 视频地址，支持网络地址或者本地文件。 options object 视频播放窗口配置参数，支持以下参数： mute (boolean) 是否静音。 x (number) 视频播放窗口左上角距离显示器屏幕左侧的坐标 y (number) 视频播放窗口左上角距离显示器屏幕顶部的坐标 cx (number) 视频播放窗口宽度，默认值400 cy (number) 视频播放窗口高度，默认值300 title (string) 视频播放窗口标题栏文本，如果不设置，标题栏默认显示视频地址 opacity (number) 视频播放窗口的透明度，取值范围：(0, 1] style (enum) 视频播放窗口样式。 取值0：无标题栏，1：有标题栏，2：有标题栏，可拖动边框改变大小。 默认值为2。 hideBuffering (boolean) 是否隐藏标题栏显示的视频流缓冲进度，默认不隐藏 maximizeBox (boolean) 是否在标题栏显示最大化按钮，默认不显示 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 projectAssetCount(type, fn) 统计ACP工程包含各类资产信息 Parameters: Name Type Description type number ACP工程包含的资产类型，枚举类型详情请参考 AssetType fn function 可选的回调函数，请参考二次开发：异步接口调用方式 projectAssetCountAll(fn) 统计ACP工程包含的全部资产信息 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 reloadPak(fn) 从Cloud的文件资源配置中重新挂载新添加的pak文件，避免重启服务引起的实例关闭 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setActiveViewport(index, fn) 激活一个或多个视口，注意：仅在多视口模式下生效 Parameters: Name Type Description index number | array 被激活视口的索引或索引数组（同时激活多个视口），索引取值范围：[0~3] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setApiVersionReceived(fnCallback) 设置服务器返回版本号的回调函数 Parameters: Name Type Description fnCallback function 回调函数，当收到服务器返回的版本信息后调用 setMultiviewportInteractSync(isSync, fn) 多视口模式下设置相机是否同步 Parameters: Name Type Description isSync boolean 相机是否同步，默认不联动：false fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setReportModeAlign(align, fn) 设置汇报模式下的窗口位置 Parameters: Name Type Description align number 位置取值：0【底部】，1【居左】，2【居右】，默认0 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setReportModePlayMode(playMode, fn) 设置汇报模式下窗口的播放模式 Parameters: Name Type Description playMode number 播放模式取值： 0【单体播放】，1【单体循环】，2【整体循环】，默认0 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setReportModeViewPortLinkage(isLinkage, fn) 设置汇报模式下展示多视口时，相机是否联动 取值：联动true，不联动false，默认不联动false Parameters: Name Type Description isLinkage boolean 相机是否联动 取值：联动true，不联动false，默认不联动false fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showAllFoliages(fn) 显示Explorer里创建的植物 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 stopMovie(fn) 停止全屏播放影片 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 stopPlayVideo(id, fn) 停止播放视频（播放窗口会消失） Parameters: Name Type Description id string 字符串类型的ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 stopPlayVideoAlone(id, fn) 停止在独立的进程播放视频，注意：此接口仅在基于Explorer进行二次开发时生效 Parameters: Name Type Description id number 成功调用playVideoAlone后返回的processId fn function 可选的回调函数，请参考二次开发：异步接口调用方式 switchShortcutKey(onOff, fn) 控制Explorer快捷键的开关，注意：仅针对explorer下webui开发方式生效 Parameters: Name Type Description onOff boolean 打开关闭快捷键：true打开，false关闭 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"OceanHeatMap.html":{"id":"OceanHeatMap.html","title":"Class: OceanHeatMap","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: OceanHeatMap OceanHeatMap 海洋热力图对象，基于真实海洋数据驱动生成热力图，数据源格式：.tif文件 一般通过api.oceanHeatmap调用其方法 &lt;protected&gt; new OceanHeatMap() See: DigitalTwinAPI#OceanHeatMap Methods add(data, fn) 添加一个或多个OceanHeatMap海洋热力图对象，数据源为.tif文件。 Parameters: Name Type Description data object | array 构造海洋热力图对象OceanHeatMap的数据对象，可以是Object类型或者Array类型，对于每一个OceanHeatMap对象，支持以下属性： id (string) OceanHeatMap对象ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 offset (array) 可选，海洋热力图的整体偏移，默认值：[0, 0, 0] collision (boolean) 是否开启模型碰撞，默认：false，注意：开启后会影响加载效率 displayMode (OceanHeatMapStyle) 海洋热力图的显示样式枚举，支持箭头、流场和海浪三种显示样式，取值详情参考 OceanHeatMapStyle alphaMode (number) 透明模式，取值：[0,1]，0 : 使用colors调色板的不透明度值 1 : 使用tif数据包含的水深字段自动控制不透明度，默认值：1 valueFile (string) 必选，海洋热力图tif数据文件路径（水深文件tif），取值示例：\"C:/tifFile/value.tif\"，注意：水深和流速这2个tif文件分辨率必须保持一致 flowField (string) 必选，海洋热力图tif数据文件路径（流速流向uv文件tif），取值示例：\"C:/tifFile/uv.tif\"，注意：水深和流速这2个tif文件分辨率必须保持一致 valueRange (array) 可选，水深对应的数值区间，如果不传则系统会自动计算并使用valueFile数据的水深范围 speedRange (array) 可选，流速范围，如果不传则系统会自动计算并使用flowField数据的速度范围 alphaGradientValueRange (array) 边缘羽化的水深范围，默认值：[0,2]，单位：米，对应的alpha区间为[0,1]，注意：仅在alphaMode=1时生效 rippleDensity (number) 可选，水波纹辐射强度，默认值：1 rippleTiling (number) 可选，水波纹辐射平铺系数，默认值：1 speedFactor (number) 可选，速度因子，控制水波纹或者粒子的速度，默认值：1 foamIntensity (number) 可选，水泡沫的强度，默认值：1 waveBrightness (number) 可选，水波纹的显示亮度，取值范围：[0~1000]，值越大亮度越高水波纹越明显，默认值：1 shadowDensity (number) 可选，水波纹阴影强度，默认值：1 arrowColor (array) 箭头的颜色和透明度，示例值：[1,1,1,0.5] arrowDisplayMode (number) 箭头的显示模式，取值范围：[0,1]，0默认样式（受arrowColor参数影响），1热力样式（受arrowColors调色板参数影响），默认值：0 arrowAlphaMode (number) 箭头透明度模式，仅在arrowDisplayMode=0时生效，取值：[0,1]，0使用arrowColor的透明度，1使用调色板的透明度，默认值：0 particles (object) 可选参数，粒子动态效果对应参数的配置对象 displayMode (number) 可选，粒子的的显示模式，取值范围：[0,1]，0默认样式（受arrowColor参数影响），1热力样式（受arrowColors调色板参数影响），默认值：0 alphaMode (number) 可选，粒子的透明度模式，仅在displayMode=0时生效，取值：[0,1]，0使用arrowColor的透明度，1使用调色板的透明度，默认值：0 color (array) 可选，粒子的颜色和透明度，示例值：[1,1,1,0.5] num (number) 可选，箭头数量 speedFactor (number) 可选，速度因子 sizeScale (number) 可选，尺寸缩放因子 fadeOpacity (number) 可选，不透明度渐隐系数 baseRespawnRate (number) 可选，重新生成箭头的基础因子 respawnSpeedFactor(number) 可选，重新生成箭头的速度因子 flowVisualization (object) 可选参数，流场可视化效果配置参数对象 brightness (number) 可选，亮度 noisePuls (number) 可选，脉冲噪声 timeSpeed (number) 可选，时间加速因子 tilling (number) 可选，平铺因子 blendFactor (number) 可选，混合因子 renderSpeedRange(array) 可选，流速渲染范围 lods (array) 可选参数，流场样式下，流场、远景水波纹、近景水波纹、水面浪花的四个显示距离： level (number) 四种显示类型 distance (number) 透明度开始衰变的相机距离 colors (object) 海洋热力图自定义调色板对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 值对应的调色板颜色，注意alphaMode=0时，此颜色值的透明度生效 value (number) 值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 请求数据结构示例 { \"id\": \"oceanHeatmap1\", \"offset\": [0, 0, 0], \"collision\": true, \"alphaMode\": 1, \"displayMode\": 1, \"valueRange\":[0,0.3], \"speedRange\":[0,0.3], \"alphaGradientValueRange\": [0, 0.3], \"speedFactor\": 500, \"rippleDensity\": 1, \"rippleTiling\": 1, \"foamIntensity\": 3, \"waveBrightness\": 10, \"shadowIntensity\": 1, \"particles\": { \"alphaMode\": 0, \"color\": [0, 0, 0, 1], \"displayMode\": 0, \"num\": 10000, \"speedFactor\": 5000, \"sizeScale\": 0.01, \"fadeOpacity\": 0.95, \"baseRespawnRate\": 0.03, \"respawnSpeedFactor\": 0.02 }, \"lods\": [ { \"level\": 1, \"distance\": 50000, }, { \"level\": 2, \"distance\": 100000, }, { \"level\": 3, \"distance\": 500000, } ], \"flowVisualization\": { \"brightness\": 1.0, \"noisePuls\": 0.5, \"timeSpeed\": 0.75, \"tilling\": 0.5, \"blendFactor\": 0.5, \"renderSpeedRange\": [0, 0] }, \"valueFile\": path + \"/assets/tif/oceanheatmap/value.tif\", \"flowField\": path + \"/assets/tif/oceanheatmap/uv.tif\", \"colors\": { \"gradient\": true, \"invalidColor\": [0, 0, 0, 1], \"colorStops\": [{ \"value\": 0, \"color\": [0.2, 0.4, 0.92, 0] }, { \"value\": 0.2, \"color\": [0.1, 0.85, 0.85, 1] }, { \"value\": 0.3, \"color\": [0.05, 0.9, 0.05, 1] }, { \"value\": 0.5, \"color\": [0.8, 0.8, 0.01, 1] }, { \"value\": 1, \"color\": [1, 0.15, 0.15, 1] }] } } clear(fn) 删除场景中所有的OceanHeatMap Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个OceanHeatMap对象 Parameters: Name Type Description ids string | array 要删除的OceanHeatMap对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array OceanHeatMap对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取OceanHeatMap的详细信息 Parameters: Name Type Description ids string | array 要获取的OceanHeatMap对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hide(ids, fn) 隐藏OceanHeatMap Parameters: Name Type Description ids string | array OceanHeatMap对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示OceanHeatMap Parameters: Name Type Description ids string | array OceanHeatMap对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个OceanHeatMap对象 Parameters: Name Type Description data object | array OceanHeatMap对象或者数组，以下属性支持更新 id (string) 根据OceanHeatMap对象的ID更新以下属性 valueFile (string) 必选，海洋热力图tif数据文件路径（水深文件tif），取值示例：\"C:/tifFile/xxx1.tif\"，注意：waterDepth、flowField和dem的三个tif文件分辨率必须保持一致 flowField (string) 必选，海洋热力图tif数据文件路径（流速流向文件tif），取值示例：\"C:/tifFile/xxx2.tif\"，注意：waterDepth、flowField和dem的三个tif文件分辨率必须保持一致 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"ODLine.html":{"id":"ODLine.html","title":"Class: ODLine","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTour .5 bendDegree (number) 弯曲度，取值范围：[0~1.0]，默认值：0.5 tiling (number) 材质贴图平铺比例，从起始位置开始平铺，超过的部分会按此比例生成新的区域，类似CSS的repeat。如果这个值 &lt;= 0 使用自动计算按Polyline长度比例平铺， &gt;0使用用户输入的值去平铺 lineThickness (number) 线宽，单位：米，默认值20 flowPointSizeScale (number) 运动点的缩放值，默认值20， 单位米 labelSizeScale (number) 两端点的缩放值，默认值100， 单位米 lineShape (number) ODLine模型样式 0:平面 1:柱体，默认值1 lineStyle (number) ODLine材质样式 0:纯色，1:箭头，2:流动点，3：虚线，默认值0（Style为2时建议手动设置Tiling 例如设为1） flowShape (number) ODLine发光点样式 0:无 1:球体，默认值0（Shape为0即删除/隐藏，当Shape为0时设置Style无效） startPointShape (number) StartPoint样式， default 0 ( 0 : None 1 : Sphere ) endPointShape (number) EndPoint样式， default 0 ( 0 : None 1 : Sphere ) startLabelShape (number) StartLabel样式， default 0 ( 0 : None 1 : Circle ) endLabelShape (number) EndLabel样式， default 0 ( 0 : None 1 : Circle ) fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的ODLine Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个ODLine对象 Parameters: Name Type Description ids string | array 要删除的ODLine对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array ODLine对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取ODLine的详细信息 Parameters: Name Type Description ids string | array 要获取的ODLine对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example ODLine的详细信息 { \"id\": \"od1\", \"groupId\": \"\", \"userData\": \"\", \"coordinates\": [[492303.656250, 2487534.500000, 4.195000], [491391.562500, 2487777.500000, 4.200000]], \"color\": [0.000000, 0.500000, 0.000000, 1.000000], \"flowRate\": 1.000000, \"Brightness\": 1.000000, \"bendDegree\": 0.500000, \"tiling\": 0.500000, \"lineThickness\": 15.000000, \"flowSiz 11.22, 5.7], [4155.2, -4036.94, 5.7], [3098, -11010.32, 5.7], [6445.79, -12717.28, 6.78]], [[8706.9, -9457.89, 5.7], [8824.84, -8055.4, 6.64], [7619.37, -8859.47, 6.72]], [[5744.8, -7795.59, 5.7], [6205.21, -5724.74, 5.7], [4460.01, -5839.38, 6.05], [3966.28, -7712.46, 7.17]] ]; 3. 2个Part的Polygon，每个Polygon有一个或多个洞 let coords3 = [ //part1 [ [[9665.22, -11366.88, 5.7], [9765.4, -4511.22, 5.7], [4155.2, -4036.94, 5.7], [3098, -11010.32, 5.7], [6445.79, -12717.28, 6.78]], [[8706.9, -9457.89, 5.7], [8824.84, -8055.4, 6.64], [7619.37, -8859.47, 6.72]], [[5744.8, -7795.59, 5.7], [6205.21, -5724.74, 5.7], [4460.01, -5839.38, 6.05], [3966.28, -7712.46, 7.17]] ], //part2 [ [[-4477.25, -4353.11, 5.7], [-1803.2, -6744.65, 5.7], [-562.18, -4590.14, 5.7], [-2271.85, -2595.33, 5.7]], [[-2867.3, -4342.53, 5.7], [-2381.34, -5043.33, 5.7], [-1723.21, -4566.1, 6.25], [-1938.83, -3757.59, 5.7]] ] ]; &lt;protected&gt; new Polygon() See: DigitalTwinAPI#polygon Extends BaseObject Methods add(data, fn) 添加一个或多个Polygon对象 如何获取自定义材质路径(material)见如下动图： 如何获取自定义材质包含的参数请调用如下方法： let res = await fdapi.misc.getMaterial(material); let params = res.data[0].params; Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 字符串类型的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 color (Color) 颜色值，支持四种格式，取值示例 coordinates (array) 多边形坐标数组，取值示例 coordinateType (number) 坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 arcType (number) 球面地形下绘制多边形贴地弧线的类型，0：劣弧 1：优弧，默认值：0 range (array) 可视范围: [近裁距离, 远裁距离]，取值范围: [任意负值, 任意正值] viewHeightRange (array) 可见高度范围：[最小可见高度, 远最大可见高度]，默认值: [-1000000000, 1000000000] priority (number) 设置Polygon显示的优先级，值越大越靠上，取值范围：[-1000,1000] frameColor (Color) 边框颜色，支持四种格式，取值示例 frameThickness (number) 边框厚度，单位：米。（当frameThickness设置为0的时候，不创建轮廓） depthTest (boolean) 是否做深度检测，默认为true，true会被遮挡，false不会被遮挡 intensity (number) 亮度，取值范围：[0~1000]，注：目前仅单色模式下生效[style:PolygonStyle.SingleColor] style (PolygonStyle) 多边形样式，单色/圆点/体积/渐变/波纹/贴地等，取值范围：[0~10]，详情参考 PolygonStyle，注意：如果设置贴地模式，有环的polygon对象内环方向需要与外环方向相反，否则贴地时内环会不显示 gradualWidth (number) 多边形填充的透明度渐变的间隔宽度，单位：米，默认值：10，注意：此参数仅当style样式设置为AlphaGradualBorder时生效 outerAlpha (number) 多边形填充的透明度渐变的起始值，取值范围：[0~1]，默认值：0.3，注意：此参数仅当style样式设置为AlphaGradualBorder时生效 innerAlpha (number) 多边形填充的透明度渐变的结束值，取值范围：[0~1]，默认值：1，注意：此参数仅当style样式设置为AlphaGradualBorder时生效 material (string) 可选参数，自定义材质路径，即资源库PAK文件里材质文件的路径，设置自定义材质参数后style相关参数会失效 scalarParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数值类型参数，包含name/value键值对的数组，其中value为数值，格式示例：[{\"name\":\"不透明度\",\"value\":0.5},{\"name\":\"UV重复\",\"value\":1.0}] vectorParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质矢量类型参数，包含name/value键值对的数组，其中value为数组，格式示例：[{\"name\":\"color1\",\"value\":[1,1,1,1]},{\"name\":\"color2\",\"value\":[1,0,0,1]}] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的Polygon Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个Polygon对象 Parameters: Name Type Description ids string | array 要删除的Polygon对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array Polygon对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取Polygon的详细信息 Parameters: Name Type Description ids string | array 要获取的Polygon对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example Polygon的详细信息 { \"id\": \"polygon1\", \"groupId\": \"\", \"userData\": \"\", \"depthTest\": 0, \"color\": [0.000000, 0.000000, 1.000000, 1.000000], \"style\": 0, \"brightness\": 1.000000 } glow(ids, duration, fn) 闪烁 Parameters: Name Type Description ids string | array Polygon的ID或者ID数组 duration any 闪烁持续时间，取值说明，-1一直闪烁 0永不闪烁 &gt;0按指定时间间隔闪烁，单位秒 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hide(ids, fn) 隐藏Polygon Parameters: Name Type Description ids string | array Polygon对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 highlight(ids, fn) 高亮 Parameters: Name Type Description ids string | array Polygon的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setColor(id, newVal, fn) 设置颜色 Parameters: Name Type Description id string Polygon的ID newVal Color 新颜色值，支持四种格式，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setCoordinates(id, newVal, fn) 设置坐标 Parameters: Name Type Description id string Polygon的ID newVal array 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setDepthTest(id, newVal, fn) 设置是否做深度检测 Parameters: Name Type Description id any Polygon的ID newVal boolean 是否做深度检测 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setViewHeightRange(id, minViewHeight, maxViewHeight, fn) 设置Polygon对象的可视高度范围，注意：当Polygon对象使用贴地模式时，此方法会失效 Parameters: Name Type Description id string Polygon对象的ID minViewHeight number 可视高度范围最小值，取值范围：[任意负数~任意正数]，单位：米 maxViewHeight number 可视高度范围最大值，取值范围：[任意负数~任意正数]，单位：米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示Polygon Parameters: Name Type Description ids string | array Polygon对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 unHighlight(ids, fn) 停止高亮 Parameters: Name Type Description ids string | array Polygon的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个Polygon对象 Parameters: Name Type Description data object | array 数据结构，请参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateE value\":1.0}] vectorParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质矢量类型参数，包含name/value键值对的数组，其中value为数组，格式示例：[{\"name\":\"color1\",\"value\":[1,1,1,1]},{\"name\":\"color2\",\"value\":[1,0,0,1]}] generateTop (boolean) 可选参数，是否生成顶面，默认：true generateSide (boolean) 可选参数，是否生成侧面，默认：true generateBottom (boolean) 可选参数，是否生成底面，默认：true bClip (boolean) 可选参数，是否参与剖切，默认：false depthTest (boolean) 是否做深度检测，默认为true，true会被遮挡，false不会被遮挡，注意：非半透明材质不支持深度检测 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example polygon3d对象示例 let polygon3d = { id: 'polygon3d', coordinates: coordinates, coordinateType: 0, color: [1, 1, 1, 1], height: 50, intensity: 1.0, style: Polygon3DStyle.WaveTransparent, tillingX: 0, tillingY: 0, material: \"/JC_CustomAssets/Material/M_material\", scalarParameters: [{ \"name\": \"U重复\", \"value\": 0.1 }], vectorParameters: [{ \"name\": \"color\", \"value\": [1,0,0] }], generateTop: true, generateSide: true, generateBottom: true, bClip: true, depthTest: true } clear(fn) 删除场景中所有的3DPolygon Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个3DPolygon对象 Parameters: Name Type Description ids string | array 要删除的3DPolygon对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 disableClip(ids, fn) 禁止Polygon3D参与剖切 Parameters: Name Type Description ids number | array Polygon3D对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 enableClip(ids, fn) 设置Polygon3D参与剖切 Parameters: Name Type Description ids number | array Polygon3D对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array 3DPolygon对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取3DPolygon的详细信息 Parameters: Name Type Description ids string | array 要获取的 gY Parameters: Name Type Description id string Polygon3D的ID newVal number 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setViewHeightRange(id, minViewHeight, maxViewHeight, fn) 设置Polygon3D对象的可视高度范围 Parameters: Name Type Description id string Polygon3D对象的ID minViewHeight number 可视高度范围最小值，取值范围：[任意负数~任意正数]，单位：米 maxViewHeight number 可视高度范围最大值，取值范围：[任意负数~任意正数]，单位：米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示3DPolygon Parameters: Name Type Description ids string | array 3DPolygon对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showAll(fn) 显示所有3DPolygon Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 stopGlow(ids, fn) 停止闪烁 Parameters: Name Type Description ids string | array Polygon3D的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 unHighlight(ids, fn) 停止高亮 Parameters: Name Type Description ids string | array Polygon3D的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个3DPolygon对象 Parameters: Name Type Description data object | array 数据结构，请参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Polyline.html":{"id":"Polyline.html","title":"Class: Polyline","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: Polyline Polyline Polyline 相关的操作 一般通过api.polyline调用其方法 new Polyline() protected See: DigitalTwinAPI#polyline Extends BaseObject Methods add(data, fn) 添加一个或多个Polyline对象 如何获取自定义材质路径(material)见如下动图： 如何获取自定义材质包含的参数请调用如下方法： let res = await fdapi.misc.getMaterial(material); let params = res.data[0].params; Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 字符串类型的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 color (Color) 颜色值，支持四种格式，取值示例 coordinates (array) 坐标点数组，取值示例 coordinateType (number) 坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 arcType (number) 球面地形下绘制贴地弧线的类型，0：劣弧 1：优弧，默认值：0 range (array) 可视范围: [近裁距离, 远裁距离]，取值范围: [任意负值, 任意正值] viewHeightRange (array) 可见高度范围：[最小可见高度, 远最大可见高度]，默认值: [-1000000000, 1000000000] thickness (number) 线宽，单位：米，默认值20 intensity (number) 亮度，取值范围：[0~1000]，默认值：0.5 flowRate (number) 流速，取值范围：[0~1.0]，默认值：0.5 depthTest (boolean) 是否做深度检测，默认为true，true会被遮挡，false不会被遮挡 shape (number) 样式，0：直线， 1：曲线，注意：设置为曲线坐标点多的时候会影响添加添加效率 style (PolylineStyle) 折线样式，箭头/光流/贴地/实线/虚线等，取值范围：[0~7]，详情参考 PolylineStyle tiling (number) 可选参数，材质贴图平铺比例，和PolylineStyle取值有关，目前仅部分样式支持此参数，从起始位置开始平铺，超过的部分会按此比例生成新的区域，类似CSS的repeat。如果这个值 &lt;= 0 使用自动计算按Polyline长度比例平铺， &gt;0使用用户输入的值去平铺 material (string) 可选参数，自定义材质路径，即资源库PAK文件里材质文件的路径，设置自定义材质参数后style相关参数会失效 scalarParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数值类型参数，包含name/value键值对的数组，其中value为数值，格式示例：[{\"name\":\"不透明度\",\"value\":0.5},{\"name\":\"UV重复\",\"value\":1.0}] vectorParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质矢量类型参数，包含name/value键值对的数组，其中value为数组，格式示例：[{\"name\":\"color1\",\"value\":[1,1,1,1]},{\"name\":\"color2\",\"value\":[1,0,0,1]}] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 attachObject(data, fn) 设置一个或多个Polyline对象的起点和终点跟随对应的模型移动 注意：设置贴合后只有Polyline的起点和终点会跟随相应的模型一起平滑移动，支持的对象类型：Satellite Parameters: Name Type Description data object | array Polyline对象id和模型对象Id的数据映射对象数组，可以是Object类型或者Array类型，对于每一个映射对象，支持以下属性： polylineId (string) Polyline对象ID startObjectId (string) Polyline起点跟随移动对应的模型ID endObjectId (string) Polyline终点跟随移动对应的模型ID fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 示例代码： fdapi.polyline.attachObject([ { polylineId: \"line1\", startObjectId: \"satellite1\", endObjectId: \"satellite2\" }, { polylineId: \"line2\", startObjectId: \"satellite2\", endObjectId: \"satellite3\" }, ]); clear(fn) 删除场景中所有的Polyline Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个Polyline对象 Parameters: Name Type Description ids string | array 要删除的Polyline对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array Polyline对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取Polyline的详细信息 Parameters: Name Type Description ids string | array 要获取的Polyline对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example Polyline的详细信息 { \"id\": \"p1\", \"groupId\": \"\", \"userData\": \"\", \"coordinates\": [[493711.156250, 2488656.250000, 7.000000], [493698.093750, 2490060.250000, 8.400000], [494434.781250, 2490056.000000, 5.400000], [494663.906250, 2491221.000000, 3.800000]], \"shape\": 0, \"style\": 0, \"thickness\": 150.000000, \"color\": [1.000000, 0.000000, 0.000000, 1.000000], \"flowRate\": 0.500000, \"brightness\": 0.800000, \"tiling\": 0.000000, \"depthTest\": 0 } hide(ids, fn) 隐藏Polyline Parameters: Name Type Description ids string | array Polyline对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideAll(fn) 隐藏所有Polyline Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setBrightness(id, newVal, fn) 设置新的亮度 Parameters: Name Type Description id string 字符串类型的ID newVal number 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setColor(id, newVal, fn) 设置新的颜色值 Parameters: Name Type Description id string 字符串类型的ID newVal Color 新颜色值，支持四种格式，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setCoordinates(id, newVal, fn) 设置坐标值 Parameters: Name Type Description id string 字符串类型的ID newVal array 新坐标值，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setDepthTest(id, newVal, fn) 设置是否做深度检测 Parameters: Name Type Description id string 字符串类型的ID newVal boolean 是否做深度检测 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setFlowRate(id, newVal, fn) 设置新的流速 Parameters: Name Type Description id string 字符串类型的ID newVal number 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setShape(id, newVal, fn) 设置shape新的样式 Parameters: Name Type Description id string 字符串类型的ID newVal number 新值， 0： 直线， 1： 曲线 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setStyle(id, newVal, fn) 设置新的样式 Parameters: Name Type Description id string 字符串类型的ID newVal number PolylineStyle新样式，取值范围：[0~5]，参考 PolylineStyle fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setThickness(id, newVal, fn) 设置新的厚度 Parameters: Name Type Description id string 字符串类型的ID newVal number 新值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setViewHeightRange(id, minViewHeight, maxViewHeight, fn) 设置Polyline对象的可视高度范围，注意：当Polyline对象使用贴地模式时，此方法会失效 Parameters: Name Type Description id string Polyline对象的ID minViewHeight number 可视高度范围最小值，取值范围：[任意负数~任意正数]，单位：米 maxViewHeight number 可视高度范围最大值，取值范围：[任意负数~任意正数]，单位：米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示Polyline Parameters: Name Type Description ids string | array Polyline对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showAll(fn) 显示所有Polyline Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个Polyline对象 Parameters: Name Type Description data object | array 数据结构，请参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"QueryOption.html":{"id":"QueryOption.html","title":"Class: QueryOption","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHu 的ID newVal number 新亮度值，取值范围：[0~1] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setColor(id, newVal, fn) 设置颜色 Parameters: Name Type Description id string RadiationPoint对象的ID newVal Color 新颜色值，支持四种格式，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setCoordinate(id, newVal, fn) 设置坐标 Parameters: Name Type Description id string RadiationPoint对象的ID newVal array 新的坐标值，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setRadius(id, newVal, fn) 设置半径 Parameters: Name Type Description id string RadiationPoint对象的ID newVal number 辐射圈新的半径，取值范围：[0~500000]，单位：米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setRippleNumber(id, newVal, fn) 设置波纹数量 Parameters: Name Type Description id string RadiationPoint对象的ID newVal number 新波纹数量，取值范围：[0~5]，单位：个 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示RadiationPoint Parameters: Name Type Description ids string | array RadiationPoint对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showAll(fn) 显示所有RadiationPoint Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个RadiationPoint对象 Parameters: Name Type Description data object | array 数据结构，请参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"River.html":{"id":"River.html","title":"Class: River","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: River River River类 等价于一维水动力模型Hydrodynamic1D类 一般通过api.river调用其方法 &lt;protected&gt; new River() Deprecated: 过时接口 请使用Hydrodynamic1D类 See: DigitalTwinAPI#river Methods add(data, fn) 添加一个或多个River对象 Parameters: Name Type Description data object | array River数据，可以是Object类型或者Array类型，对于每一个River，支持以下属性： id (string) 字符串类型的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 coordinateType (number) 坐标系类型，取值范围：0为Projection类型，1为WGS84类型，2为火星坐标系(GCJ02)，3为百度坐标系(BD09)，默认值：0 collision (boolean) 是否开启模型碰撞，默认：false，注意：开启后会影响加载效率 displayMode (number) 显示模式，取值范围：[0,1]，0水样式（默认值），1热力样式 waterMode (number) 水面显示模式，取值范围：[0,1]，0表示动画水面，1表示仿真水面 waterColor (Color) 水面颜色和透明度，注意：仅在displayMode=0时生效，支持四种格式，取值示例 arrowDisplayMode (number) 箭头显示模式，取值范围：[0,1]，0默认样式（受arrowColor参数影响），1热力样式（受arrowColors调色板参数影响） arrowAlphaMode (number) 箭头透明度模式，仅在arrowDisplayMode=0时生效，取值：[0,1]，0使用arrowColor的透明度，1使用调色板的透明度 arrowColor (Color) 箭头颜色和透明度，仅在arrowDisplayMode=0时生效，支持四种格式，取值示例 arrowColors (object) 箭头颜色调色板，仅在arrowDisplayMode=1时生效，河道箭头热力样式下的调色板配色对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 值对应的调色板颜色 value (number) 值 arrowTiling (number) 箭头平铺方式 speedFactor (number) 速度因子 rippleDensity (number) 辐射强度 rippleTiling (number) 辐射平铺系数 updateTime (number) 更新动画的插值时间，注意：仅在update()方法执行时生效 points (array) 河道信息对象数据，包含采样点坐标、河道宽度和采样点流速和流向，数组包含的对象结构如下： coordinate (array) 采样点对应坐标位置，取值：[x, y, z] width (number) 采样点对应的河道宽度 speed (number) 可选，采样点对应的流速，单位：米/秒 heatValue (number) 可选，采样点对应的热力值（即水深、污染浓度、流量、流速等水文属性），用来控制热力样式的颜色，对应colors调色板的value值 speedRange (array) 河道流速的范围，取值示例：[speedMin, speedMax] valueRange (array) 河道热力值的范围，取值示例：[heatValueMin, heatValueMax] colors (object) 河道热力样式下的调色板配色对象，包含颜色渐变控制、无效像素颜色和调色板区间数组 gradient (boolean) 是否渐变 invalidColor (Color) 无效像素点的默认颜色，默认白色 colorStops (array) 调色板对象数组，每一个对象包含热力值和对应颜色值，结构示例：[{\"value\":0, \"color\":[0,0,1,1]}]，每一个调色板对象支持以下属性： color (Color) 值对应的调色板颜色 value (number) 值 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的River Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个River对象 Parameters: Name Type Description ids string | array 要删除的River对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array River对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取River的详细信息 Parameters: Name Type Description ids string | array 要获取的River对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hide(ids, fn) 隐藏River Parameters: Name Type Description ids string | array River对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 show(ids, fn) 显示River Parameters: Name Type Description ids string | array River对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, fn) 修改一个或多个River对象 Parameters: Name Type Description data object | array River数据，参考add方法 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Satellite.html":{"id":"Satellite.html","title":"Class: Satellite","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: Satellite Satellite Satellite 卫星仿真对象相关的操作 一般通过api.satellite调用其方法，效果图如下： new Satellite() protected See: DigitalTwinAPI#satellite Extends BaseObject Methods add(data, textRange, modelRange, imageVisibleDistance, fn) 添加一个或多个Satellite对象 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 卫星字符串类型的ID text (string) 卫星标签显示的文字内容 assetPath (string) 蓝图Actor在UE工程的资源引用目录（相对路径），注意：模型必须是蓝图Actor类，即在使用UE打包pak文件时此自定义对象在UE工程内的相对路径 coordinate (array) 卫星的坐标位置 pointSize (number) 卫星像素点的像素尺寸，单位：像素 color (Color) 卫星像素点的显示颜色，支持四种格式，取值示例 imagePath (number) 可选，卫星缩略图的文件路径，注意：参数配置的各缩略图的分辨率大小必须相同，资源引入说明 imageSize (array) 可选，卫星的缩略图尺寸，宽高取值：[width, height]，默认使用图片尺寸 modelRotation (array) 可选，卫星的旋转姿态，世界坐标系旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值]，默认值：[0,0,0] textRange array 卫星文字的可视范围: [近裁距离, 远裁距离]，取值范围: [任意负值, 任意正值] modelRange array 卫星模型的可视范围: [近裁距离, 远裁距离]，取值范围: [任意负值, 任意正值] imageVisibleDistance number 卫星缩略图的可见距离，取值范围: [0~200000000] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 addLinkage(data, materials, fn) 在两颗卫星之间添加连接线，卫星运动时连接线会跟随同步运动 Parameters: Name Type Description data object | array 卫星连接线的关系配置对象或数组，支持批量添加连接线，每个对象包含以下属性： id (string) 卫星连接线的字符串类型的ID material (string) 卫星连接线样式使用的材质路径，注意：材质路径需要在materials数组内存在 startId (string) 卫星连接线起始点绑定的卫星ID endId (string) 卫星连接线结束点绑定的卫星ID thickness (number) 卫星连接线的线宽，单位：米，默认值：5 color (Color) 卫星连接线的颜色，支持四种格式，取值示例 materials array | object 卫星连接线使用的所有材质信息数组，每个材质对象包含以下参数： material (string) 卫星连接线样式使用的材质路径，注意：材质路径需要在materials数组内存在 scalarParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数值类型参数，包含name/value键值对的数组，其中value为数值，格式示例：[{\"name\":\"不透明度\",\"value\":0.5},{\"name\":\"UV重复\",\"value\":1.0}] vectorParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质矢量类型参数，包含name/value键值对的数组，其中value为数组，格式示例：[{\"name\":\"color1\",\"value\":[1,1,1,1]},{\"name\":\"color2\",\"value\":[1,0,0,1]}] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 callBPFunction(data, fn) 调用卫星模型包含的多个蓝图函数，注意：调用前请使用getBPFunction()函数来查询当前卫星模型包含的蓝图函数参数信息 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 卫星对象的ID functionName (string) 蓝图函数名 parameters (array) 蓝图函数包含的多个参数，可选参数，数组类型，注意：传入多参数的顺序与类型务必与蓝图函数的参数顺序及其参数类型一致以保证执行结果符合预期。多个参数结构示例：[{\"paramType\":BPFuncParamType.String,\"paramValue\":\"示例值\"},{\"paramType\":BPFuncParamType.Bool,\"paramValue\":false},{\"paramType\":BPFuncParamType.Float,\"paramValue\":100.8}] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 蓝图函数调用示例代码 注意：被调用函数传入的参数类型、参数顺序都必须和蓝图函数的参数类型、顺序完全保持一致！ fdapi.satellite.callBPFunction([ { id: 'satellite_1', functionName: '打开太阳能电池板', parameters: [ { \"paramType\": 0, \"paramValue\": 1 } ] }, { id: 'satellite_2', functionName: '关闭太阳能电池板', parameters: [ { \"paramType\": 0, \"paramValue\": 0 } ] } ]); clear(fn) 清空场景中所有的Satellite Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clearLinkage(fn) 清空场景中所有的卫星连接线 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 deleteLinkage(ids, fn) 根据卫星连接线的ID删除连接线 Parameters: Name Type Description ids string | array 要获取的卫星的ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 deleteSatellite(ids, fn) 删除一个或多个卫星模型和其对应的文字标签 Parameters: Name Type Description ids string | array Satellite对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, pitch, yaw, sensitivity, offset, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array 卫星对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，如果设置为负值则会在模型内部，可以用来模拟内部观察视角 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 pitch number 可选参数，相机旋转的Pitch，取值范围：[-90~90] yaw number 可选参数，相机旋转的Yaw，取值范围： [-180~180] sensitivity number 可选参数，卫星灵敏度，取值范围： [0~1] offset array 可选参数，跟随后卫星观察视角的偏移量，单位：米，默认值：[0,0,0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据卫星模型的ID获取卫星的实时位置信息 Parameters: Name Type Description ids string | array 要获取的卫星的ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 getBPFunction(ids, fn) 根据卫星模型ID查询其包含的蓝图函数信息，注意：支持批量查询 Parameters: Name Type Description ids string | array 卫星对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideModel(ids, fn) 隐藏一个或多个卫星模型 Parameters: Name Type Description ids string | array Satellite对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideSatellite(ids, fn) 隐藏一个或多个卫星模型和其对应的文字标签 Parameters: Name Type Description ids string | array Satellite对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hideText(ids, fn) 隐藏一个或多个卫星的文字标签 Parameters: Name Type Description ids string | array Satellite对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 highlight(ids, speed, scaleRange, alphaRange, intensityRange, fn) 打开指定卫星的缩略图的高亮效果 Parameters: Name Type Description ids string | array 必选，卫星ID或ID数组 speed number 可选，卫星缩略图高亮动画的频率 scaleRange number 可选，卫星缩略图大小渐变的区间范围，取值示例：[minScale, maxScale] alphaRange number 可选，卫星缩略图透明渐变的区间范围，取值示例：[minAlpha, maxAlpah] intensityRange number 可选，卫星缩略图亮度渐变的区间范围，取值示例：[minIntensity, maxIntensity] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setFollow(ids, distance, pitch, yaw, fn) 设置卫星运动时自动跟随相机 Parameters: Name Type Description ids string | array 卫星对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，如果设置为负值则会在模型内部，可以模拟卫星观察视角 pitch number 可选参数，相机旋转的Pitch，取值范围：[-90~90] yaw number 可选参数，相机旋转的Yaw，取值范围： [-180~180] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showModel(ids, fn) 显示一个或多个卫星模型 Parameters: Name Type Description ids string | array Satellite对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showSatellite(ids, fn) 显示一个或多个卫星模型和其对应的文字标签 Parameters: Name Type Description ids string | array Satellite对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showText(ids, fn) 显示一个或多个卫星的文字标签 Parameters: Name Type Description ids string | array Satellite对象的ID或者ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 unHighlight(ids, fn) 取消指定卫星缩略图的高亮效果 Parameters: Name Type Description ids string | array 卫星ID或ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 unHighlightAll(ids, fn) 取消所有卫星缩略图的高亮效果 Parameters: Name Type Description ids string | array 卫星ID或ID数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 update(data, duration, fn) 修改一个或多个Satellite对象 Parameters: Name Type Description data object | array 数据结构，请参考add方法 duration number 更新持续时间 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd updateLinkage(data, materials, fn) 更新卫星之间连接线 Parameters: Name Type Description data object | array 卫星连接线的关系配置对象或数组，支持批量添加连接线，每个对象包含以下属性： id (string) 卫星连接线的字符串类型的ID material (string) 卫星连接线样式使用的材质路径，注意：材质路径需要在materials数组内存在 startId (string) 卫星连接线起始点绑定的卫星ID endId (string) 卫星连接线结束点绑定的卫星ID thickness (number) 卫星连接线的线宽，单位：米，默认值：5 color (Color) 卫星连接线的颜色，支持四种格式，取值示例 materials array | object 卫星连接线使用的所有材质信息数组，每个材质对象包含以下参数： material (string) 卫星连接线样式使用的材质路径，注意：材质路径需要在materials数组内存在 scalarParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质数值类型参数，包含name/value键值对的数组，其中value为数值，格式示例：[{\"name\":\"不透明度\",\"value\":0.5},{\"name\":\"UV重复\",\"value\":1.0}] vectorParameters (array) 可选参数，仅在设置自定义材质路径后生效，自定义材质矢量类型参数，包含name/value键值对的数组，其中value为数组，格式示例：[{\"name\":\"color1\",\"value\":[1,1,1,1]},{\"name\":\"color2\",\"value\":[1,0,0,1]}] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"Settings.html":{"id":"Settings.html","title":"Class: Settings","body ption fn function 可选的回调函数，请参考二次开发：异步接口调用方式 getInteractiveMode(fn) 查询当前交互模式 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 getLabelLayer(fn, fn) 获取场景内所有的VTPK标注信息 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回结果示例如下： { \"result\": 0, \"resultMessage\": \"OK\", \"vtpks\": [\"Shenzhen_vtpk_3dt_0802:05C60E664E65269092E5C5AA945EE5E1\", \"shenzhenbldg:67CD8535419F3F3176B7C49986783B4B\"] } getMapMode(fn, fn) 获取地图样式 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 See: MapMode Example 地图样式 { \"mode\": 2, // 地图样式，0：指南针；1：小地图；2：大地图，参见MapMode \"coordType\": 0, //坐标系类型，0：经纬度；1：本地（默认值是0） \"mapPoint\": [0.000000, 0.000000], //同名点，取值范围：[x,y]，（默认值是[0, 0]） \"longitude\": 0.000000,//经度，取值范围：[0~180]（默认值是0.0） \"latitude\": 0.000000,//取值范围：[0~90]（默认值是0.0） \"cache\": \":memory:\",//缓存路径，字符串地址，（默认值是 \":memory:\"） \"style\": \"http://192.168.1.29:82/B34兴趣点_居名点\",//风格路径，字符串地址，（默认值是 \"mapbox://styles/mapbox/streets-v10\"） \"serverURL\": [],//WMTS风格路径，二维数组，参考setMapMode参数说明 \"groundHeight\": 0.000000,//地面高度，取值范围：[0~任意数值]（默认值是0.0） \"renderMode\": 0, //渲染模式，0：正常；1：透明；2：标注；3：贴地（默认值是0） \"coordOrder\": 0, //坐标顺序，0: XY; 1: YX，默认值：0 \"maxLevel\": 10 // WMTS服务最大显示层级，取值范围：[0~22]，默认值：10 } getProjectWKT(fn) 获取ACP工程的坐标系配准(wkt字符串) Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 hidePropertiesPanel(fn) 隐藏图层树上对象的属性面板 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 removeLabelLayer(fn) 移除当前显示的VTPK的标注 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setAmbientFadeDistance(ambientFadeDistance, fn) 设置环境光遮罩淡出距离 Parameters: Name Type Description ambientFadeDistance number 环境光遮罩的淡出距离（单位：米），默认值：12000 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setAmbientIntensity(ambientIntensity, fn) 设置环境光遮罩强度 Parameters: Name Type Description ambientIntensity number 环境光遮罩强度，取值范围：[0~100]，默认值：60 fn function 可选的回调函数，请参考二次开 0~22]，默认值：10 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setMaxCameraHeight(maxCameraHeight, fn) 设置相机的最大观察高度 Parameters: Name Type Description maxCameraHeight number 最大相机高度，取值范围：[100000~正无穷]，单位：米，默认值：100000米，即100公里 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setMinCameraHeight(minCameraHeight, fn) 设置相机的最小观察高度 Parameters: Name Type Description minCameraHeight number 最小相机高度，取值范围：[-100~正无穷]，单位：米，默认值：-100米 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setMouseHoverTime(time, fn) 设置鼠标悬浮事件返回的时间间隔 Parameters: Name Type Description time number 鼠标悬浮事件返回的时间间隔，单位：秒，默认值：1s fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setMouseMoveTime(time, fn) 设置鼠标移动事件返回的时间间隔 Parameters: Name Type Description time number 鼠标移动事件返回的时间间隔，单位：秒，默认值：1s fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setMousePickMask(mask, fn, fn) 设置鼠标拾取功能，目前有三种拾取状态：鼠标左键点击（MouseClick: 0x1)、鼠标移动（MouseMove: 0x2）、鼠标停留（MouseHover: 0x4） * Parameters: Name Type Description mask number 掩码，请参考MousePickMask fn function 可选的回调函数，请参考二次开发：异步接口调用方式 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example function test_settings_setMousePickMask() { //此处可以用枚举，也可以直接设置数字，数字含义如下： //7: click, move, hover: 全开 //0: click, move, hover: 全关 let mask = MousePickMask.MouseClick | MousePickMask.MouseMove | MousePickMask.MouseHover; fdapi.settings.setMousePickMask(mask); } setMoveSpeed(speed, fn) 设置交互的默认移动速度 Parameters: Name Type Description speed number 交互移动速度 取值范围：[0~1.0]，值越大移动速度越快，默认值：0.2 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setNearClipPlane(nearClipPlane, fn) 设置相机的近裁距离（最近可渲染距离），用于控制相机视野 Parameters: Name Type Description nearClipPlane number 近裁距离，取值范围：[0.1~100]，单位：米，默认值：1.0 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setOceanColor(color, fn) 设置海洋颜色 Parameters: Name Type Description color Color 颜色，支持四种格式，取值示例 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setOsgbGlobalAlpha(osgbGlobalAlpha, fn) 设置倾斜摄影全局不透明度 Parameters: Name Type Description osgbGlobalAlpha number 倾斜摄影模型不透明度，取值范围：[0~1.0]，默认值：1.0 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setOsgbGlobalLitStatus(osgbGlobalLitStatus, fn) 设置倾斜摄影是否参与光照计算 Parameters: Name Type setTerrainAlpha(alpha, fn) 设置地形透明度 Parameters: Name Type Description alpha number 透明度，取值范围：[0,1] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Deprecated: 过时方法，推荐setTerrainGlobalAlpha() setTerrainGlobalAlpha(terrainGlobalAlpha, fn) 设置地形全局不透明度 Parameters: Name Type Description terrainGlobalAlpha number 地形不透明度，取值范围：[0~1.0]，默认值：1.0 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setTerrainGlobalLitStatus(terrainGlobalLitStatus, fn) 设置地形是否参与光照计算 Parameters: Name Type Description terrainGlobalLitStatus boolean 地形是否参与全局光照，默认值：true fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setTonemapper(tonemapper, fn) 设置色彩优化（Tonemapping）开关 Parameters: Name Type Description tonemapper boolean 是否开启色彩优化，默认值：true fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setToolbarVisible(visible, fn) 设置屏幕右侧工具栏的可见性 Parameters: Name Type Description visible boolean 屏幕右侧工具栏是否可见 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setWMTSLayerOpacity(data, fn) 设置WMTS图层的透明度 Parameters: Name Type Description data array WMTS图层服务透明度设置，参数类型：二维数组对象，数组元素index[0]：WMTS服务id 字符串id ；数组元素index[1]：不透明度 数值[0~1] ，详细描述如下： id {string} 即WMTS图层服务的id，类型为字符串类型ID opacity {number} 图层服务不透明度，取值范围：[0~1] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example fdapi.settings.setWMTSLayerOpacity([['111', 0.5], ['222', 0.8]]); setWMTSLayerVisible(data, fn) 设置WMTS图层的可见性 Parameters: Name Type Description data array 控制设置地图模式时添加的WMTS网络图层服务，参数类型：二维数组，数组元素index[0]：WMTS服务id 字符串id ；数组元素index[1]：服务是否可见 boolean ；取值示例：[['111', true], ['222', false]]，打开图层服务[111] 关闭图层服务[222] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example fdapi.settings.setWMTSLayerVisible([['111', true], ['222', false]]); setYawSpeed(yawSpeed, fn) 设置水平视角的默认旋转速度，即按住鼠标右键拖拽水平视角旋转的速度 Parameters: Name Type Description yawSpeed number 水平视角的旋转速度 取值范围：[0~1.0]，值越大旋转速度越快，默认值：1.0 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 showPropertiesPanel(id, fn) 显示图层树上对象的属性面板 Parameters: Name Type Description id string 图层树上对象的id fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"SettingsPanel.html":{"id":"SettingsPanel.html","title":"Class: SettingsPanel","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: SettingsPanel SettingsPanel 设置面板类，提供对设置面板里的所有参数进行操作的接口 一般通过api.settingsPanel调用其方法 &lt;protected&gt; new SettingsPanel() See: DigitalTwinAPI#settingsPanel Methods getCameraMode(fn) 获取参数 相机面板 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回结果示例 { \"nearClipPlane\": 100.000000,//近裁距离 \"fovH\": 90.000000, //水平视角 \"minCamHeight\": -50.000000, //最低相机高度 \"maxCamHeight\": 100000, //最大相机高度 \"darkCorners\": 0.2 //暗角 } getControlMode(fn) 获取参数 控制面板 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回结果示例 { \"speed\": 0.200000,//第一人称移动速度 \"yawSpeed\": 1.000000,//视角左右旋转速度 \"rotateSelf\": 1, //是否开启自由交互右键自传 \"useFemale\": 0 //是否使用第三人称使用女性角色 } getMapMode(fn) 获取地图样式 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 See: MapMode Example 返回地图样式 { \"mode\": 2, // 地图样式，0：指南针；1：小地图；2：大地图，参见MapMode \"coordType\": 0, //坐标系类型，0：经纬度；1：本地（默认值是0） \"mapPoint\": [0.000000, 0.000000], //同名点，取值范围：[x,y]，（默认值是[0, 0]） \"longitude\": 0.000000,//经度，取值范围：[0~180]（默认值是0.0） \"latitude\": 0.000000,//取值范围：[0~90]（默认值是0.0） \"cache\": \":memory:\",//缓存路径，字符串地址，（默认值是 \":memory:\"） \"style\": \"http://192.168.1.29:82/B34兴趣点_居名点\",//风格路径，字符串地址，（默认值是 \"mapbox://styles/mapbox/streets-v10\"） \"serverURL\": [],//WMTS风格路径，二维数组，参考setMapMode参数说明 \"groundHeight\": 0.000000,//地面高度，取值范围：[0~任意数值]（默认值是0.0） \"renderMode\": 0, //渲染模式，0：正常；1：透明；2：标注；3：贴地（默认值是0） \"coordOrder\": 0, //坐标顺序，0: XY; 1: YX，默认值：0 \"maxLevel\": 10 // WMTS服务最大显示层级，取值范围：[0~22]，默认值：10 } getPostProcessMode(fn) 获取参数 后期面板 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回结果示例 { \"contrast\": 10, //对比度 \"saturation\": 10, //饱和度 \"lensFlareIntensity\": 0.000000, //光晕强度 \"ambientIntensity\": 60, //环境光遮罩强度 \"bloomIntensity\": 0, //泛光 \"lutMode\": 0,//LUT调色模式 \"lutIntensity\": 0.5,//LUT调色强度 \"screenPercentage\": 125, //屏幕百分比 \"terrainGlobalAlpha\": 1, //地形不透明度 \"terrainGlobalLitStatus\": 1, //地形是否参与光照 \"osgbGlobalLitStatus\": 0, //倾斜摄影是否参与光照 \"osgbGlobalAlpha\": 1,//倾斜摄影不透明度 \"antiAliasing\": 1, //是否开启反走样 \"tonemapper\": 1, //是否开启色彩优化 \"postProcessEffects\": 0, //滤镜效果 \"dofMode\": 1, //景深效果 对焦距离 \"wireThickness\": 1, //线框效果 线框大小 \"receiveDecalMode\": 1 //对象贴合模式 ...... } getReportMode(fn) 获取参数 汇报模式面板 Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回结果示例 { \"alignment\":1, //汇报演示窗口位置 \"playMode\": 1, //汇报演示播放模式 \"moveInOtherView\":1 //多视口相机是否联动 } setCameraMode(nearClipPlane, fovH, minCameraHeight, maxCameraHeight, fn) 设置参数 相机面板 Parameters: Name Type Description nearClipPlane number 近裁距离，取值范围：[0.1~100]，单位：米，默认值：1.0 fovH number 水平视角，取值范围：[45~134]，单位：度，默认值：90 minCameraHeight number 最小相机高度，取值范围：[-100~正无穷]，单位：米，默认值：-100米 maxCameraHeight number 最大相机高度，取值范围：[100000~正无穷]，单位：米，默认值：100000米，即100公里 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setControlMode(speed, yawSpeed, isRotateSelf, isUseMaleRole, viewType, fn) 设置参数 控制面板 Parameters: Name Type Description speed number 第一人称移动速度 取值范围：[0~1.0]，值越大移动速度越快，默认值：0.2 yawSpeed number 视角左右旋转速度 取值范围：[0~1.0]，值越大旋转速度越快，默认值：1.0 isRotateSelf boolean 是否开启自由交互右键自传 取值：true开启，false不开启，默认false isUseMaleRole boolean 第三人称交互是否使用男性角色 取值：true使用男性角色，false使用女性角色，默认false viewType number 角色漫游使用第三人称或第一人称，取值范围：[0,1]，0角色漫游使用第三人称，1角色漫游使用第一人称，默认值：0 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setMapMode(mode, options, fn) 设置地图样式 Parameters: Name Type Description mode MapMode 地图样式，0：指南针；1：鹰眼图；2：大地图，参见MapMode 注意：设置大地图模式后，不再支持设置vtpk标注，两者互斥 options object 地图模式相关的参数，目前支持的选项有下面这些（如果某个参数没有设置，会使用默认值）： serviceType: 服务类型，0：MVT矢量切片（默认值）； 1：WMTS(ArcGIS)； 2：WMS； 3：MapServer(ArcGIS) ； 4：Mapbox serviceProvider: 服务提供厂商，1：ArcGIS； 2：GeoServer； 3：SuperMap超图； 4：Mapbox；5：tianditu天地图 coordType: 坐标系类型，0：经纬度；1：本地（默认值是0） mapPoint: 同名点，取值范围：[x,y]，（默认值是[0, 0]） longitude: 经度，取值范围：[0~180]（默认值是0.0） latitude: 纬度，取值范围：[0~90]（默认值是0.0） cache: 缓存路径，字符串地址，（默认值是 \":memory:\"） style: 风格路径，字符串地址，（默认值是 \"mapbox://styles/mapbox/streets-v10\"） groundHeight: 地面高度，取值范围：[0~任意数值]（默认值是0.0） renderMode: 渲染模式，0：正常；1：透明；2：标注；3：贴地（默认值是0） decalMode: 大地图贴地模式下的贴合模式，0：都不接受 1：贴合所有 2：仅贴合地形；默认值：1，注意：此参数仅在renderMode设置为3时生效 serverURL : WMTS风格路径，二维数组，元素说明：index[0]服务id，index[1]服务地址；取值示例：[['111', 'http://192.168.1.29:81'], ['222', 'http://192.168.1.29:82'], ['333', 'http://192.168.1.29:83']] coordOrder: 坐标顺序，0: XY; 1: YX，默认值：0 maxLevel : WMTS服务最大显示层级，取值范围：[0~22]，默认值：10 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setPakFile(pakfilePathArr, fn) 设置-工程面板自定义资源挂载的pak自定义资源文件 Parameters: Name Type Description pakfilePathArr string | array 要挂载的自定义资源文件路径或路径数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setPakFolder(dirArr, fn) 设置-工程面板下自定义资源加载的pak自定义资源文件目录 Parameters: Name Type Description dirArr string | array 要加载的自定义资源文件目录或目录数组 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setPostProcessMode(postProcessOptions, fn) 设置参数，后期面板，注意：支持设置单个参数或同时设置多个参数 Parameters: Name Type Description postProcessOptions object 后期面板配置参数对象，支持以下属性 globalIllumination {boolean} 屏幕空间全局光照，默认值：false tonemapper {boolean} 是否开启色彩优化，默认值：true contrast {number} 对比度，取值范围：[1~2]，默认值：1 saturation {number} 饱和度，取值范围：[1~2]，默认值：1 bloomIntensity {number} 泛光，取值范围：[0~10.0]，默认值：0 chromaticAberration {number} 透镜色差，取值范围：[0~5]，默认值：0 ambientIntensity {number} 环境光遮罩强度，取值范围：[0~1]，默认值：0.6 ambientRadius {number} 环境光遮罩半径，取值范围：[0.1~5]，单位：米，默认值：0.1 ambientFadeDistance {number} 环境光遮罩淡出距离，取值范围：[0~20000]，单位：米，默认值：12000 exposureEnabled {boolean} 是否开启自动曝光，默认值：false exposureCompensation {number} 曝光补偿，取值范围：[0~15]，默认值：0 lensFlareIntensity {number} 镜头光晕强度 ，取值范围：[0~1.0]，默认值：0 darkCorner {number} 镜头暗角，取值范围：[0~1]，单位：百分比，默认值：0 depthFiethSwitch {boolean} 是否开启景深，默认值：false focalLength {number} 焦距，取值范围：[0~10000]，单位：米，默认值：10000 aperture {number} 光圈，取值范围：[1~32]，默认值：4 deepBlur {number} 深度模糊，取值范围：[0~4]，默认值：2 lutMode {number} LUT调色模式，取值范围：[0~30]，默认值：0（关闭调色模式），1-30对应不同LUT调色效果 lutIntensity {number} LUT调色强度，类型为百分比，取值范围：[0~1.0]，默认值：0，即小数对应的百分比 screenPercentage {number} 屏幕百分比，取值范围：[50~200]，默认值：125 terrainGlobalAlpha {number} 地形不透明度，取值范围：[0~1.0]，默认值：1.0 terrainGlobalLitStatus {boolean} 地形是否参与光照，默认值：true osgbGlobalLitStatus {boolean} 倾斜摄影是否参与光照，默认值：false osgbGlobalAlpha {number} 倾斜摄影不透明度，取值范围：[0~1.0],默认值：1.0 antiAliasing {boolean} 是否开启反走样，默认值：true postProcessEffects {number} 特效(滤镜效果)，取值范围：0【默认无效果】 1【景深效果】 2【线框效果】，3【圆珠笔】，4【白框】，5【蓝图】，6【原色黑边】， 默认值：0 wireThickness {number} 可选参数，仅在线框效果下生效，线框大小，取值范围：[1.0~3.0]，默认值：1.0 dofMode {number} 可选参数，仅在景深效果下生效，对焦距离，取值：0【近距离0.5km】 1【中远距离2km】 2【中远距离5km】 3【远距离10km】，默认值：0 receiveDecalMode {number} 对象贴合模式，取值：0【无】 1【所有对象】 2【仅地形】，默认值：1 fn function 可选的回调函数，请参考二次开发：异步接口调用方式 setReportMode(showAlign, playMode, isLinkage, fn) 设置参数 汇报模式面板 Parameters: Name Type Description showAlign number 汇报演示窗口位置 取值：0【底部】，1【居左】，2【居右】，默认0 playMode number 汇报演示播放模式 取值： 0【单体播放】，1【单体循环】，2【整体循环】，默认0 isLinkage boolean 多视口相机是否联动 取值：联动true，不联动false，默认不联动false fn function 可选的回调函数，请参考二次开发：异步接口调用方式 × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"ShapeFileLayer.html":{"id":"ShapeFileLayer.html","title":"Class: ShapeFileLayer","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQueryOptionRadiationPointRiverSatelliteSettingsSettingsPanelShapeFileLayerSignalWaveSmoothedParticleHydrodynamicsSplineMeshTagTileLayerToolsTopologyLineTrafficSimulationTrainVectorFieldVehicleVehicle2VideoProjectionWaterFlowFieldWaterMeshWeather Tutorials API_AsyncCallAPI_AuthSDKAPI_CameraAPI_ColorAPI_CoordinatesAPI_EventAPI_FrameTickAPI_IntroductionAPI_MultiVideoInPageAPI_ResourceDescAPI_RevisionCloudExplorerExplorer_GuidlineHelloWorld Global ActionModeAnimationMaskAPIErrorCodeAssetTypeBPFuncParamTypebuildURLCloudStatusColorCommandTypeDroneTrailStylefdapiFieldTypeForwardAxisgetHeatMapStyleHydroDynamic2DStyleMapModeMeasurementModeMousePickMaskOceanHeatMapStylePanelTypePlotStylePolygon3DStylePolygonStylePolylineStylepostRendererTyperequestResetTypeSM3sm3DigestSplineMeshStyleUIPanelTypeVectorFieldStyleVehicleViewModeVERSIONViewportVisualTypeWaterFlowFieldStyleWaterModeWSErrorCode Class: ShapeFileLayer ShapeFileLayer ShapeFileLayer矢量图层对象相关的操作 &lt;protected&gt; new ShapeFileLayer() 一般通过api.ShapeFileLayer调用其方法 See: DigitalTwinAPI#ShapeFileLayer Extends BaseObject Methods add(data, fn) 添加一个或多个ShapeFileLayer对象 数据类型分三种：Polygon、Polyline、Point,对应不同对象属性 Parameters: Name Type Description data object | array 数据结构，支持对象或数组，对于每一个对象支持以下属性： id (string) 字符串类型的ID groupId (string) 可选，Group分组 userData (string) 可选，用户自定义数据 file (String) ShapeFileLayer的文件路径，支持本地路径和网络路径 offset (array) 偏移量：[X,Y,Z]，数组元素类型：(number)，默认值[0.000000, 0.000000, 0.000000] rotation (array) 旋转：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：[任意数值]，默认值[0.000000, 0.000000, 0.000000] defaultColor (Color) 支持四种格式，取值示例 默认颜色：[0.000000, 0.000000, 1.000000, 1.000000] RGBA polygonColorFieldName (String) 当type==Polygon时此属性可选，多边形颜色字段 polygonHeightFieldName (String) 当type==Polygon时此属性可选，多边形高度字段 polygonGroundHeightFieldName (String) 当type==Polygon时此属性可选，底面高度字段 polygonTopHeightFieldName (String) 当type==Polygon时此属性可选，顶面高度字段 polygonStyle (number) 当type==Polygon时此属性可选，多边形样式，共6种，取值范围：[0~5]，分别为 0：体块（半透明） 1：圆点 2：单色 3：体块（纯色）4：纯色（半透明） 5：X光 polygonDefaultHeight (number) 当type==Polygon时此属性可选，多边形高度，单位米 cacheAllField (boolean) 当type==Polygon时此属性可选，Polygon支持缓存所有字段，以便于高效动态更新Polygon不同字段的效果，默认值：false，注意：仅在只更新Polygon字段时生效 polylineDefaultThickness (number) 当type==Polyline时此属性可选，折线宽度，单位米 pointTextContentFieldName (String) 当type==Point时此属性可选，文本内容（点字段） pointDisplayMode (number) 当type==Point时此属性可选，显示模式，取值说明如下： 0：相机移动不显示，参与避让聚合 1：相机移动时显示，参与避让聚合 2：相机移动时显示，不参与避让聚合 clusterByImage (boolean) 当type==Point时此属性可选，是否按相同图片路径(pointImage)聚合显示 pointImage (String) 当type==Point时此属性可选，图片路径 pointContentRange (number) 当type==Point时此属性可选，文本可见距离，单位米 pointRange (array) 当type==Point时此属性可选，可见距离（米）点坐标：[X,Y] pointFontColor (Color) 当type==Point时此属性可选，字体颜色 ，支持四种格式，取值示例 pointFontOutlineColor (Color) 当type==Point时此属性可选，字体轮廓颜色 ，支持四种格式，取值示例 pointBackgroundColor (Color) 当type==Point时此属性可选，字体背景颜色 ，支持四种格式，取值示例 pointShowLine (boolean) 当type==Point时此属性可选，是否显示线 默认false pointOcclusionCull (boolean) 当type==Point时此属性可选，是否参与遮挡 默认true fn function 可选的回调函数，请参考二次开发：异步接口调用方式 clear(fn) 删除场景中所有的ShapeFileLayer Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 delete(ids, fn) 删除一个或多个ShapeFileLayer对象 Parameters: Name Type Description ids string | array 要删除的ShapeFileLayer对象的ID或者ID数组（可以删除一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focus(ids, distance, flyTime, rotation, fn) 自动定位到合适的观察距离 Parameters: Name Type Description ids string | array ShapeFileLayer对象的ID或者ID数组 distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 focusFeature(shapeFileLayerId, featureId, distance, flyTime, rotation, fn) 定位到ShapeFileLayer的要素区域 Parameters: Name Type Description shapeFileLayerId string ShapeFileLayer对象的ID featureId number 要素区域Feature的ID distance number 可选参数，观察点距离目标点（被拍摄物体）的距离，取值范围：[0.01~任意正数]，如果设置为0或者不设置，系统自动计算 flyTime number 可选参数，相机飞行的时间，取值范围：[0~任意正数]，单位：秒，默认值2秒 rotation array 可选参数，相机旋转的欧拉角：[Pitch,Yaw,Roll]，数组元素类型：(number)，取值范围：Pitch[-90~90] Yaw[-180~180] Roll[0] fn function 可选的回调函数，请参考二次开发：异步接口调用方式 get(ids, fn) 根据ID获取ShapeFileLayer的详细信息 包含模型属性和值 Parameters: Name Type Description ids string | array 要获取的ShapeFileLayer对象ID或者ID数组（可以获取一个或者多个） fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Example 返回ShapeFileLayer的详细信息 { \"id\": \"sp1\", \"groupId\": \"\", \"userData\": \"\", \"type\": \"Polygon\", \"file\": \"G:\\\\TEMP\\\\Explorer\\\\SDK\\\\JS/media/ShapeFileLayer/polygonColor.shp\", \"polygonColorFieldName\": \"RGB\", \"polygonHeightFieldName\": \"\", \"polygonGroundHeightFieldName\": \"\", \"polygonTopHeightFieldName\": \"\", \"polygonStyle\": 0, \"polygonDefaultHeight\": 200.000000, \"defaultColor\": [0.000000, 0.000000, 1.000000, 1.000000], \"offset\": [0.000000, 0.000000, 0.000000], \"rotation\": [0.000000, 0.000000, 0.00 内容（点字段） pointDisplayMode (number) 当type==Point时此属性可选，显示模式，取值说明如下： 0：相机移动不显示，参与避让聚合 1：相机移动时显示，参与避让聚合 2：相机移动时显示，不参与避让聚合 pointImage (String) 当type==Point时此属性可选，图片路径 pointContentRange (number) 当type==Point时此属性可选，文本可见距离，单位米 pointRange (array) 当type==Point时此属性可选，可见距离（米）点坐标：[X,Y] pointFontColor (Color) 当type==Point时此属性可选，字体颜色 ，支持四种格式，取值示例 pointFontOutlineColor (Color) 当type==Point时此属性可选，字体轮廓颜色 ，支持四种格式，取值示例 pointBackgroundColor (Color) 当type==Point时此属性可选，字体背景颜色 ，支持四种格式，取值示例 pointShowLine (boolean) 当type==Point时此属性可选，是否显示线 默认false pointOcclusionCull (boolean) 当type==Point时此属性可选，是否参与遮挡 默认true fn function 可选的回调函数，请参考二次开发：异步接口调用方式 updateBegin() 用于批量多次修改对象的属性 在开始修改之前调用updateBegin，然后可以多次调用setXXX方法，最后调用updateEnd提交修改更新数据 注意： updateBegin不是异步调用，不需要await，也没有回调函数参数 Inherited From: BaseObject#updateBegin Overrides: BaseObject#updateBegin Example fdapi.xxx.updateBegin(); for (let i = 0; i &lt; 1000; i++) { fdapi.xxx.setColor(i, Color.Yellow); } fdapi.xxx.updateEnd(function () { log('update finished!'); }); updateEnd(fn) 用于批量多次修改对象的属性，与updateBegin配套使用 注意： updateEnd是异步调用，可以用回调函数也可以await Parameters: Name Type Description fn function 可选的回调函数，请参考二次开发：异步接口调用方式 Inherited From: BaseObject#updateEnd Overrides: BaseObject#updateEnd × Search results Close Documentation generated by JSDoc 3.6.10 on 2026-05-28 using the DocStrap template. "},"SignalWave.html":{"id":"SignalWave.html","title":"Class: SignalWave","body":" DTS二次开发文档 Classes AntennaBaseObjectBattlefieldSimulationBeamBoxTriggerCameraCameraTourCameraTourDataCameraTourKeyFrameCesium3DTilesetCoastlineCoordCustomMeshCustomObjectCustomTagDaHuaVideoFusionDecalDigitalTwinAPIDigitalTwinPlayerDroneDynamicWaterEditHelperExcavationAnalysisFdExternalFiniteElementFiniteElement2FloodFillFluidGaussianSplattingGeoJSONLayerGlobeTerrainGuideLineHeatMapHeatMap3DHighlightAreaHydroDynamic1DHydroDynamic2DHydrodynamicModelHydrodynamicModel2ImageryLayerImageryLayer2InfoTreeLightMarkerMarker3DMarkerLayerMiscOceanHeatMapODLinePanoramaPlotPolygonPolygon3DPolylineQue
